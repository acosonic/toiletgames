<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Судоку — Тоалет Игрице</title>
<meta name="theme-color" content="#e94560">
<script>(function(){var t=localStorage.getItem('tg-theme')||(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');if(t==='light')document.documentElement.classList.add('light');})()</script>
<style>
:root{--bg:#0f0f1a;--surface:#1a1a2e;--surface2:#16213e;--accent:#e94560;--text:#e0e0e0;--dim:#888;--grid-outer:#666;--grid-thin:#2d2d48}
html.light{--bg:#f0f2f5;--surface:#fff;--surface2:#e2e5ea;--text:#1a1a2e;--dim:#666;--grid-outer:#888;--grid-thin:#d0d0d0}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:18px}html.xl{font-size:22px}
body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;min-height:100dvh;-webkit-tap-highlight-color:transparent;touch-action:manipulation;transition:background .2s,color .2s}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--surface);gap:6px;border-bottom:1px solid var(--surface2)}
.topbar a{color:var(--accent);text-decoration:none;font-size:.95rem;font-weight:700;white-space:nowrap}
.topbar h2{font-size:.95rem;font-weight:700;flex:1;text-align:center}
.topbar-btns{display:flex;gap:4px;flex-shrink:0}
.icon-btn{background:none;border:1px solid var(--dim);color:var(--text);border-radius:6px;padding:5px 8px;font-size:.78rem;cursor:pointer;white-space:nowrap;line-height:1}
.wrap{padding:10px 8px 32px;max-width:420px;margin:0 auto;display:flex;flex-direction:column;align-items:center;gap:10px}
.hud{display:flex;align-items:center;justify-content:space-between;width:100%;gap:8px}
.new-btn,.check-btn{border:none;border-radius:8px;padding:7px 14px;font-size:.88rem;font-weight:700;cursor:pointer}
.new-btn{background:var(--accent);color:#fff}
.check-btn{background:var(--surface2);color:var(--text);border:1px solid var(--dim)}
#sudoku{display:grid;grid-template-columns:repeat(9,1fr);border:2px solid var(--grid-outer);border-radius:4px;width:min(360px,calc(100vw - 16px));aspect-ratio:1}
.cell{border-right:1px solid var(--grid-thin);border-bottom:1px solid var(--grid-thin);display:flex;align-items:center;justify-content:center;font-size:1.1rem;font-weight:700;cursor:pointer;background:var(--bg);user-select:none}
html.light .cell{background:#f9f9fb}
html.xl .cell{font-size:1.4rem}
.cell.given{color:var(--dim);cursor:default}
.cell.selected{background:var(--surface);box-shadow:inset 0 0 0 2px #5cb85c}
html.light .cell.selected{background:#e8eaed}
.cell.highlight{background:var(--surface2)}
html.light .cell.highlight{background:#eceef2}
.cell.error{color:#e94560}.cell.correct{color:#5cb85c}
html.light .cell.correct{color:#27ae60}
/* remove borders on outer edges (handled by #sudoku border) */
.cell:nth-child(9n){border-right:none}
.cell:nth-child(n+73):nth-child(-n+81){border-bottom:none}
/* thick borders at 3×3 box boundaries: after col 3, col 6 and after row 3, row 6 */
.cell:nth-child(9n+3),.cell:nth-child(9n+6){border-right:2px solid var(--grid-outer)}
.cell:nth-child(n+19):nth-child(-n+27),.cell:nth-child(n+46):nth-child(-n+54){border-bottom:2px solid var(--grid-outer)}
.numpad{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;width:min(360px,calc(100vw - 16px))}
.num-btn{background:var(--surface);border:none;color:var(--text);border-radius:8px;padding:12px 0;font-size:1.2rem;font-weight:700;cursor:pointer}
html.xl .num-btn{font-size:1.5rem;padding:14px 0}
.num-btn:active{background:var(--accent);color:#fff}
.num-btn.erase{background:var(--surface2);font-size:.9rem}
.msg{font-size:.95rem;font-weight:700;text-align:center;min-height:1.4em;color:var(--accent)}
</style>
</head>
<body>
<div class="topbar">
  <a href="../" class="i18n" data-sr="← Назад" data-en="← Back">← Назад</a>
  <h2 class="i18n" data-sr="🔢 Судоку" data-en="🔢 Sudoku">🔢 Судоку</h2>
  <div class="topbar-btns">
    <button class="icon-btn theme-btn" onclick="toggleTheme()">🌙</button>
    <button class="icon-btn lang-btn" onclick="toggleLang()">EN</button>
    <button class="icon-btn sound-btn" onclick="toggleSound()">🔊</button>
    <button class="icon-btn" onclick="toggleFont()">Аа</button>
  </div>
</div>
<div class="wrap">
  <div class="hud">
    <button class="new-btn i18n" data-sr="Нова игра" data-en="New game" onclick="newGame()">Нова игра</button>
    <button class="check-btn i18n" data-sr="Провери" data-en="Check" onclick="checkSolution()">Провери</button>
  </div>
  <div id="sudoku"></div>
  <div class="numpad" id="numpad"></div>
  <div class="msg" id="msg"></div>
</div>
<script>
(function(){
  const _lang=()=>localStorage.getItem('tg-lang')||(/^(sr|hr|bs)/i.test(navigator.language)?'sr':'en');
  const _theme=()=>localStorage.getItem('tg-theme')||(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');
  function applyTheme(){const d=_theme()==='dark';document.documentElement.classList.toggle('light',!d);document.querySelectorAll('.theme-btn').forEach(b=>b.textContent=d?'☀️':'🌙');}
  function applyI18n(){const L=_lang();document.querySelectorAll('[data-'+L+']').forEach(el=>el.textContent=el.dataset[L]);document.querySelectorAll('.lang-btn').forEach(b=>b.textContent=L==='sr'?'EN':'СР');document.documentElement.lang=L;}
  window.toggleTheme=()=>{localStorage.setItem('tg-theme',_theme()==='dark'?'light':'dark');applyTheme();};
  window.toggleLang=()=>{localStorage.setItem('tg-lang',_lang()==='sr'?'en':'sr');location.reload();};
  window.toggleFont=()=>{const xl=document.documentElement.classList.toggle('xl');localStorage.setItem('tg-xl',xl?'1':'0');};
  window.toggleSound=()=>{const on=localStorage.getItem('tg-sound')!=='0';localStorage.setItem('tg-sound',on?'0':'1');document.querySelectorAll('.sound-btn').forEach(b=>b.textContent=on?'🔇':'🔊');};
  if(localStorage.getItem('tg-xl')==='1')document.documentElement.classList.add('xl');
  applyTheme();applyI18n();document.querySelectorAll('.sound-btn').forEach(b=>b.textContent=localStorage.getItem('tg-sound')==='0'?'🔇':'🔊');
  const L=_lang();
  const T={sr:{fill:'❗ Попуни све ћелије!',ok:'🎉 Тачно! Браво!',err:'❌ Постоје грешке (означено црвеном)'},en:{fill:'❗ Fill all cells!',ok:'🎉 Correct! Well done!',err:'❌ There are errors (shown in red)'}};
  const t=k=>T[L][k];

  const PUZZLES=[
    {p:[5,3,0,0,7,0,0,0,0,6,0,0,1,9,5,0,0,0,0,9,8,0,0,0,0,6,0,8,0,0,0,6,0,0,0,3,4,0,0,8,0,3,0,0,1,7,0,0,0,2,0,0,0,6,0,6,0,0,0,0,2,8,0,0,0,0,4,1,9,0,0,5,0,0,0,0,8,0,0,7,9],s:[5,3,4,6,7,8,9,1,2,6,7,2,1,9,5,3,4,8,1,9,8,3,4,2,5,6,7,8,5,9,7,6,1,4,2,3,4,2,6,8,5,3,7,9,1,7,1,3,9,2,4,8,5,6,9,6,1,5,3,7,2,8,4,2,8,7,4,1,9,6,3,5,3,4,5,2,8,6,1,7,9]},
    {p:[0,0,0,2,6,0,7,0,1,6,8,0,0,7,0,0,9,0,1,9,0,0,0,4,5,0,0,8,2,0,1,0,0,0,4,0,0,0,4,6,0,2,9,0,0,0,5,0,0,0,3,0,2,8,0,0,9,3,0,0,0,7,4,0,4,0,0,5,0,0,3,6,7,0,3,0,1,8,0,0,0],s:[4,3,5,2,6,9,7,8,1,6,8,2,5,7,1,4,9,3,1,9,7,8,3,4,5,6,2,8,2,6,1,9,5,3,4,7,3,7,4,6,8,2,9,1,5,9,5,1,7,4,3,6,2,8,5,1,9,3,2,6,8,7,4,2,4,8,9,5,7,1,3,6,7,6,3,4,1,8,2,5,9]},
    {p:[0,2,0,6,0,8,0,0,0,5,8,0,0,0,9,7,0,0,0,0,0,0,4,0,0,0,0,3,7,0,0,0,0,5,0,0,6,0,0,0,0,0,0,0,4,0,0,8,0,0,0,0,1,3,0,0,0,0,2,0,0,0,0,0,0,9,8,0,0,0,3,6,0,0,0,3,0,6,0,9,0],s:[1,2,3,6,7,8,9,4,5,5,8,4,2,3,9,7,6,1,9,6,7,1,4,5,3,2,8,3,7,2,4,6,1,5,8,9,6,9,1,5,8,3,2,7,4,4,5,8,7,9,2,6,1,3,8,3,6,9,2,4,1,5,7,2,1,9,8,5,7,4,3,6,7,4,5,3,1,6,8,9,2]},
  ];
  function statRec(g,inc,hi,lo){const j=JSON.parse(localStorage.getItem('tg-stats')||'{}');const e=j[g]||{};for(const[k,v]of Object.entries(inc||{}))e[k]=(e[k]||0)+v;for(const[k,v]of Object.entries(hi||{}))if(v!=null&&(!e[k]||v>e[k]))e[k]=v;for(const[k,v]of Object.entries(lo||{}))if(v!=null&&(!e[k]||v<e[k]))e[k]=v;j[g]=e;localStorage.setItem('tg-stats',JSON.stringify(j));}
  const SFX=(()=>{let ac;const A=()=>(ac=ac||new(window.AudioContext||window.webkitAudioContext)());const t=(f,d,tp,v)=>{if(localStorage.getItem('tg-sound')==='0')return;try{const c=A(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type=tp||'sine';o.frequency.value=f;g.gain.setValueAtTime(v||.25,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);o.start();o.stop(c.currentTime+d);}catch(e){}};return{place:()=>t(700,.04,'square',.08),correct(){t(523,.1);setTimeout(()=>t(659,.1),100);setTimeout(()=>t(784,.25),200);},error:()=>t(150,.3,'sawtooth',.15)};})();

  let puzzle,solution,userGrid,selected=null,pi=0;

  function newGame(){pi=(pi+1)%PUZZLES.length;puzzle=[...PUZZLES[pi].p];solution=[...PUZZLES[pi].s];userGrid=puzzle.map(v=>v);selected=null;document.getElementById('msg').textContent='';render();}

  function render(){
    const el=document.getElementById('sudoku');el.innerHTML='';
    for(let i=0;i<81;i++){
      const c=document.createElement('div');c.className='cell';const r=Math.floor(i/9),col=i%9;
      if(puzzle[i]){c.classList.add('given');c.textContent=puzzle[i];}
      else if(userGrid[i]){c.textContent=userGrid[i];c.classList.add(userGrid[i]===solution[i]?'correct':'error');}
      if(selected===i)c.classList.add('selected');
      else if(selected!==null){const sr=Math.floor(selected/9),sc=selected%9;const sb=Math.floor(sr/3)*3+Math.floor(sc/3);const tb=Math.floor(r/3)*3+Math.floor(col/3);if(r===sr||col===sc||sb===tb)c.classList.add('highlight');}
      c.addEventListener('click',()=>{if(!puzzle[i]){selected=i;render();}});
      el.appendChild(c);
    }
    const np=document.getElementById('numpad');
    if(!np.children.length){
      for(let n=1;n<=9;n++){const b=document.createElement('button');b.className='num-btn';b.textContent=n;b.addEventListener('click',()=>enter(n));np.appendChild(b);}
      const e=document.createElement('button');e.className='num-btn erase';e.textContent='⌫';e.addEventListener('click',()=>enter(0));np.appendChild(e);
    }
  }

  function enter(n){if(selected===null||puzzle[selected])return;userGrid[selected]=n;if(n>0)SFX.place();render();}

  function checkSolution(){const filled=userGrid.every(v=>v>0);const correct=userGrid.every((v,i)=>v===solution[i]);if(!filled)document.getElementById('msg').textContent=t('fill');else if(correct){SFX.correct();celebrate();document.getElementById('msg').textContent=t('ok');statRec('sudoku',{wins:1});}else{SFX.error();document.getElementById('msg').textContent=t('err');}}

  window.newGame=newGame;window.checkSolution=checkSolution;
  newGame();
})();
</script>
<script>
// Victory celebration — synthesized crowd applause + cheer, plus a starry
// fireworks burst. Self-contained & offline; sound honors the tg-sound toggle,
// visuals honor prefers-reduced-motion. Auto-cleans up.
window.celebrate=function(){
  // ── applause + cheering (synthesized) ──
  if(localStorage.getItem("tg-sound")!=="0"){try{
    var AC=window.AudioContext||window.webkitAudioContext,c=new AC();
    if(c.state==="suspended")c.resume();
    var now=c.currentTime,master=c.createGain();master.gain.value=0.9;master.connect(c.destination);
    // crowd "roar": band-passed noise that swells then fades (~2.2s)
    var dur=2.2,nb=c.createBuffer(1,Math.floor(c.sampleRate*dur),c.sampleRate),d=nb.getChannelData(0);
    for(var i=0;i<d.length;i++)d[i]=Math.random()*2-1;
    var noise=c.createBufferSource();noise.buffer=nb;
    var bp=c.createBiquadFilter();bp.type="bandpass";bp.Q.value=0.6;
    bp.frequency.setValueAtTime(700,now);bp.frequency.linearRampToValueAtTime(1200,now+0.6);bp.frequency.linearRampToValueAtTime(850,now+1.5);
    var ng=c.createGain();
    ng.gain.setValueAtTime(0.0001,now);ng.gain.exponentialRampToValueAtTime(0.45,now+0.3);ng.gain.setValueAtTime(0.45,now+1.3);ng.gain.exponentialRampToValueAtTime(0.0001,now+dur);
    noise.connect(bp);bp.connect(ng);ng.connect(master);noise.start(now);noise.stop(now+dur);
    // a couple of rising "woo" cheers
    for(var w=0;w<2;w++){(function(off){var o=c.createOscillator(),g=c.createGain();o.type="sine";o.frequency.setValueAtTime(820+Math.random()*260,now+off);o.frequency.linearRampToValueAtTime(1500+Math.random()*360,now+off+0.4);g.gain.setValueAtTime(0.0001,now+off);g.gain.exponentialRampToValueAtTime(0.07,now+off+0.08);g.gain.exponentialRampToValueAtTime(0.0001,now+off+0.5);o.connect(g);g.connect(master);o.start(now+off);o.stop(now+off+0.55);})(w*0.28);}
    // applause: ~36 short filtered clap bursts scattered over ~2s
    for(var k=0;k<36;k++){var t=now+0.04+Math.random()*1.95,len=Math.floor(c.sampleRate*0.03),cbb=c.createBuffer(1,len,c.sampleRate),cd=cbb.getChannelData(0);for(var j=0;j<len;j++)cd[j]=(Math.random()*2-1)*(1-j/len);var cs=c.createBufferSource();cs.buffer=cbb;var hp=c.createBiquadFilter();hp.type="highpass";hp.frequency.value=1100;var cg=c.createGain();cg.gain.value=0.10+Math.random()*0.12;cs.connect(hp);hp.connect(cg);cg.connect(master);cs.start(t);cs.stop(t+0.05);}
    setTimeout(function(){try{c.close();}catch(e){}},2700);
  }catch(e){}}
  // ── fireworks (visual) ──
  if(window.matchMedia&&window.matchMedia("(prefers-reduced-motion:reduce)").matches)return;
  var cv=document.createElement("canvas");
  cv.style.cssText="position:fixed;inset:0;width:100vw;height:100vh;pointer-events:none;z-index:99999";
  function size(){cv.width=window.innerWidth;cv.height=window.innerHeight;}
  size();window.addEventListener("resize",size);
  document.body.appendChild(cv);
  var cx=cv.getContext("2d");
  var COL=["#e94560","#ffd166","#06d6a0","#4dd0e1","#9b6bff","#ff7043","#ffffff"];
  var ps=[],frame=0,bursts=0,MAX=7,nextAt=0;
  function star(x,y,r,rot){cx.beginPath();for(var i=0;i<10;i++){var rr=i%2?r*0.45:r,a=rot+i*Math.PI/5;cx.lineTo(x+Math.cos(a)*rr,y+Math.sin(a)*rr);}cx.closePath();cx.fill();}
  function burst(x,y){var hue=COL[Math.random()*COL.length|0],n=40+(Math.random()*22|0);for(var i=0;i<n;i++){var a=Math.random()*Math.PI*2,sp=Math.random()*4.6+1.2;ps.push({x:x,y:y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-1.2,age:0,life:55+Math.random()*35,c:Math.random()<.4?"#fff":hue,sz:Math.random()*2.4+1.4,star:Math.random()<.5,rot:Math.random()*6});}}
  function loop(){
    frame++;
    if(bursts<MAX&&frame>=nextAt){burst(Math.random()*cv.width,cv.height*(0.12+Math.random()*0.45));bursts++;nextAt=frame+6+(Math.random()*16|0);}
    cx.clearRect(0,0,cv.width,cv.height);
    for(var i=ps.length-1;i>=0;i--){var p=ps[i];p.age++;p.vy+=0.07;p.vx*=0.99;p.vy*=0.99;p.x+=p.vx;p.y+=p.vy;p.rot+=0.12;var al=1-p.age/p.life;if(al<=0){ps.splice(i,1);continue;}cx.globalAlpha=al;cx.fillStyle=p.c;if(p.star)star(p.x,p.y,p.sz*2,p.rot);else{cx.beginPath();cx.arc(p.x,p.y,p.sz,0,6.283);cx.fill();}}
    cx.globalAlpha=1;
    if(ps.length||bursts<MAX)requestAnimationFrame(loop);
    else{window.removeEventListener("resize",size);cv.remove();}
  }
  requestAnimationFrame(loop);
};
</script>
</body>
</html>
