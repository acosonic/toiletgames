<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Минерски — Тоалет Игрице</title>
<meta name="theme-color" content="#e94560">
<script>(function(){var t=localStorage.getItem('tg-theme')||(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');if(t==='light')document.documentElement.classList.add('light');})()</script>
<style>
:root{--bg:#0f0f1a;--surface:#1a1a2e;--surface2:#16213e;--accent:#e94560;--text:#e0e0e0;--dim:#888}
html.light{--bg:#f0f2f5;--surface:#fff;--surface2:#e2e5ea;--text:#1a1a2e;--dim:#666}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:18px}html.xl{font-size:22px}
body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;min-height:100dvh;-webkit-tap-highlight-color:transparent;touch-action:manipulation;transition:background .2s,color .2s}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--surface);gap:6px;border-bottom:1px solid var(--surface2)}
.topbar a{color:var(--accent);text-decoration:none;font-size:.95rem;font-weight:700;white-space:nowrap}
.topbar h2{font-size:.95rem;font-weight:700;flex:1;text-align:center}
.topbar-btns{display:flex;gap:4px;flex-shrink:0}
.icon-btn{background:none;border:1px solid var(--dim);color:var(--text);border-radius:6px;padding:5px 8px;font-size:.78rem;cursor:pointer;white-space:nowrap;line-height:1}
.wrap{padding:12px 10px 32px;max-width:480px;margin:0 auto}
.status{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;font-size:1rem;gap:8px}
.mines{font-size:1.1rem;font-weight:700;color:var(--accent)}
.timer{font-weight:700}
.new-btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:7px 14px;font-size:.9rem;font-weight:700;cursor:pointer}
.diff-row{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.diff-btn{background:var(--surface);border:1px solid var(--dim);color:var(--text);border-radius:8px;padding:6px 12px;font-size:.82rem;cursor:pointer}
.diff-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
#board{display:grid;gap:4px;margin:4px auto;background:#2a2a4a;border-radius:10px;padding:4px;width:min(500px,calc(100vw - 20px))}
html.light #board{background:#9aa0a6}
.cell{aspect-ratio:1;min-width:0;background:var(--surface);border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:clamp(12px,4vw,18px);font-weight:700;cursor:pointer;user-select:none;touch-action:none;-webkit-touch-callout:none}
html.xl .cell{font-size:clamp(14px,5vw,22px)}
.cell.revealed{background:var(--bg);cursor:default}
html.light .cell.revealed{background:#e2e5ea}
.cell.mine-hit{background:#e94560}
.cell.flagged{background:var(--surface2)}
.cell[data-n="1"]{color:#60a3fc}.cell[data-n="2"]{color:#5cb85c}.cell[data-n="3"]{color:#e94560}
.cell[data-n="4"]{color:#9b59b6}.cell[data-n="5"]{color:#e67e22}.cell[data-n="6"]{color:#1abc9c}
.cell[data-n="7"]{color:#e74c3c}.cell[data-n="8"]{color:var(--dim)}
.msg{text-align:center;font-size:1.05rem;font-weight:700;padding:10px;border-radius:8px;margin-top:8px;display:none}
.msg.win{background:#1a3a1a;color:#5cb85c}.msg.lose{background:#3a1a1a;color:#e94560}
html.light .msg.win{background:#d4edda;color:#155724}
html.light .msg.lose{background:#f8d7da;color:#721c24}
.hint{font-size:.75rem;color:var(--dim);text-align:center;margin-top:6px}
</style>
</head>
<body>
<div class="topbar">
  <a href="../" class="i18n" data-sr="← Назад" data-en="← Back">← Назад</a>
  <h2 class="i18n" data-sr="💣 Минерски" data-en="💣 Minesweeper">💣 Минерски</h2>
  <div class="topbar-btns">
    <button class="icon-btn theme-btn" onclick="toggleTheme()">🌙</button>
    <button class="icon-btn lang-btn" onclick="toggleLang()">EN</button>
    <button class="icon-btn" onclick="toggleFont()">Аа</button>
  </div>
</div>
<div class="wrap">
  <div class="diff-row" id="diffRow"></div>
  <div class="status">
    <span class="mines" id="mineCount">💣 10</span>
    <button class="new-btn" id="newBtn" onclick="newGame()">Нова игра</button>
    <span class="timer" id="timer">⏱ 0</span>
  </div>
  <div id="board"></div>
  <div id="msg" class="msg"></div>
  <p class="hint i18n" data-sr="Дуго притисни да означиш заставицом 🚩" data-en="Long press to flag 🚩">Дуго притисни да означиш заставицом 🚩</p>
</div>
<script>
(function(){
  // ── i18n + theme ──
  const _lang=()=>localStorage.getItem('tg-lang')||(/^(sr|hr|bs)/i.test(navigator.language)?'sr':'en');
  const _theme=()=>localStorage.getItem('tg-theme')||(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');
  function applyTheme(){const d=_theme()==='dark';document.documentElement.classList.toggle('light',!d);document.querySelectorAll('.theme-btn').forEach(b=>b.textContent=d?'☀️':'🌙');}
  function applyI18n(){const L=_lang();document.querySelectorAll('[data-'+L+']').forEach(el=>el.textContent=el.dataset[L]);document.querySelectorAll('.lang-btn').forEach(b=>b.textContent=L==='sr'?'EN':'СР');document.documentElement.lang=L;}
  window.toggleTheme=()=>{localStorage.setItem('tg-theme',_theme()==='dark'?'light':'dark');applyTheme();};
  window.toggleLang=()=>{localStorage.setItem('tg-lang',_lang()==='sr'?'en':'sr');location.reload();};
  window.toggleFont=()=>{const xl=document.documentElement.classList.toggle('xl');localStorage.setItem('tg-xl',xl?'1':'0');};
  if(localStorage.getItem('tg-xl')==='1')document.documentElement.classList.add('xl');
  applyTheme();applyI18n();

  const L=_lang();
  const T={
    sr:{easy:'Лако 9×9',med:'Средње 12×9',new:'Нова игра',hit:'💥 Погодио минуте!',win:'🎉 Победа за %s секунди!',flag:'Дуго притисни да означиш заставицом 🚩'},
    en:{easy:'Easy 9×9',med:'Medium 12×9',new:'New game',hit:'💥 You hit a mine!',win:'🎉 Win in %s seconds!',flag:'Long press to flag 🚩'}
  };
  const t=k=>T[L][k]||T.sr[k];

  // Render diff buttons
  document.getElementById('diffRow').innerHTML=`
    <button class="diff-btn active" id="d0" onclick="setDiff(0)">${t('easy')}</button>
    <button class="diff-btn" id="d1" onclick="setDiff(1)">${t('med')}</button>`;
  document.getElementById('newBtn').textContent=t('new');
  document.querySelector('.hint').textContent=t('flag');

  const DIFFS=[{cols:9,rows:9,mines:10},{cols:12,rows:9,mines:20}];
  let diff=0,cols,rows,mines,board,revealed,flagged,started,over,timerInterval,ti;

  function setDiff(d){diff=d;document.querySelectorAll('.diff-btn').forEach((b,i)=>b.classList.toggle('active',i===d));newGame();}

  function newGame(){
    const cfg=DIFFS[diff];cols=cfg.cols;rows=cfg.rows;mines=cfg.mines;
    board=Array(rows*cols).fill(0);revealed=Array(rows*cols).fill(false);flagged=Array(rows*cols).fill(false);
    started=false;over=false;ti=0;
    clearInterval(timerInterval);
    document.getElementById('timer').textContent='⏱ 0';
    document.getElementById('mineCount').textContent='💣 '+mines;
    document.getElementById('msg').style.display='none';
    render();
  }

  function render(){
    const el=document.getElementById('board');
    el.style.gridTemplateColumns=`repeat(${cols},1fr)`;
    el.innerHTML='';
    for(let i=0;i<rows*cols;i++){
      const c=document.createElement('div');c.className='cell';
      if(revealed[i]){c.classList.add('revealed');if(board[i]===-1){c.classList.add('mine-hit');c.textContent='💣';}else if(board[i]>0){c.textContent=board[i];c.dataset.n=board[i];}}
      else if(flagged[i]){c.classList.add('flagged');c.textContent='🚩';}
      c.addEventListener('click',()=>reveal(i));
      c.addEventListener('contextmenu',e=>{e.preventDefault();flag(i);});
      let pt,sx,sy;
      c.addEventListener('pointerdown',e=>{sx=e.clientX;sy=e.clientY;pt=setTimeout(()=>flag(i),600);});
      c.addEventListener('pointerup',()=>clearTimeout(pt));
      c.addEventListener('pointercancel',()=>{clearTimeout(pt);flag(i);});
      c.addEventListener('pointermove',e=>{if(pt&&(Math.abs(e.clientX-sx)>15||Math.abs(e.clientY-sy)>15))clearTimeout(pt);});
      el.appendChild(c);
    }
  }

  function placeMines(avoid){let p=0;while(p<mines){const idx=Math.floor(Math.random()*rows*cols);if(!board[idx]&&idx!==avoid){board[idx]=-1;p++;}}
    for(let i=0;i<rows*cols;i++){if(board[i]===-1)continue;board[i]=neighbors(i).filter(n=>board[n]===-1).length;}}

  function neighbors(i){const r=Math.floor(i/cols),c=i%cols,ns=[];for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){if(!dr&&!dc)continue;const nr=r+dr,nc=c+dc;if(nr>=0&&nr<rows&&nc>=0&&nc<cols)ns.push(nr*cols+nc);}return ns;}

  function reveal(i){
    if(over||revealed[i]||flagged[i])return;
    if(!started){placeMines(i);started=true;timerInterval=setInterval(()=>{ti++;document.getElementById('timer').textContent='⏱ '+ti;},1000);}
    flood(i);checkWin();render();
  }

  function flood(i){if(revealed[i]||flagged[i])return;revealed[i]=true;if(board[i]===-1){over=true;clearInterval(timerInterval);showAllMines();showMsg('lose',t('hit'));}else if(board[i]===0)neighbors(i).forEach(flood);}

  function showAllMines(){for(let i=0;i<rows*cols;i++)if(board[i]===-1)revealed[i]=true;}

  function flag(i){if(over||revealed[i])return;flagged[i]=!flagged[i];document.getElementById('mineCount').textContent='💣 '+(mines-flagged.filter(Boolean).length);render();}

  function checkWin(){const safe=board.filter(v=>v!==-1).length;if(revealed.filter(Boolean).length>=safe){over=true;clearInterval(timerInterval);showMsg('win',t('win').replace('%s',ti));}}

  function showMsg(type,text){const el=document.getElementById('msg');el.className='msg '+type;el.textContent=text;el.style.display='block';}

  window.newGame=newGame;window.setDiff=setDiff;
  newGame();
})();
</script>
</body>
</html>
