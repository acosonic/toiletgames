<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ехо — Тоалет Игрице</title>
<meta name="theme-color" content="#e94560">
<script>(function(){var t=localStorage.getItem('tg-theme')||(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');if(t==='light')document.documentElement.classList.add('light');})()</script>
<style>
:root{--bg:#0f0f1a;--surface:#1a1a2e;--accent:#e94560;--text:#e0e0e0;--dim:#888}
html.light{--bg:#f0f2f5;--surface:#fff;--text:#1a1a2e;--dim:#666}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:18px}html.xl{font-size:22px}
body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;min-height:100dvh;-webkit-tap-highlight-color:transparent;touch-action:manipulation;transition:background .2s,color .2s}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--surface);gap:6px;border-bottom:1px solid #333}
html.light .topbar{border-bottom-color:#ddd}
.topbar a{color:var(--accent);text-decoration:none;font-size:.95rem;font-weight:700;white-space:nowrap}
.topbar h2{font-size:.95rem;font-weight:700;flex:1;text-align:center}
.topbar-btns{display:flex;gap:4px;flex-shrink:0}
.icon-btn{background:none;border:1px solid var(--dim);color:var(--text);border-radius:6px;padding:5px 8px;font-size:.78rem;cursor:pointer;white-space:nowrap;line-height:1}
.wrap{padding:12px 6px 24px;max-width:480px;margin:0 auto;display:flex;flex-direction:column;align-items:center;gap:12px}
.info{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:440px;padding:0 6px}
.level{font-size:1.1rem;font-weight:700}
.start-btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:8px 20px;font-size:.95rem;font-weight:700;cursor:pointer}
.status{font-size:1rem;font-weight:700;min-height:1.4em;text-align:center;color:var(--accent)}
.simon{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:16px;width:min(460px,calc(100vw-12px));aspect-ratio:1}
.btn{border-radius:24px;cursor:pointer;opacity:.7;transition:opacity .12s,transform .12s;border:5px solid transparent;user-select:none;min-height:100px}
.btn:active,.btn.lit{opacity:1;transform:scale(.95);border-color:rgba(255,255,255,.6)}
.btn.disabled{cursor:not-allowed}
#b0{background:#c0392b}#b1{background:#2980b9}#b2{background:#27ae60}#b3{background:#f39c12}
</style>
</head>
<body>
<div class="topbar">
  <a href="../" class="i18n" data-sr="← Назад" data-en="← Back">← Назад</a>
  <h2 class="i18n" data-sr="🎵 Ехо" data-en="🎵 Echo">🎵 Ехо</h2>
  <div class="topbar-btns">
    <button class="icon-btn theme-btn" onclick="toggleTheme()">🌙</button>
    <button class="icon-btn lang-btn" onclick="toggleLang()">EN</button>
    <button class="icon-btn sound-btn" onclick="toggleSound()">🔊</button>
    <button class="icon-btn" onclick="toggleFont()">Аа</button>
  </div>
</div>
<div class="wrap">
  <div class="info">
    <span class="level"><span class="i18n" data-sr="Ниво: " data-en="Level: ">Ниво: </span><span id="level">0</span></span>
    <button class="start-btn i18n" data-sr="Старт" data-en="Start" onclick="startGame()">Старт</button>
    <span class="level"><span class="i18n" data-sr="Рекорд: " data-en="Best: ">Рекорд: </span><span id="best">0</span></span>
  </div>
  <div class="status" id="status"></div>
  <div class="simon">
    <div id="b0" class="btn" onclick="press(0)"></div>
    <div id="b1" class="btn" onclick="press(1)"></div>
    <div id="b2" class="btn" onclick="press(2)"></div>
    <div id="b3" class="btn" onclick="press(3)"></div>
  </div>
</div>
<script>
(function(){
  const _lang=()=>localStorage.getItem('tg-lang')||(/^(sr|hr|bs)/i.test(navigator.language)?'sr':'en');
  const _theme=()=>localStorage.getItem('tg-theme')||(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');
  function applyTheme(){const d=_theme()==='dark';document.documentElement.classList.toggle('light',!d);document.querySelectorAll('.theme-btn').forEach(b=>b.textContent=d?'☀️':'🌙');}
  function applyI18n(){const L=_lang();document.querySelectorAll('[data-'+L+']').forEach(el=>el.textContent=el.dataset[L]);document.querySelectorAll('.lang-btn').forEach(b=>b.textContent=L==='sr'?'EN':'СР');document.documentElement.lang=L;}
  window.toggleTheme=()=>{localStorage.setItem('tg-theme',_theme()==='dark'?'light':'dark');applyTheme();};
  window.toggleLang=()=>{localStorage.setItem('tg-lang',_lang()==='sr'?'en':'sr');location.reload();};
  window.toggleFont=()=>{const xl=document.documentElement.classList.toggle('xl');localStorage.setItem('tg-xl',xl?'1':'0');};
  window.toggleSound=()=>{const on=localStorage.getItem('tg-sound')!=='0';localStorage.setItem('tg-sound',on?'0':'1');document.querySelectorAll('.sound-btn').forEach(b=>b.textContent=on?'🔇':'🔊');};
  if(localStorage.getItem('tg-xl')==='1')document.documentElement.classList.add('xl');
  applyTheme();applyI18n();document.querySelectorAll('.sound-btn').forEach(b=>b.textContent=localStorage.getItem('tg-sound')==='0'?'🔇':'🔊');
  const L=_lang();
  const T={sr:{start:'Притисни Старт',watch:'Гледај...',your:'Твој ред! (%s корака)',ok:'✅ Тачно!',wrong:'❌ Погрешно! Ниво: %s'},en:{start:'Press Start',watch:'Watch...',your:'Your turn! (%s steps)',ok:'✅ Correct!',wrong:'❌ Wrong! Level: %s'}};
  const t=(k,v)=>(T[L][k]||T.sr[k]).replace('%s',v);
  document.getElementById('status').textContent=t('start');

  function statRec(g,inc,hi,lo){const j=JSON.parse(localStorage.getItem('tg-stats')||'{}');const e=j[g]||{};for(const[k,v]of Object.entries(inc||{}))e[k]=(e[k]||0)+v;for(const[k,v]of Object.entries(hi||{}))if(v!=null&&(!e[k]||v>e[k]))e[k]=v;for(const[k,v]of Object.entries(lo||{}))if(v!=null&&(!e[k]||v<e[k]))e[k]=v;j[g]=e;localStorage.setItem('tg-stats',JSON.stringify(j));}

  const FREQS=[261,329,392,523];
  let seq=[],step,accepting,best=+localStorage.getItem('tg-simon-best')||0,ac;
  document.getElementById('best').textContent=best;

  function getAC(){if(!ac)ac=new(window.AudioContext||window.webkitAudioContext)();return ac;}

  function playTone(i,dur=.3){if(localStorage.getItem('tg-sound')==='0')return;const ctx=getAC();const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type='sine';o.frequency.value=FREQS[i];g.gain.setValueAtTime(.5,ctx.currentTime);g.gain.exponentialRampToValueAtTime(.01,ctx.currentTime+dur);o.start();o.stop(ctx.currentTime+dur);}

  function flash(i,dur=300){const el=document.getElementById('b'+i);el.classList.add('lit');playTone(i,dur/1000);setTimeout(()=>el.classList.remove('lit'),dur);}

  function startGame(){seq=[];step=0;accepting=false;setDisabled(true);document.getElementById('level').textContent=0;nextRound();}

  function nextRound(){
    seq.push(Math.floor(Math.random()*4));document.getElementById('level').textContent=seq.length;
    document.getElementById('status').textContent=t('watch');setDisabled(true);
    let i=0;
    function playNext(){if(i>=seq.length){setTimeout(()=>{accepting=true;step=0;setDisabled(false);document.getElementById('status').textContent=t('your',seq.length);},400);return;}flash(seq[i++]);setTimeout(playNext,600);}
    setTimeout(playNext,500);
  }

  function press(i){
    if(!accepting)return;flash(i,200);
    if(seq[step]!==i){accepting=false;setDisabled(true);playFail();document.getElementById('status').textContent=t('wrong',seq.length);if(seq.length>best){best=seq.length;localStorage.setItem('tg-simon-best',best);document.getElementById('best').textContent=best;}statRec('simon',{played:1},{bestScore:seq.length});return;}
    step++;if(step>=seq.length){accepting=false;setDisabled(true);document.getElementById('status').textContent=t('ok');setTimeout(nextRound,800);}
  }

  function playFail(){if(localStorage.getItem('tg-sound')==='0')return;const ctx=getAC();const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type='sawtooth';o.frequency.value=150;g.gain.setValueAtTime(.4,ctx.currentTime);g.gain.exponentialRampToValueAtTime(.01,ctx.currentTime+.6);o.start();o.stop(ctx.currentTime+.6);}

  function setDisabled(d){[0,1,2,3].forEach(i=>document.getElementById('b'+i).classList.toggle('disabled',d));}

  window.startGame=startGame;window.press=press;
})();
</script>
</body>
</html>
