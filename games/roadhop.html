<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Бубамара — Тоалет Игрице</title>
<meta name="theme-color" content="#e94560">
<script>(function(){var t=localStorage.getItem('tg-theme')||(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');if(t==='light')document.documentElement.classList.add('light');})()</script>
<style>
:root{--bg:#0f0f1a;--surface:#1a1a2e;--surface2:#16213e;--accent:#e94560;--text:#e0e0e0;--dim:#888}
html.light{--bg:#f0f2f5;--surface:#fff;--surface2:#e2e5ea;--text:#1a1a2e;--dim:#666}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:18px}html.xl{font-size:22px}
body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;min-height:100dvh;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--surface);gap:6px;border-bottom:1px solid var(--surface2)}
.topbar a{color:var(--accent);text-decoration:none;font-size:.95rem;font-weight:700;white-space:nowrap}
.topbar h2{font-size:.95rem;font-weight:700;flex:1;text-align:center}
.topbar-btns{display:flex;gap:4px;flex-shrink:0}
.icon-btn{background:none;border:1px solid var(--dim);color:var(--text);border-radius:6px;padding:5px 8px;font-size:.78rem;cursor:pointer;white-space:nowrap;line-height:1}
.wrap{padding:8px 4px 16px;display:flex;flex-direction:column;align-items:center;gap:8px}
.hud{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:420px;font-size:.9rem;font-weight:700;padding:0 4px}
canvas{display:block;touch-action:none}
.dpad{display:grid;grid-template-columns:repeat(3,60px);grid-template-rows:repeat(2,60px);gap:6px;margin-top:4px}
.dpad button{background:var(--surface);border:1px solid var(--surface2);border-radius:10px;color:var(--text);font-size:1.5rem;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.dpad button:active{background:var(--accent);color:#fff}
.dpad .up{grid-column:2;grid-row:1}
.dpad .left{grid-column:1;grid-row:2}
.dpad .down{grid-column:2;grid-row:2}
.dpad .right{grid-column:3;grid-row:2}
</style>
</head>
<body>
<div class="topbar">
  <a href="../" class="i18n" data-sr="← Назад" data-en="← Back">← Назад</a>
  <h2 class="i18n" data-sr="🐞 Бубамара" data-en="🐞 Ladybug">🐞 Бубамара</h2>
  <div class="topbar-btns">
    <button class="icon-btn theme-btn" onclick="toggleTheme()">🌙</button>
    <button class="icon-btn lang-btn" onclick="toggleLang()">EN</button>
    <button class="icon-btn sound-btn" onclick="toggleSound()">🔊</button>
    <button class="icon-btn" onclick="toggleFont()">Аа</button>
  </div>
</div>
<div class="wrap">
  <div class="hud">
    <span id="livesEl">❤️❤️❤️</span>
    <span id="scoreEl">0</span>
    <span id="bestEl">🏆 0</span>
  </div>
  <canvas id="game"></canvas>
  <div class="dpad">
    <button class="up"    ontouchstart="move(0,-1)" onclick="move(0,-1)">▲</button>
    <button class="left"  ontouchstart="move(-1,0)" onclick="move(-1,0)">◄</button>
    <button class="down"  ontouchstart="move(0,1)"  onclick="move(0,1)">▼</button>
    <button class="right" ontouchstart="move(1,0)"  onclick="move(1,0)">►</button>
  </div>
</div>
<script>
(function(){
  const _lang=()=>localStorage.getItem('tg-lang')||(/^(sr|hr|bs)/i.test(navigator.language)?'sr':'en');
  const _theme=()=>localStorage.getItem('tg-theme')||(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');
  function applyTheme(){const d=_theme()==='dark';document.documentElement.classList.toggle('light',!d);document.querySelectorAll('.theme-btn').forEach(b=>b.textContent=d?'☀️':'🌙');}
  function applyI18n(){const L=_lang();document.querySelectorAll('[data-'+L+']').forEach(el=>el.textContent=el.dataset[L]);document.querySelectorAll('.lang-btn').forEach(b=>b.textContent=L==='sr'?'EN':'СР');document.documentElement.lang=L;}
  window.toggleTheme=()=>{localStorage.setItem('tg-theme',_theme()==='dark'?'light':'dark');applyTheme();};
  window.toggleLang=()=>{localStorage.setItem('tg-lang',_lang()==='sr'?'en':'sr');location.reload();};
  window.toggleFont=()=>{const xl=document.documentElement.classList.toggle('xl');localStorage.setItem('tg-xl',xl?'1':'0');};
  window.toggleSound=()=>{const on=localStorage.getItem('tg-sound')!=='0';localStorage.setItem('tg-sound',on?'0':'1');document.querySelectorAll('.sound-btn').forEach(b=>b.textContent=on?'🔇':'🔊');};
  if(localStorage.getItem('tg-xl')==='1')document.documentElement.classList.add('xl');
  applyTheme();applyI18n();document.querySelectorAll('.sound-btn').forEach(b=>b.textContent=localStorage.getItem('tg-sound')==='0'?'🔇':'🔊');
})();

function statRec(g,inc,hi){const j=JSON.parse(localStorage.getItem('tg-stats')||'{}');const e=j[g]||{};for(const[k,v]of Object.entries(inc||{}))e[k]=(e[k]||0)+v;for(const[k,v]of Object.entries(hi||{}))if(v!=null&&(!e[k]||v>e[k]))e[k]=v;j[g]=e;localStorage.setItem('tg-stats',JSON.stringify(j));}

const SFX=(()=>{let ac;const A=()=>(ac=ac||new(window.AudioContext||window.webkitAudioContext)());const t=(f,d,tp,v)=>{if(localStorage.getItem('tg-sound')==='0')return;try{const c=A(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type=tp||'sine';o.frequency.value=f;g.gain.setValueAtTime(v||.2,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);o.start();o.stop(c.currentTime+d);}catch(e){}};
return{
  hop:()=>t(400,.06,'square',.1),
  die:()=>{t(200,.1,'sawtooth',.2);setTimeout(()=>t(150,.2,'sawtooth',.2),100);},
  score:()=>{t(523,.08);setTimeout(()=>t(659,.08),80);setTimeout(()=>t(784,.15),160);},
  over:()=>{t(300,.15,'sawtooth',.2);setTimeout(()=>t(200,.15,'sawtooth',.2),150);setTimeout(()=>t(150,.3,'sawtooth',.2),300);}
};})();

// ── grid ───────────────────────────────────────────────────────
const COLS = 9, ROWS = 9;
const CELL = Math.min(Math.floor((Math.min(window.innerWidth, 500) - 8) / COLS), 48);
const W = COLS * CELL, H = ROWS * CELL;

const canvas = document.getElementById('game');
canvas.width = W; canvas.height = H;
const ctx = canvas.getContext('2d');

// Row 0 = goal (top safe), rows 1-7 = traffic, row 8 = start (bottom safe)
// Tuned for fairness: all lanes n:2 (bigger gaps), gentler speeds, fewer
// long buses. Player must always have a passable gap to time.
const LANE = [
  null,
  {dir: 1,  spd:55, n:2, len:2, clr:'#4a9eff'},
  {dir:-1,  spd:80, n:2, len:1, clr:'#ffbb5b'},
  {dir: 1,  spd:50, n:2, len:1, clr:'#5cb85c'},
  {dir:-1,  spd:95, n:2, len:1, clr:'#e94560'},
  {dir: 1,  spd:70, n:2, len:1, clr:'#9b59b6'},
  {dir:-1,  spd:60, n:2, len:2, clr:'#ff7043'},
  {dir: 1,  spd:85, n:2, len:2, clr:'#26c6da'},
  null,
];

// ── state ──────────────────────────────────────────────────────
let cars, pCol, pRow, lives, score, best, lvl, dead, deadTimer, over, lastTs, raf;

function initGame() {
  best = +localStorage.getItem('tg-frogger-best') || 0;
  newGame();
}

function newGame() {
  score = 0; lives = 3; lvl = 1; over = false;
  makeCars(); resetPlayer();
  updateHUD();
  if (raf) cancelAnimationFrame(raf);
  lastTs = performance.now();
  raf = requestAnimationFrame(loop);
}

function makeCars() {
  cars = [];
  LANE.forEach((cfg, row) => {
    if (!cfg) return;
    const gap = W / cfg.n;
    for (let i = 0; i < cfg.n; i++) {
      cars.push({row, x: i * gap + Math.random() * (gap * 0.4),
        len: cfg.len, spd: cfg.spd * (1 + Math.min(lvl-1, 8)*0.1),
        dir: cfg.dir, clr: cfg.clr});
    }
  });
}

function resetPlayer() {
  pCol = Math.floor(COLS / 2);
  pRow = ROWS - 1;
  dead = false; deadTimer = 0;
}

// ── loop ───────────────────────────────────────────────────────
function loop(ts) {
  const dt = Math.min((ts - lastTs) / 1000, 0.05);
  lastTs = ts;
  update(dt);
  draw();
  if (!over) raf = requestAnimationFrame(loop);
}

function update(dt) {
  if (dead) {
    deadTimer -= dt;
    if (deadTimer <= 0) { lives <= 0 ? endGame() : resetPlayer(); }
    return;
  }
  cars.forEach(c => {
    c.x += c.spd * c.dir * dt;
    if (c.dir === 1  && c.x > W)               c.x -= W + c.len * CELL;
    if (c.dir === -1 && c.x < -c.len * CELL)   c.x += W + c.len * CELL;
    if (c.row === pRow) checkHit(c);
  });
}

function checkHit(c) {
  const px = pCol * CELL + CELL * 0.5;
  const margin = 4;
  if (px > c.x + margin && px < c.x + c.len * CELL - margin) die();
}

function die() {
  if (dead) return;
  dead = true; deadTimer = 0.75; lives--;
  SFX.die(); updateHUD();
}

function endGame() {
  over = true;
  statRec('frogger', {played:1, losses:1}, {bestScore:score});
  SFX.over();
  draw();
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, H/2 - 36, W, 72);
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${CELL * 0.6}px monospace`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  const L = localStorage.getItem('tg-lang') || 'sr';
  ctx.fillText(L==='sr' ? '💀 Крај игре' : '💀 Game Over', W/2, H/2 - 10);
  ctx.font = `${CELL * 0.4}px monospace`;
  ctx.fillText(L==='sr' ? 'Тапни за нову игру' : 'Tap to restart', W/2, H/2 + 18);
}

// ── move (player) ──────────────────────────────────────────────
window.move = function(dc, dr) {
  if (over) { newGame(); return; }
  if (dead) return;
  const nr = pRow + dr, nc = pCol + dc;
  if (nc < 0 || nc >= COLS || nr >= ROWS) return;
  if (nr < 0) {
    // Reached goal
    score += 10 * lvl;
    if (score > best) { best = score; localStorage.setItem('tg-frogger-best', best); }
    statRec('frogger', {played:0, wins:1}, {bestScore:score});
    SFX.score(); updateHUD();
    // Level up every 5 crossings
    if (score > 0 && score % (50 * lvl) === 0) { lvl++; makeCars(); }
    resetPlayer();
    return;
  }
  pRow = nr; pCol = nc;
  SFX.hop();
  // Immediate hit check after move
  cars.forEach(c => { if (c.row === pRow) checkHit(c); });
};

// ── draw ───────────────────────────────────────────────────────
function draw() {
  // Background rows
  for (let r = 0; r < ROWS; r++) {
    ctx.fillStyle = (r === 0 || r === ROWS-1) ? '#2d5a1b' : (r % 2 === 0 ? '#555' : '#444');
    ctx.fillRect(0, r * CELL, W, CELL);
  }
  // Goal markers
  for (let c = 0; c < COLS; c++) {
    ctx.fillStyle = '#3a7a23';
    ctx.fillRect(c * CELL + 4, 4, CELL - 8, CELL - 8);
  }
  // Lane direction arrows (subtle)
  LANE.forEach((cfg, r) => {
    if (!cfg) return;
    ctx.fillStyle = 'rgba(255,255,255,0.06)';
    ctx.font = `${CELL * 0.5}px monospace`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    for (let c = 0; c < COLS; c += 2)
      ctx.fillText(cfg.dir === 1 ? '→' : '←', c * CELL + CELL/2, r * CELL + CELL/2);
  });
  // Cars
  cars.forEach(c => {
    const x = c.x, y = c.row * CELL, cw = c.len * CELL, ch = CELL;
    // Body
    ctx.fillStyle = c.clr;
    ctx.beginPath();
    ctx.roundRect(x + 2, y + 4, cw - 4, ch - 8, 5);
    ctx.fill();
    // Windshield
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    const wx = c.dir === 1 ? x + cw * 0.55 : x + cw * 0.15;
    ctx.fillRect(wx, y + 7, cw * 0.3, ch - 16);
    // Wheels
    ctx.fillStyle = '#111';
    [[x + cw*0.15, y + ch - 7],[x + cw*0.78, y + ch - 7]].forEach(([wx,wy])=>{
      ctx.beginPath(); ctx.arc(wx, wy, CELL*0.15, 0, Math.PI*2); ctx.fill();
    });
  });
  // Player (ladybug)
  if (!over) drawLadybug(pCol * CELL + CELL/2, pRow * CELL + CELL/2, dead ? Math.sin(deadTimer*20)*3 : 0);
}

function drawLadybug(cx, cy, shake) {
  const r = CELL * 0.38;
  const x = cx + shake;
  // Shell
  ctx.fillStyle = dead ? '#888' : '#e94560';
  ctx.beginPath(); ctx.arc(x, cy, r, 0, Math.PI*2); ctx.fill();
  // Center line
  ctx.strokeStyle = '#111'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(x, cy - r); ctx.lineTo(x, cy + r); ctx.stroke();
  // Dots
  ctx.fillStyle = '#111';
  [[-r*.4,-r*.3],[r*.4,-r*.3],[-r*.4,r*.2],[r*.4,r*.2]].forEach(([dx,dy])=>{
    ctx.beginPath(); ctx.arc(x+dx, cy+dy, r*0.18, 0, Math.PI*2); ctx.fill();
  });
  // Head
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(x, cy - r * 0.85, r * 0.32, 0, Math.PI*2); ctx.fill();
  // Antennae
  ctx.strokeStyle = '#111'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(x - r*.15, cy - r*.95); ctx.lineTo(x - r*.4, cy - r*1.35); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x + r*.15, cy - r*.95); ctx.lineTo(x + r*.4, cy - r*1.35); ctx.stroke();
}

function updateHUD() {
  document.getElementById('livesEl').textContent = '❤️'.repeat(Math.max(0, lives));
  document.getElementById('scoreEl').textContent = score;
  document.getElementById('bestEl').textContent = '🏆 ' + best;
}

// ── input ──────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.which===37){e.preventDefault();move(-1,0);}
  else if(e.which===38){e.preventDefault();move(0,-1);}
  else if(e.which===39){e.preventDefault();move(1,0);}
  else if(e.which===40){e.preventDefault();move(0,1);}
});

// Swipe on canvas
let swipeX=0, swipeY=0;
canvas.addEventListener('touchstart', e=>{swipeX=e.touches[0].clientX;swipeY=e.touches[0].clientY;},{passive:true});
canvas.addEventListener('touchend', e=>{
  const dx=e.changedTouches[0].clientX-swipeX, dy=e.changedTouches[0].clientY-swipeY;
  if(Math.max(Math.abs(dx),Math.abs(dy))<10){if(over)newGame();return;}
  if(Math.abs(dx)>Math.abs(dy)) move(dx>0?1:-1,0); else move(0,dy>0?1:-1);
},{passive:true});

// Tap on canvas when over
canvas.addEventListener('click', ()=>{ if(over) newGame(); });

// Redraw on resume (offscreen canvas not used here, but main canvas may be cleared)
document.addEventListener('visibilitychange', ()=>{ if(document.visibilityState==='visible'&&!over) draw(); });

initGame();
</script>
</body>
</html>
