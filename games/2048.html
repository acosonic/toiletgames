<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>2048 — Тоалет Игрице</title>
<meta name="theme-color" content="#e94560">
<style>
:root{--bg:#0f0f1a;--surface:#1a1a2e;--surface2:#16213e;--accent:#e94560;--text:#e0e0e0;--dim:#888}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:18px}
html.xl{font-size:22px}
body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;min-height:100dvh;-webkit-tap-highlight-color:transparent;touch-action:manipulation;overflow:hidden}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--surface);gap:8px}
.topbar a{color:var(--accent);text-decoration:none;font-size:1rem;font-weight:700;white-space:nowrap}
.topbar h2{font-size:1rem;font-weight:700;flex:1;text-align:center}
.font-btn{background:none;border:1px solid var(--dim);color:var(--text);border-radius:6px;padding:5px 9px;font-size:0.8rem;cursor:pointer}
.wrap{padding:12px 10px 16px;max-width:420px;margin:0 auto;display:flex;flex-direction:column;align-items:center;gap:10px}
.scorebar{display:flex;gap:16px;align-items:center}
.score-box{background:var(--surface);border-radius:8px;padding:6px 16px;text-align:center}
.score-box .lbl{font-size:0.7rem;color:var(--dim);text-transform:uppercase}
.score-box .val{font-size:1.2rem;font-weight:700}
.new-btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:8px 18px;font-size:0.95rem;font-weight:700;cursor:pointer}
#grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;background:#16213e;border-radius:12px;padding:8px;width:min(360px,calc(100vw - 20px));aspect-ratio:1}
.tile{border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:1.3rem;transition:transform 0.08s;height:100%}
html.xl .tile{font-size:1.6rem}
.t0{background:#1a1a2e}
.t2{background:#3a3a5c;color:#e0e0e0}
.t4{background:#4a3a6c;color:#e0e0e0}
.t8{background:#e94560;color:#fff}
.t16{background:#c0392b;color:#fff}
.t32{background:#e67e22;color:#fff}
.t64{background:#d35400;color:#fff}
.t128{background:#f1c40f;color:#1a1a2e;font-size:1.1rem}
.t256{background:#f39c12;color:#1a1a2e;font-size:1rem}
.t512{background:#27ae60;color:#fff;font-size:0.95rem}
.t1024{background:#2980b9;color:#fff;font-size:0.85rem}
.t2048{background:#8e44ad;color:#fff;font-size:0.8rem}
html.xl .t128{font-size:1.35rem}
html.xl .t256{font-size:1.25rem}
html.xl .t512{font-size:1.1rem}
html.xl .t1024{font-size:1rem}
html.xl .t2048{font-size:0.95rem}
.thigh{background:#e94560;color:#fff;font-size:0.75rem}
.msg{font-size:1.1rem;font-weight:700;padding:10px 20px;border-radius:8px;display:none}
.msg.win{background:#1a3a1a;color:#5cb85c}
.msg.lose{background:#3a1a1a;color:#e94560}
.hint{font-size:0.75rem;color:var(--dim);text-align:center}
</style>
</head>
<body>
<div class="topbar">
  <a href="../">← Назад</a>
  <h2>🔢 2048</h2>
  <button class="font-btn" onclick="toggleFont()">Аа</button>
</div>
<div class="wrap">
  <div class="scorebar">
    <div class="score-box"><div class="lbl">Поени</div><div class="val" id="score">0</div></div>
    <button class="new-btn" onclick="newGame()">Нова</button>
    <div class="score-box"><div class="lbl">Рекорд</div><div class="val" id="best">0</div></div>
  </div>
  <div id="grid"></div>
  <div id="msg" class="msg"></div>
  <p class="hint">Превуци да помераш плочице</p>
</div>
<script>
(function(){
  let grid,score,best=+localStorage.getItem('tg-2048-best')||0,over;
  document.getElementById('best').textContent=best;

  function toggleFont(){const xl=document.documentElement.classList.toggle('xl');localStorage.setItem('tg-xl',xl?'1':'0');}
  if(localStorage.getItem('tg-xl')==='1')document.documentElement.classList.add('xl');

  function newGame(){
    grid=Array.from({length:4},()=>Array(4).fill(0));
    score=0;over=false;
    addTile();addTile();
    document.getElementById('msg').style.display='none';
    render();
  }

  function addTile(){
    const empty=[];
    for(let r=0;r<4;r++)for(let c=0;c<4;c++)if(!grid[r][c])empty.push([r,c]);
    if(!empty.length)return;
    const [r,c]=empty[Math.floor(Math.random()*empty.length)];
    grid[r][c]=Math.random()<0.9?2:4;
  }

  function render(){
    document.getElementById('score').textContent=score;
    const el=document.getElementById('grid');
    el.innerHTML='';
    for(let r=0;r<4;r++)for(let c=0;c<4;c++){
      const v=grid[r][c];
      const d=document.createElement('div');
      d.className='tile '+(v<=2048?'t'+v:'thigh');
      d.textContent=v||'';
      el.appendChild(d);
    }
  }

  function slideRow(row){
    let a=row.filter(x=>x);
    for(let i=0;i<a.length-1;i++){
      if(a[i]===a[i+1]){score+=a[i]*2;a[i]*=2;a.splice(i+1,1);}
    }
    while(a.length<4)a.push(0);
    return a;
  }

  function move(dir){
    if(over)return;
    const prev=JSON.stringify(grid);
    if(dir==='left'){for(let r=0;r<4;r++)grid[r]=slideRow(grid[r]);}
    else if(dir==='right'){for(let r=0;r<4;r++)grid[r]=slideRow(grid[r].slice().reverse()).reverse();}
    else if(dir==='up'){for(let c=0;c<4;c++){let col=grid.map(r=>r[c]);col=slideRow(col);grid.forEach((r,i)=>r[c]=col[i]);}}
    else if(dir==='down'){for(let c=0;c<4;c++){let col=grid.map(r=>r[c]).reverse();col=slideRow(col).reverse();grid.forEach((r,i)=>r[c]=col[i]);}}
    if(JSON.stringify(grid)!==prev){
      addTile();
      if(score>best){best=score;localStorage.setItem('tg-2048-best',best);document.getElementById('best').textContent=best;}
      render();
      checkEnd();
    }
  }

  function checkEnd(){
    let has2048=grid.some(r=>r.some(v=>v===2048));
    if(has2048){over=true;showMsg('win','🎉 Победа! Достигао 2048!');}
    else if(!canMove()){over=true;showMsg('lose','💀 Нема потеза. Крај!');}
  }

  function canMove(){
    for(let r=0;r<4;r++)for(let c=0;c<4;c++){
      if(!grid[r][c])return true;
      if(c<3&&grid[r][c]===grid[r][c+1])return true;
      if(r<3&&grid[r][c]===grid[r+1][c])return true;
    }
    return false;
  }

  function showMsg(type,text){
    const el=document.getElementById('msg');
    el.className='msg '+type;el.textContent=text;el.style.display='block';
  }

  // Touch swipe
  let tx,ty;
  document.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
  document.addEventListener('touchend',e=>{
    const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;
    if(Math.max(Math.abs(dx),Math.abs(dy))<20)return;
    if(Math.abs(dx)>Math.abs(dy))move(dx>0?'right':'left');
    else move(dy>0?'down':'up');
  },{passive:true});

  document.addEventListener('keydown',e=>{
    const map={ArrowLeft:'left',ArrowRight:'right',ArrowUp:'up',ArrowDown:'down'};
    if(map[e.key]){e.preventDefault();move(map[e.key]);}
  });

  window.toggleFont=toggleFont;
  window.newGame=newGame;
  newGame();
})();
</script>
</body>
</html>
