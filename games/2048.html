<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>2048 — Тоалет Игрице</title>
<meta name="theme-color" content="#e94560">
<script>(function(){var t=localStorage.getItem('tg-theme')||(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');if(t==='light')document.documentElement.classList.add('light');})()</script>
<style>
:root{--bg:#0f0f1a;--surface:#1a1a2e;--surface2:#16213e;--accent:#e94560;--text:#e0e0e0;--dim:#888}
html.light{--bg:#f0f2f5;--surface:#fff;--surface2:#e2e5ea;--text:#1a1a2e;--dim:#666}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:18px}html.xl{font-size:22px}
body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;min-height:100dvh;-webkit-tap-highlight-color:transparent;touch-action:none;overflow:hidden;transition:background .2s,color .2s}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--surface);gap:6px;border-bottom:1px solid var(--surface2)}
.topbar a{color:var(--accent);text-decoration:none;font-size:.95rem;font-weight:700;white-space:nowrap}
.topbar h2{font-size:.95rem;font-weight:700;flex:1;text-align:center}
.topbar-btns{display:flex;gap:4px;flex-shrink:0}
.icon-btn{background:none;border:1px solid var(--dim);color:var(--text);border-radius:6px;padding:5px 8px;font-size:.78rem;cursor:pointer;white-space:nowrap;line-height:1}
.wrap{padding:12px 10px 16px;max-width:420px;margin:0 auto;display:flex;flex-direction:column;align-items:center;gap:10px}
.scorebar{display:flex;gap:16px;align-items:center}
.score-box{background:var(--surface);border-radius:8px;padding:6px 16px;text-align:center}
.score-box .lbl{font-size:.7rem;color:var(--dim);text-transform:uppercase}
.score-box .val{font-size:1.2rem;font-weight:700}
.target-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;justify-content:center}
.target-label{font-size:.75rem;color:var(--dim);font-weight:700;text-transform:uppercase}
.target-btn{background:var(--surface);border:1px solid var(--dim);color:var(--text);border-radius:7px;padding:5px 9px;font-size:.78rem;font-weight:800;cursor:pointer}
.target-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.new-btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:8px 18px;font-size:.9rem;font-weight:700;cursor:pointer}
#grid{display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(4,1fr);gap:8px;border-radius:12px;padding:8px;width:min(360px,calc(100vw - 20px));aspect-ratio:1}
html:not(.light) #grid{background:#16213e}
html.light #grid{background:#ced2d9}
.tile{border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:1.3rem;min-height:0;overflow:hidden}
html.xl .tile{font-size:1.6rem}
html:not(.light) .t0{background:#1a1a2e}
html.light .t0{background:#b8bec8}
.t2{background:#3a3a5c;color:#e0e0e0}.t4{background:#4a3a6c;color:#e0e0e0}
html.light .t2{background:#eee4da;color:#776e65}
html.light .t4{background:#ede0c8;color:#776e65}
.t8{background:#e94560;color:#fff}.t16{background:#c0392b;color:#fff}.t32{background:#e67e22;color:#fff}
.t64{background:#d35400;color:#fff}.t128{background:#f1c40f;color:#1a1a2e;font-size:1.1rem}
.t256{background:#f39c12;color:#1a1a2e;font-size:1rem}.t512{background:#27ae60;color:#fff;font-size:.95rem}
.t1024{background:#2980b9;color:#fff;font-size:.85rem}.t2048{background:#8e44ad;color:#fff;font-size:.8rem}
html.xl .t128,.html.xl .t256{font-size:1.35rem}
.thigh{background:#e94560;color:#fff;font-size:.75rem}
.msg{font-size:1.05rem;font-weight:700;padding:8px 16px;border-radius:8px;display:none}
.msg.win{background:#1a3a1a;color:#5cb85c}.msg.lose{background:#3a1a1a;color:#e94560}
html.light .msg.win{background:#d4edda;color:#155724}html.light .msg.lose{background:#f8d7da;color:#721c24}
.hint{font-size:.75rem;color:var(--dim);text-align:center}
</style>
</head>
<body>
<div class="topbar">
  <a href="../" class="i18n" data-sr="← Назад" data-en="← Back">← Назад</a>
  <h2>🔢 2048</h2>
  <div class="topbar-btns">
    <button class="icon-btn theme-btn" onclick="toggleTheme()">🌙</button>
    <button class="icon-btn lang-btn" onclick="toggleLang()">EN</button>
    <button class="icon-btn sound-btn" onclick="toggleSound()">🔊</button>
    <button class="icon-btn" onclick="toggleFont()">Аа</button>
  </div>
</div>
<div class="wrap">
  <div class="scorebar">
    <div class="score-box"><div class="lbl i18n" data-sr="Поени" data-en="Score">Поени</div><div class="val" id="score">0</div></div>
    <button class="new-btn i18n" data-sr="Нова" data-en="New" onclick="newGame()">Нова</button>
    <div class="score-box"><div class="lbl i18n" data-sr="Рекорд" data-en="Best">Рекорд</div><div class="val" id="best">0</div></div>
  </div>
  <div class="target-row" id="targetRow">
    <span class="target-label i18n" data-sr="Циљ" data-en="Target">Циљ</span>
  </div>
  <div id="grid"></div>
  <div id="msg" class="msg"></div>
  <p class="hint i18n" data-sr="Превуци да помераш плочице" data-en="Swipe to move tiles">Превуци да помераш плочице</p>
</div>
<script>
(function(){
  const _lang=()=>localStorage.getItem('tg-lang')||(/^(sr|hr|bs)/i.test(navigator.language)?'sr':'en');
  const _theme=()=>localStorage.getItem('tg-theme')||(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');
  function applyTheme(){const d=_theme()==='dark';document.documentElement.classList.toggle('light',!d);document.querySelectorAll('.theme-btn').forEach(b=>b.textContent=d?'☀️':'🌙');}
  function applyI18n(){const L=_lang();document.querySelectorAll('[data-'+L+']').forEach(el=>el.textContent=el.dataset[L]);document.querySelectorAll('.lang-btn').forEach(b=>b.textContent=L==='sr'?'EN':'СР');document.documentElement.lang=L;}
  window.toggleTheme=()=>{localStorage.setItem('tg-theme',_theme()==='dark'?'light':'dark');applyTheme();};
  window.toggleLang=()=>{localStorage.setItem('tg-lang',_lang()==='sr'?'en':'sr');location.reload();};
  window.toggleFont=()=>{const xl=document.documentElement.classList.toggle('xl');localStorage.setItem('tg-xl',xl?'1':'0');};
  window.toggleSound=()=>{const on=localStorage.getItem('tg-sound')!=='0';localStorage.setItem('tg-sound',on?'0':'1');document.querySelectorAll('.sound-btn').forEach(b=>b.textContent=on?'🔇':'🔊');};
  if(localStorage.getItem('tg-xl')==='1')document.documentElement.classList.add('xl');
  applyTheme();applyI18n();document.querySelectorAll('.sound-btn').forEach(b=>b.textContent=localStorage.getItem('tg-sound')==='0'?'🔇':'🔊');

  const L=_lang();
  const winTarget=target=>L==='sr'?'🎉 Победа! Достигао '+target+'!':'🎉 You won! Reached '+target+'!';
  const noMoves=L==='sr'?'💀 Нема потеза. Крај!':'💀 No moves left. Game over!';

  const SAVE_KEY='tg-2048-state';
  const TARGET_KEY='tg-2048-target';
  const TARGETS=[256,512,1024,2048,4096];
  let targetTile=TARGETS.includes(+localStorage.getItem(TARGET_KEY))?+localStorage.getItem(TARGET_KEY):2048;
  let grid,score,best=+localStorage.getItem('tg-2048-best')||0,over,msgState=null;
  document.getElementById('best').textContent=best;

  function statRec(g,inc,hi,lo){const j=JSON.parse(localStorage.getItem('tg-stats')||'{}');const e=j[g]||{};for(const[k,v]of Object.entries(inc||{}))e[k]=(e[k]||0)+v;for(const[k,v]of Object.entries(hi||{}))if(v!=null&&(!e[k]||v>e[k]))e[k]=v;for(const[k,v]of Object.entries(lo||{}))if(v!=null&&(!e[k]||v<e[k]))e[k]=v;j[g]=e;localStorage.setItem('tg-stats',JSON.stringify(j));}
  const SFX=(()=>{let ac;const A=()=>(ac=ac||new(window.AudioContext||window.webkitAudioContext)());const t=(f,d,tp,v)=>{if(localStorage.getItem('tg-sound')==='0')return;try{const c=A(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type=tp||'sine';o.frequency.value=f;g.gain.setValueAtTime(v||.25,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);o.start();o.stop(c.currentTime+d);}catch(e){}};return{merge:()=>t(300,.08,'sine',.15),win(){t(523,.1);setTimeout(()=>t(659,.1),100);setTimeout(()=>t(784,.25),200);},lose(){t(330,.1,'sawtooth',.2);setTimeout(()=>t(220,.2,'sawtooth',.15),100);}};})();

  function validGrid(g){return Array.isArray(g)&&g.length===4&&g.every(r=>Array.isArray(r)&&r.length===4&&r.every(v=>Number.isInteger(v)&&v>=0));}

  function saveState(){try{localStorage.setItem(SAVE_KEY,JSON.stringify({grid,score,over,msgState,targetTile}));}catch(e){}}

  function loadState(){
    try{
      const s=JSON.parse(localStorage.getItem(SAVE_KEY)||'null');
      if(!s||!validGrid(s.grid))return false;
      if(TARGETS.includes(+s.targetTile))targetTile=+s.targetTile;
      localStorage.setItem(TARGET_KEY,targetTile);
      grid=s.grid;score=Number.isFinite(s.score)?s.score:0;over=!!s.over;msgState=s.msgState||null;
      return true;
    }catch(e){return false;}
  }

  function renderTargets(){
    const row=document.getElementById('targetRow');
    row.querySelectorAll('.target-btn').forEach(b=>b.remove());
    TARGETS.forEach(v=>{
      const b=document.createElement('button');
      b.className='target-btn'+(v===targetTile?' active':'');
      b.textContent=v;
      b.addEventListener('click',()=>setTarget(v));
      row.appendChild(b);
    });
  }

  function setTarget(v){
    if(v===targetTile)return;
    targetTile=v;
    localStorage.setItem(TARGET_KEY,targetTile);
    renderTargets();
    newGame();
  }

  function newGame(){grid=Array.from({length:4},()=>Array(4).fill(0));score=0;over=false;msgState=null;addTile();addTile();document.getElementById('msg').style.display='none';render();saveState();}

  function resumeOrNew(){if(loadState()){renderTargets();render();if(msgState)showMsg(msgState.type,msgState.text,false);}else{renderTargets();newGame();}}

  function addTile(){const empty=[];for(let r=0;r<4;r++)for(let c=0;c<4;c++)if(!grid[r][c])empty.push([r,c]);if(!empty.length)return;const[r,c]=empty[Math.floor(Math.random()*empty.length)];grid[r][c]=Math.random()<.9?2:4;}

  function render(){
    document.getElementById('score').textContent=score;
    const el=document.getElementById('grid');el.innerHTML='';
    for(let r=0;r<4;r++)for(let c=0;c<4;c++){const v=grid[r][c];const d=document.createElement('div');d.className='tile '+(v<=2048?'t'+v:'thigh');d.textContent=v||'';el.appendChild(d);}
  }

  function slideRow(row){let a=row.filter(x=>x);for(let i=0;i<a.length-1;i++){if(a[i]===a[i+1]){score+=a[i]*2;a[i]*=2;a.splice(i+1,1);}}while(a.length<4)a.push(0);return a;}

  function move(dir){
    if(over)return;const prev=JSON.stringify(grid);const prevScore=score;
    if(dir==='left')for(let r=0;r<4;r++)grid[r]=slideRow(grid[r]);
    else if(dir==='right')for(let r=0;r<4;r++)grid[r]=slideRow(grid[r].slice().reverse()).reverse();
    else if(dir==='up')for(let c=0;c<4;c++){let col=grid.map(r=>r[c]);col=slideRow(col);grid.forEach((r,i)=>r[c]=col[i]);}
    else if(dir==='down')for(let c=0;c<4;c++){let col=grid.map(r=>r[c]).reverse();col=slideRow(col).reverse();grid.forEach((r,i)=>r[c]=col[i]);}
    if(JSON.stringify(grid)!==prev){addTile();if(score>best){best=score;localStorage.setItem('tg-2048-best',best);document.getElementById('best').textContent=best;}if(score>prevScore)SFX.merge();render();checkEnd();saveState();}
  }

  function checkEnd(){if(grid.some(r=>r.some(v=>v>=targetTile))){over=true;SFX.win();celebrate();statRec('2048',{played:1,wins:1},{bestScore:score,bestTile:targetTile});showMsg('win',winTarget(targetTile));}else if(!canMove()){const bt=Math.max(...grid.flat());over=true;SFX.lose();statRec('2048',{played:1},{bestScore:score,bestTile:bt});showMsg('lose',noMoves);}}

  function canMove(){for(let r=0;r<4;r++)for(let c=0;c<4;c++){if(!grid[r][c])return true;if(c<3&&grid[r][c]===grid[r][c+1])return true;if(r<3&&grid[r][c]===grid[r+1][c])return true;}return false;}

  function showMsg(type,text,save=true){msgState={type,text};const el=document.getElementById('msg');el.className='msg '+type;el.textContent=text;el.style.display='block';if(save)saveState();}

  let tx,ty;
  document.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
  document.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;if(Math.max(Math.abs(dx),Math.abs(dy))<20)return;if(Math.abs(dx)>Math.abs(dy))move(dx>0?'right':'left');else move(dy>0?'down':'up');},{passive:true});
  document.addEventListener('keydown',e=>{const m={ArrowLeft:'left',ArrowRight:'right',ArrowUp:'up',ArrowDown:'down'};if(m[e.key]){e.preventDefault();move(m[e.key]);}});

  window.newGame=newGame;window.setTarget=setTarget;resumeOrNew();
})();
</script>
<script>
// Victory fireworks — bursts of stars + sparks across the screen, then auto-removes.
window.celebrate=function(){
  if(window.matchMedia&&window.matchMedia("(prefers-reduced-motion:reduce)").matches)return;
  var cv=document.createElement("canvas");
  cv.style.cssText="position:fixed;inset:0;width:100vw;height:100vh;pointer-events:none;z-index:99999";
  function size(){cv.width=window.innerWidth;cv.height=window.innerHeight;}
  size();window.addEventListener("resize",size);
  document.body.appendChild(cv);
  var cx=cv.getContext("2d");
  var COL=["#e94560","#ffd166","#06d6a0","#4dd0e1","#9b6bff","#ff7043","#ffffff"];
  var ps=[],frame=0,bursts=0,MAX=7,nextAt=0;
  function star(x,y,r,rot){cx.beginPath();for(var i=0;i<10;i++){var rr=i%2?r*0.45:r,a=rot+i*Math.PI/5;cx.lineTo(x+Math.cos(a)*rr,y+Math.sin(a)*rr);}cx.closePath();cx.fill();}
  function burst(x,y){var hue=COL[Math.random()*COL.length|0],n=40+(Math.random()*22|0);for(var i=0;i<n;i++){var a=Math.random()*Math.PI*2,sp=Math.random()*4.6+1.2;ps.push({x:x,y:y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-1.2,age:0,life:55+Math.random()*35,c:Math.random()<.4?"#fff":hue,sz:Math.random()*2.4+1.4,star:Math.random()<.5,rot:Math.random()*6});}}
  function loop(){
    frame++;
    if(bursts<MAX&&frame>=nextAt){burst(Math.random()*cv.width,cv.height*(0.12+Math.random()*0.45));bursts++;nextAt=frame+6+(Math.random()*16|0);}
    cx.clearRect(0,0,cv.width,cv.height);
    for(var i=ps.length-1;i>=0;i--){var p=ps[i];p.age++;p.vy+=0.07;p.vx*=0.99;p.vy*=0.99;p.x+=p.vx;p.y+=p.vy;p.rot+=0.12;var al=1-p.age/p.life;if(al<=0){ps.splice(i,1);continue;}cx.globalAlpha=al;cx.fillStyle=p.c;if(p.star)star(p.x,p.y,p.sz*2,p.rot);else{cx.beginPath();cx.arc(p.x,p.y,p.sz,0,6.283);cx.fill();}}
    cx.globalAlpha=1;
    if(ps.length||bursts<MAX)requestAnimationFrame(loop);
    else{window.removeEventListener("resize",size);cv.remove();}
  }
  requestAnimationFrame(loop);
};
</script>
</body>
</html>
