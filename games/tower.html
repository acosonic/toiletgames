<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Торањ — Тоалет Игрице</title>
<meta name="theme-color" content="#e94560">
<script>(function(){var t=localStorage.getItem('tg-theme')||(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');if(t==='light')document.documentElement.classList.add('light');})()</script>
<!--
  Торањ — a tower-stacking game (Tower Bloxx style): a block swings from a
  crane, tap to drop it, the overlap becomes the new block, perfect aligns
  give a combo bonus, 3 lives. Original concept & rules:
  "Tower Building Game" by iamkun / BMQB, Inc — https://github.com/iamkun/tower_game
  Licensed MIT (Copyright (c) 2018 BMQB, Inc). This is an independent
  clean-room re-implementation written for this hub (no original code or
  assets used); credit to the original author for the game design.
-->
<style>
:root{--bg:#0f0f1a;--surface:#1a1a2e;--surface2:#16213e;--accent:#e94560;--text:#e0e0e0;--dim:#888}
html.light{--bg:#f0f2f5;--surface:#fff;--surface2:#e2e5ea;--text:#1a1a2e;--dim:#666}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:18px}html.xl{font-size:22px}
body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;min-height:100dvh;-webkit-tap-highlight-color:transparent;touch-action:none;overflow:hidden;transition:background .2s,color .2s}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--surface);gap:6px;border-bottom:1px solid var(--surface2)}
.topbar a{color:var(--accent);text-decoration:none;font-size:.95rem;font-weight:700;white-space:nowrap}
.topbar h2{font-size:.95rem;font-weight:700;flex:1;text-align:center}
.topbar-btns{display:flex;gap:4px;flex-shrink:0}
.icon-btn{background:none;border:1px solid var(--dim);color:var(--text);border-radius:6px;padding:5px 8px;font-size:.78rem;cursor:pointer;white-space:nowrap;line-height:1}
.wrap{padding:6px 4px 6px;display:flex;flex-direction:column;align-items:center;gap:6px}
.hud{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:440px;font-size:1rem;font-weight:700;padding:0 8px}
canvas{display:block;border-radius:10px;touch-action:none}
.drop-btn{background:var(--accent);color:#fff;border:none;border-radius:12px;padding:12px 30px;font-size:1.1rem;font-weight:800;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation;letter-spacing:.04em}
.credit{font-size:.68rem;color:var(--dim);text-align:center;line-height:1.3}
.credit a{color:var(--dim)}
.modal{position:fixed;inset:0;z-index:60;background:rgba(0,0,0,.62);display:none;align-items:center;justify-content:center;padding:20px}
.modal.show{display:flex;animation:moFade .2s ease}
@keyframes moFade{from{opacity:0}to{opacity:1}}
.modal-card{background:var(--surface);border:1px solid var(--surface2);border-radius:18px;padding:22px 26px;max-width:320px;width:100%;text-align:center;display:flex;flex-direction:column;gap:8px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.mo-title{font-size:1.4rem;font-weight:800}
.mo-big{line-height:1;margin:4px 0}
.mo-big #moFloors{font-size:3.2rem;font-weight:900;color:var(--accent)}
.mo-unit{font-size:1rem;font-weight:700;color:var(--dim)}
.mo-score{font-size:1rem;font-weight:700;color:var(--dim)}
.mo-comment{font-size:1.02rem;font-weight:800;min-height:1.2em;margin-top:2px}
.modal-card .drop-btn{margin-top:10px;align-self:center}
.help-card{text-align:left;max-height:82vh;overflow:auto}
.help-body{font-size:.92rem;line-height:1.5;font-weight:500}
.help-body b{color:var(--accent)}
</style>
</head>
<body>
<div class="topbar">
  <a href="../" class="i18n" data-sr="← Назад" data-en="← Back">← Назад</a>
  <h2 class="i18n" data-sr="🏗️ Торањ" data-en="🏗️ Tower">🏗️ Торањ</h2>
  <div class="topbar-btns">
    <button class="icon-btn" onclick="showHelp()" aria-label="Help">?</button>
    <button class="icon-btn theme-btn" onclick="toggleTheme()">🌙</button>
    <button class="icon-btn lang-btn" onclick="toggleLang()">EN</button>
    <button class="icon-btn sound-btn" onclick="toggleSound()">🔊</button>
    <button class="icon-btn" onclick="toggleFont()">Аа</button>
  </div>
</div>
<div class="wrap">
  <div class="hud">
    <span id="livesEl">❤️❤️❤️</span>
    <span id="scoreEl">0</span>
    <span id="bestEl">🏆 0</span>
  </div>
  <canvas id="game"></canvas>
  <button class="drop-btn i18n" id="dropBtn" data-sr="ПУСТИ" data-en="DROP">ПУСТИ</button>
  <p class="credit">
    <span class="i18n" data-sr="Идеја:" data-en="Concept:">Идеја:</span>
    <a href="https://github.com/iamkun/tower_game" target="_blank" rel="noopener">iamkun/tower_game</a> · MIT
  </p>
</div>
<div class="modal" id="helpModal">
  <div class="modal-card help-card">
    <div class="mo-title" id="helpTitle"></div>
    <div class="help-body" id="helpBody"></div>
    <button class="drop-btn" id="helpClose"></button>
  </div>
</div>
<div class="modal" id="overModal">
  <div class="modal-card">
    <div class="mo-title" id="moTitle"></div>
    <div class="mo-big"><span id="moFloors">0</span> <span class="mo-unit" id="moUnit"></span></div>
    <div class="mo-score" id="moScore"></div>
    <div class="mo-comment" id="moComment"></div>
    <button class="drop-btn" id="againBtn"></button>
  </div>
</div>
<script>
(function(){
  const _lang=()=>localStorage.getItem('tg-lang')||(/^(sr|hr|bs)/i.test(navigator.language)?'sr':'en');
  const _theme=()=>localStorage.getItem('tg-theme')||(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');
  function applyTheme(){const d=_theme()==='dark';document.documentElement.classList.toggle('light',!d);document.querySelectorAll('.theme-btn').forEach(b=>b.textContent=d?'☀️':'🌙');}
  function applyI18n(){const L=_lang();document.querySelectorAll('[data-'+L+']').forEach(el=>el.textContent=el.dataset[L]);document.querySelectorAll('.lang-btn').forEach(b=>b.textContent=L==='sr'?'EN':'СР');document.documentElement.lang=L;}
  window.toggleTheme=()=>{localStorage.setItem('tg-theme',_theme()==='dark'?'light':'dark');applyTheme();};
  window.toggleLang=()=>{localStorage.setItem('tg-lang',_lang()==='sr'?'en':'sr');location.reload();};
  window.toggleFont=()=>{const xl=document.documentElement.classList.toggle('xl');localStorage.setItem('tg-xl',xl?'1':'0');};
  window.toggleSound=()=>{const on=localStorage.getItem('tg-sound')!=='0';localStorage.setItem('tg-sound',on?'0':'1');document.querySelectorAll('.sound-btn').forEach(b=>b.textContent=on?'🔇':'🔊');};
  if(localStorage.getItem('tg-xl')==='1')document.documentElement.classList.add('xl');
  applyTheme();applyI18n();document.querySelectorAll('.sound-btn').forEach(b=>b.textContent=localStorage.getItem('tg-sound')==='0'?'🔇':'🔊');
})();

function statRec(g,inc,hi){const j=JSON.parse(localStorage.getItem('tg-stats')||'{}');const e=j[g]||{};for(const[k,v]of Object.entries(inc||{}))e[k]=(e[k]||0)+v;for(const[k,v]of Object.entries(hi||{}))if(v!=null&&(!e[k]||v>e[k]))e[k]=v;j[g]=e;localStorage.setItem('tg-stats',JSON.stringify(j));}

const SFX=(()=>{let ac;const A=()=>(ac=ac||new(window.AudioContext||window.webkitAudioContext)());const t=(f,d,tp,v)=>{if(localStorage.getItem('tg-sound')==='0')return;try{const c=A(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type=tp||'sine';o.frequency.value=f;g.gain.setValueAtTime(v||.2,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);o.start();o.stop(c.currentTime+d);}catch(e){}};
return{
  land:()=>t(150,.1,'square',.16),
  slice:()=>t(300,.05,'sawtooth',.1),
  perfect(){t(784,.08);setTimeout(()=>t(1175,.12),70);},
};})();
// Loss sound only (no banner — arcade style), reusing the hub's vendored clip.
function failSound(){if(localStorage.getItem('tg-sound')!=='0'){try{var a=new Audio('./whah.wav');a.volume=0.8;a.play().catch(function(){});}catch(e){}}}

const L=()=>localStorage.getItem('tg-lang')||'sr';
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
const isLight=()=>(localStorage.getItem('tg-theme')||(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light'))==='light';

// ── sizes (set in resize) ──────────────────────────────────────
let W,H,BH,ANCHOR,DROPH,PTHRESH;
// ── state ──────────────────────────────────────────────────────
let blocks,incoming,offcuts,camY,score,best,lives,combo,over,started,raf,lastTs,startBest,paused;

best=+localStorage.getItem('tg-tower-best')||0;

function resize(){
  const wrap=document.querySelector('.wrap');
  const topbar=document.querySelector('.topbar').offsetHeight;
  const hud=document.querySelector('.hud').offsetHeight;
  const btn=document.querySelector('.drop-btn').offsetHeight;
  const cr=document.querySelector('.credit').offsetHeight;
  const cs=getComputedStyle(wrap);
  const extra=(parseFloat(cs.rowGap)||0)*3+parseFloat(cs.paddingTop)+parseFloat(cs.paddingBottom)+10;
  const oldW=W;
  W=Math.min(440,window.innerWidth-8);
  H=Math.max(260,window.innerHeight-topbar-hud-btn-cr-extra);
  H=Math.min(H,W*1.6);
  canvas.width=W;canvas.height=H;canvas.style.width=W+'px';canvas.style.height=H+'px';
  BH=Math.round(W*0.07);
  ANCHOR=H*0.66;
  DROPH=BH*5;
  PTHRESH=Math.max(4,W*0.018);
  if(blocks){ // rescale horizontal to new width
    const r=W/(oldW||W);
    blocks.forEach(b=>{b.x*=r;b.w*=r;});
    if(incoming){incoming.x*=r;incoming.w*=r;if(!incoming.falling)incoming.ib=blocks.length*BH+DROPH;}
    offcuts=[];
    camY=blocks.length*BH;
    if(!over)draw();else showOver();
  }
}

function newGame(){
  document.getElementById('overModal').classList.remove('show');
  startBest=best; // record to beat this run (best updates live during play)
  const bw=W*0.5;
  blocks=[{x:(W-bw)/2,w:bw}];
  offcuts=[];
  score=0;lives=3;combo=0;over=false;started=true;paused=false;
  camY=blocks.length*BH;
  spawnIncoming();
  updateHUD();
  if(raf)cancelAnimationFrame(raf);
  lastTs=performance.now();
  raf=requestAnimationFrame(loop);
}

function spawnIncoming(){
  const top=blocks[blocks.length-1];
  const w=top.w;
  const fromLeft=Math.random()<0.5;
  incoming={w,x:fromLeft?0:W-w,dir:fromLeft?1:-1,ib:blocks.length*BH+DROPH,falling:false,
    spd:(W*0.55)*(1+Math.min(blocks.length,40)*0.03)};
}

function drop(){
  if(paused)return;
  if(over){newGame();return;}
  if(!incoming||incoming.falling)return;
  incoming.falling=true;
}

function loop(ts){
  const dt=Math.min((ts-lastTs)/1000,0.05);lastTs=ts;
  if(!over){if(!paused)update(dt);draw();raf=requestAnimationFrame(loop);}
}

function update(dt){
  // camera easing toward the current top surface
  const target=blocks.length*BH;
  camY+=(target-camY)*Math.min(1,dt*9);

  if(incoming){
    if(!incoming.falling){
      incoming.x+=incoming.dir*incoming.spd*dt;
      if(incoming.x<=0){incoming.x=0;incoming.dir=1;}
      else if(incoming.x>=W-incoming.w){incoming.x=W-incoming.w;incoming.dir=-1;}
    }else{
      incoming.ib-=H*1.9*dt;
      const surface=blocks.length*BH;
      if(incoming.ib<=surface){incoming.ib=surface;land();}
    }
  }
  // offcuts physics
  for(let i=offcuts.length-1;i>=0;i--){const o=offcuts[i];o.vy-=H*3*dt;o.ib+=o.vy*dt;o.rot+=o.vr*dt;
    if(screenTop(o.ib)>H+80)offcuts.splice(i,1);}
}

function land(){
  const top=blocks[blocks.length-1];
  const a=incoming, ax=a.x, aw=a.w;
  const ol=Math.max(ax,top.x), or=Math.min(ax+aw,top.x+top.w);
  const overlap=or-ol;
  if(overlap<=0){
    // full miss — block tumbles away, lose a life
    offcuts.push({x:ax,w:aw,ib:a.ib,vy:0,vr:(Math.random()-.5)*4,rot:0});
    incoming=null;
    lives--;updateHUD();failSound();
    if(lives<=0){endGame();return;}
    setTimeout(()=>{if(!over)spawnIncoming();},120);
    return;
  }
  const perfect=Math.abs(ax-top.x)<PTHRESH;
  let nx,nw;
  if(perfect){
    nx=top.x;nw=top.w;combo++;
    score+=25+25*combo;SFX.perfect();
  }else{
    nx=ol;nw=overlap;combo=0;
    score+=25;SFX.land();
    // sliced offcut falls
    if(ax<top.x){offcuts.push({x:ax,w:top.x-ax,ib:a.ib,vy:0,vr:-3,rot:0});}
    if(ax+aw>top.x+top.w){offcuts.push({x:top.x+top.w,w:(ax+aw)-(top.x+top.w),ib:a.ib,vy:0,vr:3,rot:0});}
    SFX.slice();
  }
  blocks.push({x:nx,w:nw});
  if(score>best){best=score;localStorage.setItem('tg-tower-best',best);}
  updateHUD();
  spawnIncoming();
}

function endGame(){
  over=true;
  statRec('tower',{played:1},{bestScore:score});
  draw();
  showOver();
}

function showOver(){
  const sr=L()==='sr';
  const floors=blocks.length-1;
  document.getElementById('moTitle').textContent=sr?'💥 Срушио се!':'💥 Toppled!';
  document.getElementById('moFloors').textContent=floors;
  document.getElementById('moUnit').textContent=sr?(floors===1?'спрат':'спратова'):(floors===1?'floor':'floors');
  document.getElementById('moScore').textContent=(sr?'Поени: ':'Score: ')+score;
  const cm=document.getElementById('moComment');
  if(score>startBest){cm.textContent=sr?'🎉 Нови рекорд!':'🎉 New record!';cm.style.color='#ffd166';}
  else if(score>0&&score===startBest){cm.textContent=sr?'🤝 Изједначио рекорд!':'🤝 Tied the record!';cm.style.color='var(--text)';}
  else if(startBest>0){const d=startBest-score;cm.textContent=sr?('Испод рекорда за '+d+' '+(d===1?'поен':'поена')):('Below record by '+d);cm.style.color='var(--dim)';}
  else{cm.textContent='';}
  document.getElementById('againBtn').textContent=sr?'Нова игра':'Play again';
  document.getElementById('overModal').classList.add('show');
}

// ── coordinate mapping: worldY (bottom of a block) -> screen top edge ──
function screenTop(ib){return ANCHOR+(camY-(ib+BH));}

function blockColor(i){
  const light=isLight();
  const h=(i*26)%360;
  return 'hsl('+h+','+(light?'55%':'62%')+','+(light?'58%':'56%')+')';
}

function draw(){
  const light=isLight();
  // sky background gradient
  const g=ctx.createLinearGradient(0,0,0,H);
  if(light){g.addColorStop(0,'#cfe3f5');g.addColorStop(1,'#eef2f6');}
  else{g.addColorStop(0,'#10172e');g.addColorStop(1,'#070711');}
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);

  // placed blocks
  for(let i=0;i<blocks.length;i++){
    const b=blocks[i],y=screenTop(i*BH);
    if(y>H+BH||y<-BH)continue;
    drawBlock(b.x,y,b.w,blockColor(i));
  }
  // offcuts
  for(const o of offcuts){
    ctx.save();
    const y=screenTop(o.ib);
    ctx.translate(o.x+o.w/2,y+BH/2);ctx.rotate(o.rot*0.08);
    ctx.globalAlpha=0.85;
    drawBlock(-o.w/2,-BH/2,o.w,'#9aa0ad');
    ctx.restore();
  }
  ctx.globalAlpha=1;
  // incoming + crane rope
  if(incoming){
    const y=screenTop(incoming.ib);
    ctx.strokeStyle=light?'rgba(0,0,0,.45)':'rgba(255,255,255,.5)';
    ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(incoming.x+incoming.w/2,0);ctx.lineTo(incoming.x+incoming.w/2,y);ctx.stroke();
    // hook
    ctx.fillStyle=light?'#444':'#ccc';
    ctx.fillRect(incoming.x+incoming.w/2-4,y-6,8,6);
    drawBlock(incoming.x,y,incoming.w,blockColor(blocks.length));
  }
  // floor counter
  ctx.fillStyle=light?'rgba(0,0,0,.30)':'rgba(255,255,255,.30)';
  ctx.font='bold '+Math.round(W*0.05)+'px system-ui';ctx.textAlign='left';ctx.textBaseline='top';
  ctx.fillText((L()==='sr'?'Спрат ':'Floor ')+(blocks.length-1),10,8);
}

function drawBlock(x,y,w,col){
  ctx.fillStyle=col;
  ctx.beginPath();ctx.roundRect(x,y,w,BH-2,4);ctx.fill();
  // simple windows
  ctx.fillStyle='rgba(255,255,255,0.18)';
  const cols=Math.max(1,Math.floor(w/(BH*0.7)));
  const pad=w*0.12,gw=(w-pad*2)/cols;
  for(let c=0;c<cols;c++){ctx.fillRect(x+pad+c*gw+gw*0.2,y+BH*0.28,gw*0.5,BH*0.4);}
}

function updateHUD(){
  document.getElementById('livesEl').textContent='❤️'.repeat(Math.max(0,lives))||'—';
  document.getElementById('scoreEl').textContent=score;
  document.getElementById('bestEl').textContent='🏆 '+best;
}

// ── input ──────────────────────────────────────────────────────
document.getElementById('dropBtn').addEventListener('click',drop);
document.getElementById('againBtn').addEventListener('click',newGame);

// ── help / how to play ──
const HELP={
 sr:`<b>Циљ:</b> слажи торањ што више спратова! Блок се њише на врху.<br><br>
<b>Тапни</b> било где, дугме <b>ПУСТИ</b> или размак — да спустиш блок.<br><br>
Део који се преклопи са доњим блоком остаје, вишак отпада и блок се сужава.<br><br>
🎯 <b>Савршено</b> поравнање = бонус поени и комбо (блок се не сужава).<br><br>
Ако потпуно промашиш — губиш живот ❤️ (имаш 3). Игра траје док се торањ не сруши.`,
 en:`<b>Goal:</b> stack the tower as high as you can! A block swings on top.<br><br>
<b>Tap</b> anywhere, the <b>DROP</b> button or Space to drop it.<br><br>
The part overlapping the block below stays; the rest is sliced off and the block narrows.<br><br>
🎯 A <b>Perfect</b> align = bonus points and a combo (no narrowing).<br><br>
Miss completely and you lose a life ❤️ (you have 3). Endless until you topple.`
};
window.showHelp=function(){const sr=L()==='sr';document.getElementById('helpTitle').textContent=sr?'🏗️ Како се игра':'🏗️ How to play';document.getElementById('helpBody').innerHTML=HELP[sr?'sr':'en'];document.getElementById('helpClose').textContent=sr?'Разумем 👍':'Got it 👍';paused=true;document.getElementById('helpModal').classList.add('show');};
function closeHelp(){paused=false;lastTs=performance.now();document.getElementById('helpModal').classList.remove('show');}
document.getElementById('helpClose').addEventListener('click',closeHelp);

canvas.addEventListener('pointerdown',e=>{e.preventDefault();drop();});
document.addEventListener('keydown',e=>{if(e.code==='Space'||e.code==='ArrowDown'){e.preventDefault();drop();}});
window.addEventListener('resize',resize);
document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible'&&started&&!over)draw();});

resize();
newGame();
if(!localStorage.getItem('tg-tower-seen')){localStorage.setItem('tg-tower-seen','1');showHelp();}
</script>
</body>
</html>
