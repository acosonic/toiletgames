<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Икс-Окс — Тоалет Игрице</title>
<meta name="theme-color" content="#e94560">
<script>(function(){var t=localStorage.getItem('tg-theme')||(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');if(t==='light')document.documentElement.classList.add('light');})()</script>
<style>
:root{--bg:#0f0f1a;--surface:#1a1a2e;--surface2:#16213e;--accent:#e94560;--text:#e0e0e0;--dim:#888}
html.light{--bg:#f0f2f5;--surface:#fff;--surface2:#e2e5ea;--text:#1a1a2e;--dim:#666}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:18px}html.xl{font-size:24px}
body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;min-height:100dvh;-webkit-tap-highlight-color:transparent;touch-action:manipulation;transition:background .2s,color .2s}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--surface);gap:6px;border-bottom:1px solid var(--surface2)}
.topbar a{color:var(--accent);text-decoration:none;font-size:.95rem;font-weight:700;white-space:nowrap}
.topbar h2{font-size:.95rem;font-weight:700;flex:1;text-align:center}
.topbar-btns{display:flex;gap:4px;flex-shrink:0}
.icon-btn{background:none;border:1px solid var(--dim);color:var(--text);border-radius:6px;padding:5px 8px;font-size:.78rem;cursor:pointer;white-space:nowrap;line-height:1}
.wrap{padding:16px 14px 32px;max-width:400px;margin:0 auto;display:flex;flex-direction:column;align-items:center;gap:14px}
.scoreboard{display:flex;gap:12px;width:100%;justify-content:center}
.sc{background:var(--surface);border-radius:10px;padding:8px 18px;text-align:center;min-width:72px}
.sc .lbl{font-size:.7rem;color:var(--dim);text-transform:uppercase}
.sc .val{font-size:1.5rem;font-weight:800}
.sc.x .val{color:var(--text)}.sc.o .val{color:#e94560}
html.light .sc.x .val{color:#000}
#board{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:min(300px,calc(100vw - 32px));aspect-ratio:1}
.cell{background:var(--surface);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:3rem;cursor:pointer;user-select:none;transition:background .1s;aspect-ratio:1}
html.xl .cell{font-size:3.6rem}
.x-sym{color:var(--text);font-weight:900;line-height:1}
html.light .x-sym{color:#000}
.cell:active{background:var(--surface2)}.cell.win{background:#1a3a1a}
html.light .cell.win{background:#d4edda}
.status{font-size:1rem;font-weight:700;min-height:1.5em;text-align:center}
.new-btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:10px 28px;font-size:1rem;font-weight:700;cursor:pointer}
.mode-row{display:flex;gap:10px}
.mode-btn{background:var(--surface);border:1px solid var(--dim);color:var(--text);border-radius:8px;padding:7px 14px;font-size:.85rem;cursor:pointer}
.mode-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
</style>
</head>
<body>
<div class="topbar">
  <a href="../" class="i18n" data-sr="← Назад" data-en="← Back">← Назад</a>
  <h2 class="i18n" data-sr="✕ Икс-Окс" data-en="✕ Tic-Tac-Toe">✕ Икс-Окс</h2>
  <div class="topbar-btns">
    <button class="icon-btn theme-btn" onclick="toggleTheme()">🌙</button>
    <button class="icon-btn lang-btn" onclick="toggleLang()">EN</button>
    <button class="icon-btn sound-btn" onclick="toggleSound()">🔊</button>
    <button class="icon-btn" onclick="toggleFont()">Аа</button>
  </div>
</div>
<div class="wrap">
  <div class="mode-row">
    <button class="mode-btn active" id="m2p" onclick="setMode('2p')"></button>
    <button class="mode-btn" id="mai" onclick="setMode('ai')"></button>
  </div>
  <div class="scoreboard">
    <div class="sc x"><div class="lbl i18n" data-sr="X победе" data-en="X wins">X победе</div><div class="val" id="sx">0</div></div>
    <div class="sc"><div class="lbl i18n" data-sr="Нерешено" data-en="Draws">Нерешено</div><div class="val" id="sd">0</div></div>
    <div class="sc o"><div class="lbl i18n" data-sr="О победе" data-en="O wins">О победе</div><div class="val" id="so">0</div></div>
  </div>
  <div id="status" class="status"></div>
  <div id="board"></div>
  <button class="new-btn i18n" data-sr="Нова игра" data-en="New game" onclick="newGame()">Нова игра</button>
</div>
<script>
(function(){
  const _lang=()=>localStorage.getItem('tg-lang')||(/^(sr|hr|bs)/i.test(navigator.language)?'sr':'en');
  const _theme=()=>localStorage.getItem('tg-theme')||(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');
  function applyTheme(){const d=_theme()==='dark';document.documentElement.classList.toggle('light',!d);document.querySelectorAll('.theme-btn').forEach(b=>b.textContent=d?'☀️':'🌙');}
  function applyI18n(){const L=_lang();document.querySelectorAll('[data-'+L+']').forEach(el=>el.textContent=el.dataset[L]);document.querySelectorAll('.lang-btn').forEach(b=>b.textContent=L==='sr'?'EN':'СР');document.documentElement.lang=L;}
  window.toggleTheme=()=>{localStorage.setItem('tg-theme',_theme()==='dark'?'light':'dark');applyTheme();};
  window.toggleLang=()=>{localStorage.setItem('tg-lang',_lang()==='sr'?'en':'sr');location.reload();};
  window.toggleFont=()=>{const xl=document.documentElement.classList.toggle('xl');localStorage.setItem('tg-xl',xl?'1':'0');};
  window.toggleSound=()=>{const on=localStorage.getItem('tg-sound')!=='0';localStorage.setItem('tg-sound',on?'0':'1');document.querySelectorAll('.sound-btn').forEach(b=>b.textContent=on?'🔇':'🔊');};
  if(localStorage.getItem('tg-xl')==='1')document.documentElement.classList.add('xl');
  applyTheme();applyI18n();document.querySelectorAll('.sound-btn').forEach(b=>b.textContent=localStorage.getItem('tg-sound')==='0'?'🔇':'🔊');
  const L=_lang();
  const T={
    sr:{p2:'2 играча',ai:'Против АИ',turn:'Ред: ',won:' победио!',draw:'🤝 Нерешено!'},
    en:{p2:'2 players',ai:'vs AI',turn:'Turn: ',won:' won!',draw:'🤝 Draw!'}
  };
  const t=k=>T[L][k];
  document.getElementById('m2p').textContent=t('p2');
  document.getElementById('mai').textContent=t('ai');

  function statRec(g,inc,hi,lo){const j=JSON.parse(localStorage.getItem('tg-stats')||'{}');const e=j[g]||{};for(const[k,v]of Object.entries(inc||{}))e[k]=(e[k]||0)+v;for(const[k,v]of Object.entries(hi||{}))if(v!=null&&(!e[k]||v>e[k]))e[k]=v;for(const[k,v]of Object.entries(lo||{}))if(v!=null&&(!e[k]||v<e[k]))e[k]=v;j[g]=e;localStorage.setItem('tg-stats',JSON.stringify(j));}
  const SFX=(()=>{let ac;const A=()=>(ac=ac||new(window.AudioContext||window.webkitAudioContext)());const t=(f,d,tp,v)=>{if(localStorage.getItem('tg-sound')==='0')return;try{const c=A(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type=tp||'sine';o.frequency.value=f;g.gain.setValueAtTime(v||.25,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);o.start();o.stop(c.currentTime+d);}catch(e){}};return{place:()=>t(600,.05,'square',.15),win(){t(523,.1);setTimeout(()=>t(659,.1),100);setTimeout(()=>t(784,.25),200);},draw:()=>t(350,.3,'sine',.12)};})();

  const WINS=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
  let board,cur,mode='2p',sx=0,so=0,sd=0,over;

  function setMode(m){mode=m;document.getElementById('m2p').classList.toggle('active',m==='2p');document.getElementById('mai').classList.toggle('active',m==='ai');newGame();}

  const XS='<span class="x-sym">✕</span>';
  function newGame(){board=Array(9).fill('');cur='X';over=false;document.getElementById('status').innerHTML=t('turn')+XS;render();}

  function render(){
    const el=document.getElementById('board');el.innerHTML='';
    const wl=findWin(board);
    board.forEach((v,i)=>{const c=document.createElement('div');c.className='cell'+(wl&&wl.includes(i)?' win':'');c.innerHTML=v==='X'?XS:v==='O'?'⭕':'';c.addEventListener('click',()=>click(i));el.appendChild(c);});
  }

  function click(i){if(over||board[i])return;board[i]=cur;SFX.place();if(checkEnd())return;cur=cur==='X'?'O':'X';document.getElementById('status').innerHTML=t('turn')+(cur==='X'?XS:'⭕');render();if(mode==='ai'&&cur==='O'&&!over)setTimeout(aiMove,300);}

  function aiMove(){click(minimax(board,'O').idx);}

  function minimax(b,player){
    const w=findWin(b);if(w){const winner=b[w[0]];return{score:winner==='O'?10:winner==='X'?-10:0};}
    const empty=b.map((v,i)=>v?null:i).filter(v=>v!==null);if(!empty.length)return{score:0};
    const moves=empty.map(i=>{const nb=[...b];nb[i]=player;const s=minimax(nb,player==='O'?'X':'O').score;return{idx:i,score:s};});
    return player==='O'?moves.reduce((a,b)=>b.score>a.score?b:a):moves.reduce((a,b)=>b.score<a.score?b:a);
  }

  function findWin(b){for(const l of WINS){const[a,c,d]=l;if(b[a]&&b[a]===b[c]&&b[a]===b[d])return l;}return null;}

  function checkEnd(){
    const w=findWin(board);
    if(w){over=true;SFX.win();const winner=board[w[0]];if(winner==='X'){sx++;document.getElementById('sx').textContent=sx;statRec('tictactoe',{played:1,xWins:1});celebrate();}else{so++;document.getElementById('so').textContent=so;statRec('tictactoe',{played:1,oWins:1});tgFail();}document.getElementById('status').innerHTML=(winner==='X'?XS:'⭕')+t('won');render();return true;}
    if(board.every(Boolean)){over=true;SFX.draw();sd++;document.getElementById('sd').textContent=sd;statRec('tictactoe',{played:1,draws:1});document.getElementById('status').textContent=t('draw');render();return true;}
    return false;
  }

  window.newGame=newGame;window.setMode=setMode;
  newGame();
})();
</script>
<script>
// Victory — VICTORY banner (stays until next interaction) + cheer clip + fireworks.
// Offline & self-contained; sound honors tg-sound, motion honors reduced-motion.
window.celebrate=function(){
  if(localStorage.getItem("tg-sound")!=="0"){try{var au=new Audio("./cheer.mp3");au.volume=0.85;au.play().catch(function(){});}catch(e){}}
  (function(){var L=localStorage.getItem("tg-lang")||"sr";var old=document.getElementById("tg-banner");if(old)old.remove();var b=document.createElement("div");b.id="tg-banner";b.textContent=L==="sr"?"ПОБЕДА":"VICTORY";b.style.cssText="position:fixed;top:34%;left:0;right:0;text-align:center;z-index:99998;pointer-events:none;font:900 clamp(2.5rem,15vw,7rem)/1 system-ui,-apple-system,sans-serif;letter-spacing:.08em;color:#ffd166;text-shadow:0 4px 20px rgba(0,0,0,.55),0 0 8px rgba(0,0,0,.45);opacity:0;transform:scale(.6);transition:opacity .25s ease,transform .35s cubic-bezier(.2,1.4,.3,1)";document.body.appendChild(b);requestAnimationFrame(function(){b.style.opacity="1";b.style.transform="scale(1)";});var armed=false;setTimeout(function(){armed=true;},400);function dismiss(){if(!armed)return;document.removeEventListener("pointerdown",dismiss,true);document.removeEventListener("keydown",dismiss,true);b.style.opacity="0";b.style.transform="scale(1.1)";setTimeout(function(){b.remove();},220);}document.addEventListener("pointerdown",dismiss,true);document.addEventListener("keydown",dismiss,true);})();
  if(window.matchMedia&&window.matchMedia("(prefers-reduced-motion:reduce)").matches)return;
  var cv=document.createElement("canvas");
  cv.style.cssText="position:fixed;inset:0;width:100vw;height:100vh;pointer-events:none;z-index:99999";
  function size(){cv.width=window.innerWidth;cv.height=window.innerHeight;}
  size();window.addEventListener("resize",size);
  document.body.appendChild(cv);
  var cx=cv.getContext("2d");
  var COL=["#e94560","#ffd166","#06d6a0","#4dd0e1","#9b6bff","#ff7043","#ffffff"];
  var ps=[],frame=0,bursts=0,MAX=7,nextAt=0;
  function star(x,y,r,rot){cx.beginPath();for(var i=0;i<10;i++){var rr=i%2?r*0.45:r,a=rot+i*Math.PI/5;cx.lineTo(x+Math.cos(a)*rr,y+Math.sin(a)*rr);}cx.closePath();cx.fill();}
  function burst(x,y){var hue=COL[Math.random()*COL.length|0],n=40+(Math.random()*22|0);for(var i=0;i<n;i++){var a=Math.random()*Math.PI*2,sp=Math.random()*4.6+1.2;ps.push({x:x,y:y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-1.2,age:0,life:55+Math.random()*35,c:Math.random()<.4?"#fff":hue,sz:Math.random()*2.4+1.4,star:Math.random()<.5,rot:Math.random()*6});}}
  function loop(){
    frame++;
    if(bursts<MAX&&frame>=nextAt){burst(Math.random()*cv.width,cv.height*(0.12+Math.random()*0.45));bursts++;nextAt=frame+6+(Math.random()*16|0);}
    cx.clearRect(0,0,cv.width,cv.height);
    for(var i=ps.length-1;i>=0;i--){var p=ps[i];p.age++;p.vy+=0.07;p.vx*=0.99;p.vy*=0.99;p.x+=p.vx;p.y+=p.vy;p.rot+=0.12;var al=1-p.age/p.life;if(al<=0){ps.splice(i,1);continue;}cx.globalAlpha=al;cx.fillStyle=p.c;if(p.star)star(p.x,p.y,p.sz*2,p.rot);else{cx.beginPath();cx.arc(p.x,p.y,p.sz,0,6.283);cx.fill();}}
    cx.globalAlpha=1;
    if(ps.length||bursts<MAX)requestAnimationFrame(loop);
    else{window.removeEventListener("resize",size);cv.remove();}
  }
  requestAnimationFrame(loop);
};
</script>
<script>
// Loss — FAILED banner (stays until next interaction) + "whah-whah" trombone.
// Offline; honors the tg-sound toggle.
window.tgFail=function(){
  if(localStorage.getItem("tg-sound")!=="0"){try{var au=new Audio("./whah.wav");au.volume=0.8;au.play().catch(function(){});}catch(e){}}
  (function(){var L=localStorage.getItem("tg-lang")||"sr";var old=document.getElementById("tg-banner");if(old)old.remove();var b=document.createElement("div");b.id="tg-banner";b.textContent=L==="sr"?"ПОРАЗ":"FAILED";b.style.cssText="position:fixed;top:34%;left:0;right:0;text-align:center;z-index:99998;pointer-events:none;font:900 clamp(2.5rem,15vw,7rem)/1 system-ui,-apple-system,sans-serif;letter-spacing:.08em;color:#e94560;text-shadow:0 4px 20px rgba(0,0,0,.55),0 0 8px rgba(0,0,0,.45);opacity:0;transform:scale(.6);transition:opacity .25s ease,transform .35s cubic-bezier(.2,1.4,.3,1)";document.body.appendChild(b);requestAnimationFrame(function(){b.style.opacity="1";b.style.transform="scale(1)";});var armed=false;setTimeout(function(){armed=true;},400);function dismiss(){if(!armed)return;document.removeEventListener("pointerdown",dismiss,true);document.removeEventListener("keydown",dismiss,true);b.style.opacity="0";b.style.transform="scale(1.1)";setTimeout(function(){b.remove();},220);}document.addEventListener("pointerdown",dismiss,true);document.addEventListener("keydown",dismiss,true);})();
};
</script>
</body>
</html>
