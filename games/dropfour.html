<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Четири у низ — Тоалет Игрице</title>
<meta name="theme-color" content="#e94560">
<script>(function(){var t=localStorage.getItem('tg-theme')||(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');if(t==='light')document.documentElement.classList.add('light');})()</script>
<style>
:root{--bg:#0f0f1a;--surface:#1a1a2e;--surface2:#16213e;--accent:#e94560;--text:#e0e0e0;--dim:#888}
html.light{--bg:#f0f2f5;--surface:#fff;--surface2:#e2e5ea;--text:#1a1a2e;--dim:#666}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:18px}html.xl{font-size:22px}
body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;min-height:100dvh;-webkit-tap-highlight-color:transparent;touch-action:manipulation;transition:background .2s,color .2s}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--surface);gap:6px;border-bottom:1px solid var(--surface2)}
.topbar a{color:var(--accent);text-decoration:none;font-size:.95rem;font-weight:700;white-space:nowrap}
.topbar h2{font-size:.95rem;font-weight:700;flex:1;text-align:center}
.topbar-btns{display:flex;gap:4px;flex-shrink:0}
.icon-btn{background:none;border:1px solid var(--dim);color:var(--text);border-radius:6px;padding:5px 8px;font-size:.78rem;cursor:pointer;white-space:nowrap;line-height:1}
.wrap{padding:12px 10px 32px;max-width:420px;margin:0 auto;display:flex;flex-direction:column;align-items:center;gap:10px}
.hud{display:flex;align-items:center;justify-content:space-between;width:100%;gap:8px}
.turn{font-size:1rem;font-weight:700}
.new-btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:7px 16px;font-size:.9rem;font-weight:700;cursor:pointer}
.mode-row{display:flex;gap:8px}
.mode-btn{background:var(--surface);border:1px solid var(--dim);color:var(--text);border-radius:8px;padding:6px 12px;font-size:.82rem;cursor:pointer}
.mode-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.scorebar{display:flex;gap:10px}
.sc{background:var(--surface);border-radius:8px;padding:6px 14px;text-align:center}
.sc .lbl{font-size:.68rem;color:var(--dim)}.sc .val{font-size:1.1rem;font-weight:700}
.col-btns{display:flex;gap:4px;justify-content:center;margin-bottom:4px}
.col-btn{background:var(--surface2);border:none;color:var(--text);border-radius:6px;width:44px;height:32px;font-size:1.1rem;cursor:pointer;-webkit-tap-highlight-color:transparent}
html.xl .col-btn{width:52px}
.col-btn:active{background:var(--accent)}
#grid{border-radius:10px;padding:5px;display:grid;grid-template-columns:repeat(7,1fr);gap:4px;cursor:pointer;-webkit-tap-highlight-color:transparent}
html:not(.light) #grid{background:#16213e}
html.light #grid{background:#1a3a8c}
.hole{width:40px;height:40px;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center}
html.light .hole{background:#e0e4ea}
html.xl .hole{width:48px;height:48px}
.hole.r{background:#e94560}.hole.y{background:#f1c40f}
.hole.win-r{background:#e94560;box-shadow:0 0 10px #e94560}.hole.win-y{background:#f1c40f;box-shadow:0 0 10px #f1c40f}
html.light .hole.r,html.light .hole.win-r{background:#e94560}
html.light .hole.y,html.light .hole.win-y{background:#f1c40f}
html.light .hole.win-r{box-shadow:0 0 10px #e94560}
html.light .hole.win-y{box-shadow:0 0 10px #f1c40f}
.msg{font-size:1rem;font-weight:700;text-align:center;min-height:1.4em;color:var(--accent)}
</style>
</head>
<body>
<div class="topbar">
  <a href="../" class="i18n" data-sr="← Назад" data-en="← Back">← Назад</a>
  <h2 class="i18n" data-sr="🔴 Четири у низ" data-en="🔴 Drop Four">🔴 Четири у низ</h2>
  <div class="topbar-btns">
    <button class="icon-btn theme-btn" onclick="toggleTheme()">🌙</button>
    <button class="icon-btn lang-btn" onclick="toggleLang()">EN</button>
    <button class="icon-btn sound-btn" onclick="toggleSound()">🔊</button>
    <button class="icon-btn" onclick="toggleFont()">Аа</button>
  </div>
</div>
<div class="wrap">
  <div class="mode-row">
    <button class="mode-btn active" id="m2p" onclick="setMode('2p')"></button>
    <button class="mode-btn" id="mai" onclick="setMode('ai')"></button>
  </div>
  <div class="mode-row" id="diffRow" style="display:none">
    <button class="mode-btn" id="dEasy" onclick="setDiff('easy')"></button>
    <button class="mode-btn" id="dMed" onclick="setDiff('medium')"></button>
    <button class="mode-btn" id="dHard" onclick="setDiff('hard')"></button>
  </div>
  <div class="scorebar">
    <div class="sc"><div class="lbl">🔴 <span class="i18n" data-sr="Победе" data-en="Wins">Победе</span></div><div class="val" id="sr2">0</div></div>
    <div class="sc"><div class="lbl">🟡 <span class="i18n" data-sr="Победе" data-en="Wins">Победе</span></div><div class="val" id="sy2">0</div></div>
  </div>
  <div class="hud">
    <span class="turn" id="turn"></span>
    <button class="new-btn i18n" data-sr="Нова" data-en="New" onclick="newGame()">Нова</button>
  </div>
  <div class="col-btns">
    <button class="col-btn" onclick="drop(0)">▼</button>
    <button class="col-btn" onclick="drop(1)">▼</button>
    <button class="col-btn" onclick="drop(2)">▼</button>
    <button class="col-btn" onclick="drop(3)">▼</button>
    <button class="col-btn" onclick="drop(4)">▼</button>
    <button class="col-btn" onclick="drop(5)">▼</button>
    <button class="col-btn" onclick="drop(6)">▼</button>
  </div>
  <div id="grid"></div>
  <div class="msg" id="msg"></div>
</div>
<script>
(function(){
  const _lang=()=>localStorage.getItem('tg-lang')||(/^(sr|hr|bs)/i.test(navigator.language)?'sr':'en');
  const _theme=()=>localStorage.getItem('tg-theme')||(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');
  function applyTheme(){const d=_theme()==='dark';document.documentElement.classList.toggle('light',!d);document.querySelectorAll('.theme-btn').forEach(b=>b.textContent=d?'☀️':'🌙');}
  function applyI18n(){const L=_lang();document.querySelectorAll('[data-'+L+']').forEach(el=>el.textContent=el.dataset[L]);document.querySelectorAll('.lang-btn').forEach(b=>b.textContent=L==='sr'?'EN':'СР');document.documentElement.lang=L;}
  window.toggleTheme=()=>{localStorage.setItem('tg-theme',_theme()==='dark'?'light':'dark');applyTheme();};
  window.toggleLang=()=>{localStorage.setItem('tg-lang',_lang()==='sr'?'en':'sr');location.reload();};
  window.toggleFont=()=>{const xl=document.documentElement.classList.toggle('xl');localStorage.setItem('tg-xl',xl?'1':'0');};
  window.toggleSound=()=>{const on=localStorage.getItem('tg-sound')!=='0';localStorage.setItem('tg-sound',on?'0':'1');document.querySelectorAll('.sound-btn').forEach(b=>b.textContent=on?'🔇':'🔊');};
  if(localStorage.getItem('tg-xl')==='1')document.documentElement.classList.add('xl');
  applyTheme();applyI18n();document.querySelectorAll('.sound-btn').forEach(b=>b.textContent=localStorage.getItem('tg-sound')==='0'?'🔇':'🔊');
  const L=_lang();
  const T={sr:{p2:'2 играча',ai:'Против АИ',turn:'Ред: ',won:' победио!',draw:'🤝 Нерешено!',easy:'Лако',med:'Средње',hard:'Тешко'},en:{p2:'2 players',ai:'vs AI',turn:'Turn: ',won:' won!',draw:'🤝 Draw!',easy:'Easy',med:'Medium',hard:'Hard'}};
  const t=k=>T[L][k];
  document.getElementById('m2p').textContent=t('p2');
  document.getElementById('mai').textContent=t('ai');
  document.getElementById('dEasy').textContent=t('easy');
  document.getElementById('dMed').textContent=t('med');
  document.getElementById('dHard').textContent=t('hard');

  function statRec(g,inc,hi,lo){const j=JSON.parse(localStorage.getItem('tg-stats')||'{}');const e=j[g]||{};for(const[k,v]of Object.entries(inc||{}))e[k]=(e[k]||0)+v;for(const[k,v]of Object.entries(hi||{}))if(v!=null&&(!e[k]||v>e[k]))e[k]=v;for(const[k,v]of Object.entries(lo||{}))if(v!=null&&(!e[k]||v<e[k]))e[k]=v;j[g]=e;localStorage.setItem('tg-stats',JSON.stringify(j));}
  const SFX=(()=>{let ac;const A=()=>(ac=ac||new(window.AudioContext||window.webkitAudioContext)());const t=(f,d,tp,v)=>{if(localStorage.getItem('tg-sound')==='0')return;try{const c=A(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type=tp||'sine';o.frequency.value=f;g.gain.setValueAtTime(v||.25,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);o.start();o.stop(c.currentTime+d);}catch(e){}};return{drop(){if(localStorage.getItem('tg-sound')==='0')return;try{const c=A(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sine';o.frequency.setValueAtTime(400,c.currentTime);o.frequency.linearRampToValueAtTime(150,c.currentTime+.25);g.gain.setValueAtTime(.25,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.25);o.start();o.stop(c.currentTime+.25);}catch(e){}},win(){t(523,.1);setTimeout(()=>t(659,.1),100);setTimeout(()=>t(784,.25),200);},draw:()=>t(350,.3,'sine',.12)};})();

  const ROWS=6,COLS=7;
  let board,cur,mode='2p',sr=0,sy=0,over,cells=[];
  let diff=localStorage.getItem('tg-dropfour-diff')||'medium';
  const DEPTH={easy:1,medium:5,hard:7};
  const dbg=(msg,data={})=>console.debug('[connect4]',msg,data);

  function applyDiffUI(){
    document.getElementById('dEasy').classList.toggle('active',diff==='easy');
    document.getElementById('dMed').classList.toggle('active',diff==='medium');
    document.getElementById('dHard').classList.toggle('active',diff==='hard');
  }
  applyDiffUI();

  function setMode(m){mode=m;document.getElementById('m2p').classList.toggle('active',m==='2p');document.getElementById('mai').classList.toggle('active',m==='ai');document.getElementById('diffRow').style.display=m==='ai'?'flex':'none';newGame();}
  function setDiff(d){diff=d;localStorage.setItem('tg-dropfour-diff',d);applyDiffUI();newGame();}
  window.setDiff=setDiff;

  function newGame(){
    initGrid();
    board=Array.from({length:ROWS},()=>Array(COLS).fill(0));cur=1;over=false;
    document.getElementById('turn').textContent=t('turn')+'🔴';document.getElementById('msg').textContent='';
    dbg('newGame',{mode,rows:ROWS,cols:COLS,cells:cells.length});
    render();
  }

  function initGrid(){
    if(cells.length)return;
    const el=document.getElementById('grid');
    for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
      const h=document.createElement('div');
      h.className='hole';
      h.dataset.col=c;
      el.appendChild(h);
      cells.push(h);
    }
    dbg('initGrid',{children:el.children.length,cells:cells.length});
  }

  function render(wins=[]){
    for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
      const h=cells[r*COLS+c];
      const v=board[r][c];
      const isWin=wins.some(([wr,wc])=>wr===r&&wc===c);
      h.className='hole'+(v===1?(isWin?' win-r':' r'):v===2?(isWin?' win-y':' y'):'');
    }
    dbg('render',{
      board:board.map(row=>row.join('')).join('/'),
      classes:cells.map(h=>h.className).join('|')
    });
  }

  function drop(c){
    dbg('drop requested',{col:c,over,mode,cur});
    if(over)return;
    if(mode==='ai'&&cur===2)return;
    doMove(c);
  }

  function doMove(c){let r=-1;for(let row=ROWS-1;row>=0;row--)if(!board[row][c]){r=row;break;}if(r===-1){dbg('column full',{col:c});return;}board[r][c]=cur;dbg('move applied',{row:r,col:c,player:cur,cellIndex:r*COLS+c});SFX.drop();const wins=checkWin(r,c);if(wins.length){over=true;SFX.win();if(!(mode==='ai'&&cur===2))celebrate();else tgFail();if(cur===1){sr++;document.getElementById('sr2').textContent=sr;statRec('connect4',{played:1,p1Wins:1});}else{sy++;document.getElementById('sy2').textContent=sy;statRec('connect4',{played:1,p2Wins:1});}document.getElementById('msg').textContent=(cur===1?'🔴':'🟡')+t('won');document.getElementById('turn').textContent='';render(wins);logCellStyle(r,c);return;}if(board[0].every(v=>v)){over=true;SFX.draw();statRec('connect4',{played:1,draws:1});document.getElementById('msg').textContent=t('draw');render();logCellStyle(r,c);return;}cur=cur===1?2:1;document.getElementById('turn').textContent=t('turn')+(cur===1?'🔴':'🟡');render();logCellStyle(r,c);if(mode==='ai'&&cur===2&&!over)setTimeout(aiMove,400);}

  function logCellStyle(r,c){
    const cell=cells[r*COLS+c];
    const style=getComputedStyle(cell);
    dbg('cell style after render',{
      row:r,
      col:c,
      className:cell.className,
      backgroundColor:style.backgroundColor,
      display:style.display,
      width:style.width,
      height:style.height,
      rect:cell.getBoundingClientRect()
    });
  }

  const ORDER=[3,2,4,1,5,0,6]; // centre-first for better alpha-beta pruning

  function aiMove(){
    let c;
    if(diff==='easy') c=aiEasy();
    else c=aiSearch(DEPTH[diff]);
    dbg('aiMove',{diff,col:c});
    doMove(c);
  }

  // Easy: win if you can, block if you must, otherwise random.
  function aiEasy(){
    for(let c=0;c<COLS;c++){const r=topRow(c);if(r>=0){board[r][c]=2;if(checkWin(r,c).length){board[r][c]=0;return c;}board[r][c]=0;}}
    for(let c=0;c<COLS;c++){const r=topRow(c);if(r>=0){board[r][c]=1;if(checkWin(r,c).length){board[r][c]=0;return c;}board[r][c]=0;}}
    const avail=[];for(let c=0;c<COLS;c++)if(topRow(c)>=0)avail.push(c);
    return avail[Math.floor(Math.random()*avail.length)];
  }

  // Medium / Hard: negamax with alpha-beta, AI is player 2.
  function aiSearch(depth){
    let bestV=-Infinity,best=[];
    for(const c of ORDER){
      const r=topRow(c);if(r<0)continue;
      board[r][c]=2;
      const v=checkWin(r,c).length ? 1e6 : -negamax(depth-1,-Infinity,Infinity,1);
      board[r][c]=0;
      if(v>bestV){bestV=v;best=[c];}
      else if(v===bestV)best.push(c); // collect equally-good moves
    }
    if(!best.length)return aiEasy();
    return best[Math.floor(Math.random()*best.length)]; // vary among equals so games differ
  }

  // Score from the perspective of `player` to move.
  function negamax(depth,alpha,beta,player){
    const avail=[];for(const c of ORDER)if(topRow(c)>=0)avail.push(c);
    if(avail.length===0)return 0; // board full → draw
    if(depth===0)return evaluate(player);
    let best=-Infinity;
    for(const c of avail){
      const r=topRow(c);
      board[r][c]=player;
      let v;
      if(checkWin(r,c).length) v=1e6+depth; // sooner win scores higher
      else v=-negamax(depth-1,-beta,-alpha,3-player);
      board[r][c]=0;
      if(v>best)best=v;
      if(best>alpha)alpha=best;
      if(alpha>=beta)break; // prune
    }
    return best;
  }

  // Static evaluation: sum of all 4-in-a-row windows, from `player` perspective.
  function evaluate(player){
    let s=0;
    const score=(a,b,c,d)=>{
      let me=0,opp=0,empt=0;
      for(const v of [a,b,c,d]){if(v===player)me++;else if(v===0)empt++;else opp++;}
      if(me&&opp)return 0;
      if(me===4)return 1000;
      if(me===3&&empt===1)return 50;
      if(me===2&&empt===2)return 10;
      if(opp===4)return -1000;
      if(opp===3&&empt===1)return -80; // weight defence slightly higher
      if(opp===2&&empt===2)return -10;
      return 0;
    };
    for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
      if(c+3<COLS)s+=score(board[r][c],board[r][c+1],board[r][c+2],board[r][c+3]);
      if(r+3<ROWS)s+=score(board[r][c],board[r+1][c],board[r+2][c],board[r+3][c]);
      if(r+3<ROWS&&c+3<COLS)s+=score(board[r][c],board[r+1][c+1],board[r+2][c+2],board[r+3][c+3]);
      if(r+3<ROWS&&c-3>=0)s+=score(board[r][c],board[r+1][c-1],board[r+2][c-2],board[r+3][c-3]);
    }
    for(let r=0;r<ROWS;r++)if(board[r][3]===player)s+=6; // centre control
    return s;
  }

  function topRow(c){for(let r=ROWS-1;r>=0;r--)if(!board[r][c])return r;return -1;}

  function checkWin(r,c){const p=board[r][c];const dirs=[[0,1],[1,0],[1,1],[1,-1]];for(const[dr,dc]of dirs){const line=[[r,c]];for(let s=1;s<4;s++){const nr=r+dr*s,nc=c+dc*s;if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS&&board[nr][nc]===p)line.push([nr,nc]);else break;}for(let s=1;s<4;s++){const nr=r-dr*s,nc=c-dc*s;if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS&&board[nr][nc]===p)line.push([nr,nc]);else break;}if(line.length>=4)return line;}return[];}

  document.getElementById('grid').addEventListener('click',function(e){
    const rect=this.getBoundingClientRect();
    const col=Math.max(0,Math.min(COLS-1,Math.floor((e.clientX-rect.left)*COLS/rect.width)));
    dbg('grid click',{clientX:e.clientX,gridLeft:rect.left,gridWidth:rect.width,col});
    drop(col);
  });
  window.newGame=newGame;window.setMode=setMode;window.drop=drop;
  newGame();
})();
</script>
<script>
// Victory — VICTORY banner (stays until next interaction) + cheer clip + fireworks.
// Offline & self-contained; sound honors tg-sound, motion honors reduced-motion.
window.celebrate=function(){
  if(localStorage.getItem("tg-sound")!=="0"){try{var au=new Audio("./cheer.mp3");au.volume=0.85;au.play().catch(function(){});}catch(e){}}
  (function(){var L=localStorage.getItem("tg-lang")||"sr";var old=document.getElementById("tg-banner");if(old)old.remove();var b=document.createElement("div");b.id="tg-banner";b.textContent=L==="sr"?"ПОБЕДА":"VICTORY";b.style.cssText="position:fixed;top:34%;left:0;right:0;text-align:center;z-index:99998;pointer-events:none;font:900 clamp(2.5rem,15vw,7rem)/1 system-ui,-apple-system,sans-serif;letter-spacing:.08em;color:#ffd166;text-shadow:0 4px 20px rgba(0,0,0,.55),0 0 8px rgba(0,0,0,.45);opacity:0;transform:scale(.6);transition:opacity .25s ease,transform .35s cubic-bezier(.2,1.4,.3,1)";document.body.appendChild(b);requestAnimationFrame(function(){b.style.opacity="1";b.style.transform="scale(1)";});var armed=false;setTimeout(function(){armed=true;},400);function dismiss(){if(!armed)return;document.removeEventListener("pointerdown",dismiss,true);document.removeEventListener("keydown",dismiss,true);b.style.opacity="0";b.style.transform="scale(1.1)";setTimeout(function(){b.remove();},220);}document.addEventListener("pointerdown",dismiss,true);document.addEventListener("keydown",dismiss,true);})();
  if(window.matchMedia&&window.matchMedia("(prefers-reduced-motion:reduce)").matches)return;
  var cv=document.createElement("canvas");
  cv.style.cssText="position:fixed;inset:0;width:100vw;height:100vh;pointer-events:none;z-index:99999";
  function size(){cv.width=window.innerWidth;cv.height=window.innerHeight;}
  size();window.addEventListener("resize",size);
  document.body.appendChild(cv);
  var cx=cv.getContext("2d");
  var COL=["#e94560","#ffd166","#06d6a0","#4dd0e1","#9b6bff","#ff7043","#ffffff"];
  var ps=[],frame=0,bursts=0,MAX=7,nextAt=0;
  function star(x,y,r,rot){cx.beginPath();for(var i=0;i<10;i++){var rr=i%2?r*0.45:r,a=rot+i*Math.PI/5;cx.lineTo(x+Math.cos(a)*rr,y+Math.sin(a)*rr);}cx.closePath();cx.fill();}
  function burst(x,y){var hue=COL[Math.random()*COL.length|0],n=40+(Math.random()*22|0);for(var i=0;i<n;i++){var a=Math.random()*Math.PI*2,sp=Math.random()*4.6+1.2;ps.push({x:x,y:y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-1.2,age:0,life:55+Math.random()*35,c:Math.random()<.4?"#fff":hue,sz:Math.random()*2.4+1.4,star:Math.random()<.5,rot:Math.random()*6});}}
  function loop(){
    frame++;
    if(bursts<MAX&&frame>=nextAt){burst(Math.random()*cv.width,cv.height*(0.12+Math.random()*0.45));bursts++;nextAt=frame+6+(Math.random()*16|0);}
    cx.clearRect(0,0,cv.width,cv.height);
    for(var i=ps.length-1;i>=0;i--){var p=ps[i];p.age++;p.vy+=0.07;p.vx*=0.99;p.vy*=0.99;p.x+=p.vx;p.y+=p.vy;p.rot+=0.12;var al=1-p.age/p.life;if(al<=0){ps.splice(i,1);continue;}cx.globalAlpha=al;cx.fillStyle=p.c;if(p.star)star(p.x,p.y,p.sz*2,p.rot);else{cx.beginPath();cx.arc(p.x,p.y,p.sz,0,6.283);cx.fill();}}
    cx.globalAlpha=1;
    if(ps.length||bursts<MAX)requestAnimationFrame(loop);
    else{window.removeEventListener("resize",size);cv.remove();}
  }
  requestAnimationFrame(loop);
};
</script>
<script>
// Loss — FAILED banner (stays until next interaction) + "whah-whah" trombone.
