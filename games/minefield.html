<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Мине — Тоалет Игрице</title>
<meta name="theme-color" content="#e94560">
<script>(function(){var t=localStorage.getItem('tg-theme')||(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');if(t==='light')document.documentElement.classList.add('light');})()</script>
<style>
:root{--bg:#0f0f1a;--surface:#1a1a2e;--surface2:#16213e;--accent:#e94560;--text:#e0e0e0;--dim:#888}
html.light{--bg:#f0f2f5;--surface:#fff;--surface2:#e2e5ea;--text:#1a1a2e;--dim:#666}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:18px}html.xl{font-size:22px}
body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;min-height:100dvh;-webkit-tap-highlight-color:transparent;touch-action:manipulation;transition:background .2s,color .2s}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--surface);gap:6px;border-bottom:1px solid var(--surface2)}
.topbar a{color:var(--accent);text-decoration:none;font-size:.95rem;font-weight:700;white-space:nowrap}
.topbar h2{font-size:.95rem;font-weight:700;flex:1;text-align:center}
.topbar-btns{display:flex;gap:4px;flex-shrink:0}
.icon-btn{background:none;border:1px solid var(--dim);color:var(--text);border-radius:6px;padding:5px 8px;font-size:.78rem;cursor:pointer;white-space:nowrap;line-height:1}
.wrap{padding:12px 10px 32px;max-width:480px;margin:0 auto}
.status{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;font-size:1rem;gap:8px}
.mines{font-size:1.1rem;font-weight:700;color:var(--accent)}
.timer{font-weight:700}
.new-btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:7px 14px;font-size:.9rem;font-weight:700;cursor:pointer}
.diff-row{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.diff-btn{background:var(--surface);border:1px solid var(--dim);color:var(--text);border-radius:8px;padding:6px 12px;font-size:.82rem;cursor:pointer}
.diff-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
#board{display:grid;gap:2px;margin:4px auto;background:#242440;border-radius:10px;padding:2px;width:min(500px,calc(100vw - 20px))}
html.light #board{background:#d6dbe3}
.cell{aspect-ratio:1;min-width:0;background:var(--surface);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:clamp(20px,6.8vw,31px);font-weight:1000;line-height:1;cursor:pointer;user-select:none;touch-action:none;-webkit-touch-callout:none}
html.xl .cell{font-size:clamp(23px,7.8vw,36px)}
.cell.revealed{background:var(--bg);cursor:default}
html.light .cell.revealed{background:#e2e5ea}
.cell.mine-hit{background:#e94560}
.cell.flagged{background:var(--surface2)}
.cell[data-n="1"]{color:#1397ff}.cell[data-n="2"]{color:#00c853}.cell[data-n="3"]{color:#ff1744}
.cell[data-n="4"]{color:#b000ff}.cell[data-n="5"]{color:#ff7a00}.cell[data-n="6"]{color:#00d8c8}
.cell[data-n="7"]{color:#ff2f92}.cell[data-n="8"]{color:#3f51ff}
.msg{text-align:center;font-size:1.05rem;font-weight:700;padding:10px;border-radius:8px;margin-top:8px;display:none}
.msg.win{background:#1a3a1a;color:#5cb85c}.msg.lose{background:#3a1a1a;color:#e94560}
html.light .msg.win{background:#d4edda;color:#155724}
html.light .msg.lose{background:#f8d7da;color:#721c24}
.hint{font-size:.75rem;color:var(--dim);text-align:center;margin-top:6px}
</style>
</head>
<body>
<div class="topbar">
  <a href="../" class="i18n" data-sr="← Назад" data-en="← Back">← Назад</a>
  <h2 class="i18n" data-sr="💣 Мине" data-en="💣 Minefield">💣 Мине</h2>
  <div class="topbar-btns">
    <button class="icon-btn theme-btn" onclick="toggleTheme()">🌙</button>
    <button class="icon-btn lang-btn" onclick="toggleLang()">EN</button>
    <button class="icon-btn sound-btn" onclick="toggleSound()">🔊</button>
    <button class="icon-btn" onclick="toggleFont()">Аа</button>
  </div>
</div>
<div class="wrap">
  <div class="diff-row" id="diffRow"></div>
  <div class="status">
    <span class="mines" id="mineCount">💣 10</span>
    <button class="new-btn" id="newBtn" onclick="newGame()">Нова игра</button>
    <span class="timer" id="timer">⏱ 0</span>
  </div>
  <div id="board"></div>
  <div id="msg" class="msg"></div>
  <p class="hint i18n" data-sr="Дуго притисни да означиш заставицом 🚩" data-en="Long press to flag 🚩">Дуго притисни да означиш заставицом 🚩</p>
</div>
<script>
(function(){
  // ── i18n + theme ──
  const _lang=()=>localStorage.getItem('tg-lang')||(/^(sr|hr|bs)/i.test(navigator.language)?'sr':'en');
  const _theme=()=>localStorage.getItem('tg-theme')||(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');
  function applyTheme(){const d=_theme()==='dark';document.documentElement.classList.toggle('light',!d);document.querySelectorAll('.theme-btn').forEach(b=>b.textContent=d?'☀️':'🌙');}
  function applyI18n(){const L=_lang();document.querySelectorAll('[data-'+L+']').forEach(el=>el.textContent=el.dataset[L]);document.querySelectorAll('.lang-btn').forEach(b=>b.textContent=L==='sr'?'EN':'СР');document.documentElement.lang=L;}
  window.toggleTheme=()=>{localStorage.setItem('tg-theme',_theme()==='dark'?'light':'dark');applyTheme();};
  window.toggleLang=()=>{localStorage.setItem('tg-lang',_lang()==='sr'?'en':'sr');location.reload();};
  window.toggleFont=()=>{const xl=document.documentElement.classList.toggle('xl');localStorage.setItem('tg-xl',xl?'1':'0');};
  window.toggleSound=()=>{const on=localStorage.getItem('tg-sound')!=='0';localStorage.setItem('tg-sound',on?'0':'1');document.querySelectorAll('.sound-btn').forEach(b=>b.textContent=on?'🔇':'🔊');};
  if(localStorage.getItem('tg-xl')==='1')document.documentElement.classList.add('xl');
  applyTheme();applyI18n();document.querySelectorAll('.sound-btn').forEach(b=>b.textContent=localStorage.getItem('tg-sound')==='0'?'🔇':'🔊');

  const L=_lang();
  const T={
    sr:{easy:'Лако 9×9',med:'Средње 12×9',new:'Нова игра',hit:'💥 Погодио минуте!',win:'🎉 Победа за %s секунди!',flag:'Дуго притисни да означиш заставицом 🚩'},
    en:{easy:'Easy 9×9',med:'Medium 12×9',new:'New game',hit:'💥 You hit a mine!',win:'🎉 Win in %s seconds!',flag:'Long press to flag 🚩'}
  };
  const t=k=>T[L][k]||T.sr[k];

  // Render diff buttons
  document.getElementById('diffRow').innerHTML=`
    <button class="diff-btn active" id="d0" onclick="setDiff(0)">${t('easy')}</button>
    <button class="diff-btn" id="d1" onclick="setDiff(1)">${t('med')}</button>`;
  document.getElementById('newBtn').textContent=t('new');
  document.querySelector('.hint').textContent=t('flag');

  const DIFFS=[{cols:9,rows:9,mines:10},{cols:12,rows:9,mines:20}];
  let diff=0,cols,rows,mines,board,revealed,flagged,started,over,timerInterval,ti;

  function setDiff(d){diff=d;document.querySelectorAll('.diff-btn').forEach((b,i)=>b.classList.toggle('active',i===d));newGame();}

  function newGame(){
    const cfg=DIFFS[diff];cols=cfg.cols;rows=cfg.rows;mines=cfg.mines;
    board=Array(rows*cols).fill(0);revealed=Array(rows*cols).fill(false);flagged=Array(rows*cols).fill(false);
    started=false;over=false;ti=0;
    clearInterval(timerInterval);
    document.getElementById('timer').textContent='⏱ 0';
    document.getElementById('mineCount').textContent='💣 '+mines;
    document.getElementById('msg').style.display='none';
    render();
  }

  function render(){
    const el=document.getElementById('board');
    el.style.gridTemplateColumns=`repeat(${cols},1fr)`;
    el.innerHTML='';
    for(let i=0;i<rows*cols;i++){
      const c=document.createElement('div');c.className='cell';
      if(revealed[i]){c.classList.add('revealed');if(board[i]===-1){c.classList.add('mine-hit');c.textContent='💣';}else if(board[i]>0){c.textContent=board[i];c.dataset.n=board[i];}}
      else if(flagged[i]){c.classList.add('flagged');c.textContent='🚩';}
      c.addEventListener('click',()=>reveal(i));
      let pt,sx,sy,pb;
      c.addEventListener('pointerdown',e=>{pb=e.button;sx=e.clientX;sy=e.clientY;pt=setTimeout(()=>flag(i),600);});
      c.addEventListener('pointerup',()=>clearTimeout(pt));
      c.addEventListener('pointercancel',()=>{clearTimeout(pt);flag(i);});
      c.addEventListener('pointermove',e=>{if(pt&&(Math.abs(e.clientX-sx)>15||Math.abs(e.clientY-sy)>15))clearTimeout(pt);});
      c.addEventListener('contextmenu',e=>{e.preventDefault();if(pb===2)flag(i);});
      el.appendChild(c);
    }
  }

  function placeMines(avoid){let p=0;while(p<mines){const idx=Math.floor(Math.random()*rows*cols);if(!board[idx]&&idx!==avoid){board[idx]=-1;p++;}}
    for(let i=0;i<rows*cols;i++){if(board[i]===-1)continue;board[i]=neighbors(i).filter(n=>board[n]===-1).length;}}

  function neighbors(i){const r=Math.floor(i/cols),c=i%cols,ns=[];for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){if(!dr&&!dc)continue;const nr=r+dr,nc=c+dc;if(nr>=0&&nr<rows&&nc>=0&&nc<cols)ns.push(nr*cols+nc);}return ns;}

  function reveal(i){
    if(over||revealed[i]||flagged[i])return;
    if(!started){placeMines(i);started=true;timerInterval=setInterval(()=>{ti++;document.getElementById('timer').textContent='⏱ '+ti;},1000);}
    flood(i);checkWin();render();
  }

  function statRec(g,inc,hi,lo){const j=JSON.parse(localStorage.getItem('tg-stats')||'{}');const e=j[g]||{};for(const[k,v]of Object.entries(inc||{}))e[k]=(e[k]||0)+v;for(const[k,v]of Object.entries(hi||{}))if(v!=null&&(!e[k]||v>e[k]))e[k]=v;for(const[k,v]of Object.entries(lo||{}))if(v!=null&&(!e[k]||v<e[k]))e[k]=v;j[g]=e;localStorage.setItem('tg-stats',JSON.stringify(j));}
  const SFX=(()=>{let ac;const A=()=>(ac=ac||new(window.AudioContext||window.webkitAudioContext)());const t=(f,d,tp,v)=>{if(localStorage.getItem('tg-sound')==='0')return;try{const c=A(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type=tp||'sine';o.frequency.value=f;g.gain.setValueAtTime(v||.25,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);o.start();o.stop(c.currentTime+d);}catch(e){}};const n=(d,v)=>{if(localStorage.getItem('tg-sound')==='0')return;try{const c=A(),b=c.createBuffer(1,~~(c.sampleRate*d),c.sampleRate),da=b.getChannelData(0);for(let i=0;i<da.length;i++)da[i]=Math.random()*2-1;const s=c.createBufferSource(),g=c.createGain();s.buffer=b;s.connect(g);g.connect(c.destination);g.gain.setValueAtTime(v||.15,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);s.start();s.stop(c.currentTime+d);}catch(e){}};return{reveal:()=>t(800,.04,'square',.08),boom(){n(.15,.3);t(80,.4,'sawtooth',.25);},win(){t(523,.1);setTimeout(()=>t(659,.1),100);setTimeout(()=>t(784,.25),200);}};})();

  function flood(i){if(revealed[i]||flagged[i])return;revealed[i]=true;if(board[i]===-1){over=true;clearInterval(timerInterval);SFX.boom();tgFail();statRec('minesweeper',{played:1,losses:1});showAllMines();showMsg('lose',t('hit'));}else{if(board[i]>0)SFX.reveal();if(board[i]===0)neighbors(i).forEach(flood);}}

  function showAllMines(){for(let i=0;i<rows*cols;i++)if(board[i]===-1)revealed[i]=true;}

  function flag(i){if(over||revealed[i])return;flagged[i]=!flagged[i];document.getElementById('mineCount').textContent='💣 '+(mines-flagged.filter(Boolean).length);render();}

  function checkWin(){const safe=board.filter(v=>v!==-1).length;if(revealed.filter(Boolean).length>=safe){over=true;clearInterval(timerInterval);SFX.win();celebrate();statRec('minesweeper',{played:1,wins:1},{},{bestTime:ti});showMsg('win',t('win').replace('%s',ti));}}

  function showMsg(type,text){const el=document.getElementById('msg');el.className='msg '+type;el.textContent=text;el.style.display='block';}

  window.newGame=newGame;window.setDiff=setDiff;
  newGame();
})();
</script>
<script>
// Victory — boxed VICTORY banner (stays until next interaction) + cheer + fireworks.
// Offline & self-contained; sound honors tg-sound, motion honors reduced-motion.
window.celebrate=function(){
  if(localStorage.getItem("tg-sound")!=="0"){try{var au=new Audio("./cheer.mp3");au.volume=0.85;au.play().catch(function(){});}catch(e){}}
  (function(){var L=localStorage.getItem("tg-lang")||"sr";var old=document.getElementById("tg-banner");if(old)old.remove();var b=document.createElement("div");b.id="tg-banner";b.textContent=L==="sr"?"ПОБЕДА":"VICTORY";var base="translate(-50%,-50%)";b.style.cssText="position:fixed;top:36%;left:50%;z-index:99998;pointer-events:none;white-space:nowrap;padding:.22em .6em;border-radius:20px;border:5px solid #ffd166;background:rgba(15,15,26,.86);box-shadow:0 14px 44px rgba(0,0,0,.55),0 0 0 3px rgba(0,0,0,.25) inset;-webkit-backdrop-filter:blur(3px);backdrop-filter:blur(3px);font:900 clamp(2rem,12vw,5.5rem)/1 system-ui,-apple-system,sans-serif;letter-spacing:.05em;color:#ffd166;text-shadow:0 3px 14px rgba(0,0,0,.6);opacity:0;transform:"+base+" scale(.6);transition:opacity .25s ease,transform .35s cubic-bezier(.2,1.4,.3,1)";document.body.appendChild(b);requestAnimationFrame(function(){b.style.opacity="1";b.style.transform=base+" scale(1)";});var armed=false;setTimeout(function(){armed=true;},400);function dismiss(){if(!armed)return;document.removeEventListener("pointerdown",dismiss,true);document.removeEventListener("keydown",dismiss,true);b.style.opacity="0";b.style.transform=base+" scale(1.12)";setTimeout(function(){b.remove();},220);}document.addEventListener("pointerdown",dismiss,true);document.addEventListener("keydown",dismiss,true);})();
  if(window.matchMedia&&window.matchMedia("(prefers-reduced-motion:reduce)").matches)return;
  var cv=document.createElement("canvas");
  cv.style.cssText="position:fixed;inset:0;width:100vw;height:100vh;pointer-events:none;z-index:99999";
  function size(){cv.width=window.innerWidth;cv.height=window.innerHeight;}
  size();window.addEventListener("resize",size);
  document.body.appendChild(cv);
  var cx=cv.getContext("2d");
  var COL=["#e94560","#ffd166","#06d6a0","#4dd0e1","#9b6bff","#ff7043","#ffffff"];
  var ps=[],frame=0,bursts=0,MAX=7,nextAt=0;
  function star(x,y,r,rot){cx.beginPath();for(var i=0;i<10;i++){var rr=i%2?r*0.45:r,a=rot+i*Math.PI/5;cx.lineTo(x+Math.cos(a)*rr,y+Math.sin(a)*rr);}cx.closePath();cx.fill();}
  function burst(x,y){var hue=COL[Math.random()*COL.length|0],n=40+(Math.random()*22|0);for(var i=0;i<n;i++){var a=Math.random()*Math.PI*2,sp=Math.random()*4.6+1.2;ps.push({x:x,y:y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-1.2,age:0,life:55+Math.random()*35,c:Math.random()<.4?"#fff":hue,sz:Math.random()*2.4+1.4,star:Math.random()<.5,rot:Math.random()*6});}}
  function loop(){
    frame++;
    if(bursts<MAX&&frame>=nextAt){burst(Math.random()*cv.width,cv.height*(0.12+Math.random()*0.45));bursts++;nextAt=frame+6+(Math.random()*16|0);}
    cx.clearRect(0,0,cv.width,cv.height);
    for(var i=ps.length-1;i>=0;i--){var p=ps[i];p.age++;p.vy+=0.07;p.vx*=0.99;p.vy*=0.99;p.x+=p.vx;p.y+=p.vy;p.rot+=0.12;var al=1-p.age/p.life;if(al<=0){ps.splice(i,1);continue;}cx.globalAlpha=al;cx.fillStyle=p.c;if(p.star)star(p.x,p.y,p.sz*2,p.rot);else{cx.beginPath();cx.arc(p.x,p.y,p.sz,0,6.283);cx.fill();}}
    cx.globalAlpha=1;
    if(ps.length||bursts<MAX)requestAnimationFrame(loop);
    else{window.removeEventListener("resize",size);cv.remove();}
  }
  requestAnimationFrame(loop);
};
</script>
<script>
// Loss — boxed FAILED banner (stays until next interaction) + "whah-whah" trombone.
// Offline; honors the tg-sound toggle.
window.tgFail=function(){
  if(localStorage.getItem("tg-sound")!=="0"){try{var au=new Audio("./whah.wav");au.volume=0.8;au.play().catch(function(){});}catch(e){}}
  (function(){var L=localStorage.getItem("tg-lang")||"sr";var old=document.getElementById("tg-banner");if(old)old.remove();var b=document.createElement("div");b.id="tg-banner";b.textContent=L==="sr"?"ПОРАЗ":"FAILED";var base="translate(-50%,-50%)";b.style.cssText="position:fixed;top:36%;left:50%;z-index:99998;pointer-events:none;white-space:nowrap;padding:.22em .6em;border-radius:20px;border:5px solid #e94560;background:rgba(15,15,26,.86);box-shadow:0 14px 44px rgba(0,0,0,.55),0 0 0 3px rgba(0,0,0,.25) inset;-webkit-backdrop-filter:blur(3px);backdrop-filter:blur(3px);font:900 clamp(2rem,12vw,5.5rem)/1 system-ui,-apple-system,sans-serif;letter-spacing:.05em;color:#e94560;text-shadow:0 3px 14px rgba(0,0,0,.6);opacity:0;transform:"+base+" scale(.6);transition:opacity .25s ease,transform .35s cubic-bezier(.2,1.4,.3,1)";document.body.appendChild(b);requestAnimationFrame(function(){b.style.opacity="1";b.style.transform=base+" scale(1)";});var armed=false;setTimeout(function(){armed=true;},400);function dismiss(){if(!armed)return;document.removeEventListener("pointerdown",dismiss,true);document.removeEventListener("keydown",dismiss,true);b.style.opacity="0";b.style.transform=base+" scale(1.12)";setTimeout(function(){b.remove();},220);}document.addEventListener("pointerdown",dismiss,true);document.addEventListener("keydown",dismiss,true);})();
};
</script>
</body>
</html>
