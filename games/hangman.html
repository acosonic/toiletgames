<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Вешала — Тоалет Игрице</title>
<meta name="theme-color" content="#e94560">
<script>(function(){var t=localStorage.getItem('tg-theme')||(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');if(t==='light')document.documentElement.classList.add('light');})()</script>
<style>
:root{--bg:#0f0f1a;--surface:#1a1a2e;--surface2:#16213e;--accent:#e94560;--text:#e0e0e0;--dim:#888}
html.light{--bg:#f0f2f5;--surface:#fff;--surface2:#e2e5ea;--text:#1a1a2e;--dim:#666}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:18px}html.xl{font-size:22px}
body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;min-height:100dvh;-webkit-tap-highlight-color:transparent;touch-action:manipulation;transition:background .2s,color .2s}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--surface);gap:6px;border-bottom:1px solid var(--surface2)}
.topbar a{color:var(--accent);text-decoration:none;font-size:.95rem;font-weight:700;white-space:nowrap}
.topbar h2{font-size:.95rem;font-weight:700;flex:1;text-align:center}
.topbar-btns{display:flex;gap:4px;flex-shrink:0}
.icon-btn{background:none;border:1px solid var(--dim);color:var(--text);border-radius:6px;padding:5px 8px;font-size:.78rem;cursor:pointer;white-space:nowrap;line-height:1}
.wrap{padding:12px 10px 24px;max-width:420px;margin:0 auto;display:flex;flex-direction:column;align-items:center;gap:12px}
.hud{display:flex;align-items:center;justify-content:space-between;width:100%;gap:8px}
.new-btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:7px 16px;font-size:.9rem;font-weight:700;cursor:pointer}
.lives{font-size:1rem;font-weight:700}
svg.gallows{width:min(200px,55vw);height:min(200px,55vw)}
.gallows-stroke{stroke:#555}
html.light .gallows-stroke{stroke:#aaa}
.word-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;padding:6px 4px}
.letter{font-size:2.2rem;font-weight:800;min-width:38px;text-align:center;border-bottom:3px solid var(--text);padding-bottom:2px;text-transform:uppercase;letter-spacing:1px}
html.xl .letter{font-size:2.75rem;min-width:46px}
.letter.blank{color:transparent}
.wrong-letters{font-size:.9rem;color:#e94560;text-align:center;min-height:1.4em;letter-spacing:3px;text-transform:uppercase}
#keyboard{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;max-width:390px}
.key{background:var(--surface);border:none;color:var(--text);border-radius:8px;width:40px;height:40px;font-size:1rem;font-weight:700;cursor:pointer;text-transform:uppercase;-webkit-tap-highlight-color:transparent}
html.xl .key{width:48px;height:48px;font-size:1.2rem}
.key.used-correct{background:#538d4e;color:#fff;cursor:default}
.key.used-wrong{background:#3a3a3c;color:#666;cursor:default}
html.light .key.used-wrong{background:#787c7e;color:#fff}
.hint-box{font-size:1rem;text-align:center;color:var(--dim);min-height:1.4em;letter-spacing:.02em}
.hint-box strong{color:var(--text)}
.msg{font-size:1rem;font-weight:700;text-align:center;color:var(--accent);min-height:1.4em}
.title-icon{width:1.05rem;height:1.05rem;vertical-align:-.16em;margin-right:.22rem}
.title-icon .gallows-part,.title-icon .person-part{stroke:currentColor;stroke-width:10;stroke-linecap:round;stroke-linejoin:round;fill:none}
.title-icon .person-part{stroke:var(--accent)}
</style>
</head>

    {w:'АТЛЕТИКА',c:'⚽ Спорт'},{w:'ВАТЕРПОЛО',c:'⚽ Спорт'},{w:'ОДБОЈКА',c:'⚽ Спорт'},
    {w:'ПЛИВАЊЕ',c:'⚽ Спорт'},{w:'РУКОМЕТ',c:'⚽ Спорт'},{w:'ТЕНИС',c:'⚽ Спорт'},
    {w:'ШАХ',c:'⚽ Спорт'},{w:'БАЈКА',c:'⚔️ Бајке'},{w:'ВИТЕЗ',c:'⚔️ Бајке'},
    {w:'КРАЉ',c:'⚔️ Бајке'},{w:'КРАЉИЦА',c:'⚔️ Бајке'},{w:'МАГИЈА',c:'⚔️ Бајке'},
    {w:'ПАТУЉАК',c:'⚔️ Бајке'},{w:'ПРИНЦ',c:'⚔️ Бајке'},{w:'ПРИНЦЕЗА',c:'⚔️ Бајке'},
    {w:'ЧУДОВИШТЕ',c:'⚔️ Бајке'},{w:'ЧАРОЛИЈА',c:'⚔️ Бајке'},
  ];
  const ALPHABETS={sr:'АБВГДЂЕЖЗИЈКЛЉМНЊОПРСТЋУФХЦЧЏШ'.split(''),en:'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('')};
  const KEYMAP_SR={A:'А',B:'Б',V:'В',G:'Г',D:'Д','Đ':'Ђ',E:'Е','Ž':'Ж',Z:'З',I:'И',J:'Ј',K:'К',L:'Л',M:'М',N:'Н',O:'О',P:'П',R:'Р',S:'С',T:'Т','Ć':'Ћ',U:'У',F:'Ф',H:'Х',C:'Ц','Č':'Ч','Š':'Ш'};
  const PARTS=['hg-head','hg-body','hg-arm1','hg-arm2','hg-leg1','hg-leg2'];

  function statRec(g,inc,hi,lo){const j=JSON.parse(localStorage.getItem('tg-stats')||'{}');const e=j[g]||{};for(const[k,v]of Object.entries(inc||{}))e[k]=(e[k]||0)+v;for(const[k,v]of Object.entries(hi||{}))if(v!=null&&(!e[k]||v>e[k]))e[k]=v;for(const[k,v]of Object.entries(lo||{}))if(v!=null&&(!e[k]||v<e[k]))e[k]=v;j[g]=e;localStorage.setItem('tg-stats',JSON.stringify(j));}
  const SFX=(()=>{let ac;const A=()=>(ac=ac||new(window.AudioContext||window.webkitAudioContext)());const t=(f,d,tp,v)=>{if(localStorage.getItem('tg-sound')==='0')return;try{const c=A(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type=tp||'sine';o.frequency.value=f;g.gain.setValueAtTime(v||.25,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);o.start();o.stop(c.currentTime+d);}catch(e){}};return{hit:()=>t(523,.08),miss:()=>t(200,.2,'sawtooth',.15),win(){t(523,.1);setTimeout(()=>t(659,.1),100);setTimeout(()=>t(784,.25),200);},die(){t(330,.1,'sawtooth',.2);setTimeout(()=>t(220,.15,'sawtooth',.2),100);setTimeout(()=>t(110,.3,'sawtooth',.15),220);}};})();

  let word,category,guessed,wrong,over,wins=0;

  function newGame(){localStorage.removeItem('tg-hangman-save');const words=L==='sr'?WORDS_SR:WORDS_EN;const entry=words[Math.floor(Math.random()*words.length)];word=entry.w;category=entry.c;guessed=new Set();wrong=[];over=false;PARTS.forEach(id=>document.getElementById(id).style.display='none');document.getElementById('msg').textContent='';document.getElementById('hintBox').innerHTML=t('hint')+'<strong>'+category+'</strong>';renderWord();renderKeyboard();updateLives();}

  // remember an in-progress round so it can be resumed on next visit
  function saveHM(){if(over||guessed.size===0){localStorage.removeItem('tg-hangman-save');return;}localStorage.setItem('tg-hangman-save',JSON.stringify({lang:L,word,category,guessed:[...guessed],wrong}));}
  function loadHM(){try{const s=JSON.parse(localStorage.getItem('tg-hangman-save'));if(!s||s.lang!==L||!s.word||!Array.isArray(s.guessed)||!Array.isArray(s.wrong))return false;if(s.wrong.length>=PARTS.length)return false;if(s.word.split('').every(c=>s.guessed.includes(c)))return false;word=s.word;category=s.category;guessed=new Set(s.guessed);wrong=s.wrong;over=false;PARTS.forEach((id,i)=>document.getElementById(id).style.display=i<wrong.length?'':'none');document.getElementById('msg').textContent='';document.getElementById('hintBox').innerHTML=t('hint')+'<strong>'+category+'</strong>';renderWord();renderKeyboard();updateLives();return true;}catch(e){return false;}}

  function renderWord(){const el=document.getElementById('wordRow');el.innerHTML='';for(const ch of word){const s=document.createElement('span');s.className='letter'+(guessed.has(ch)?'':' blank');s.textContent=ch;el.appendChild(s);}document.getElementById('wrongLetters').textContent=wrong.join(' ');}

  function renderKeyboard(){const el=document.getElementById('keyboard');el.innerHTML='';for(const ch of ALPHABETS[L]){const b=document.createElement('button');b.className='key'+(guessed.has(ch)?(word.includes(ch)?' used-correct':' used-wrong'):'');b.textContent=ch;b.addEventListener('click',()=>guess(ch));el.appendChild(b);}}

  function guess(ch){
    if(over||guessed.has(ch))return;guessed.add(ch);
    if(!word.includes(ch)){SFX.miss();wrong.push(ch);if(wrong.length<=PARTS.length)document.getElementById(PARTS[wrong.length-1]).style.display='';if(wrong.length>=PARTS.length){over=true;SFX.die();tgFail();statRec('hangman',{played:1,losses:1});document.getElementById('msg').textContent=t('lose')+word;}}else{SFX.hit();}
    const solved=word.split('').every(c=>guessed.has(c));
    if(solved&&!over){over=true;wins++;document.getElementById('score').textContent='✅ '+wins;SFX.win();celebrate();statRec('hangman',{played:1,wins:1});document.getElementById('msg').textContent=t('win');}
    renderWord();renderKeyboard();updateLives();saveHM();
  }

  function updateLives(){document.getElementById('lives').textContent='❤️ '+(PARTS.length-wrong.length);}

  function normalizeKey(key){
    const ch=key.toUpperCase();
    if(L==='en')return /^[A-Z]$/.test(ch)?ch:null;
    if(ALPHABETS.sr.includes(ch))return ch;
    return KEYMAP_SR[ch]||null;
  }

  document.addEventListener('keydown',e=>{const ch=normalizeKey(e.key);if(!over&&ch)guess(ch);});

  window.newGame=newGame;if(!loadHM())newGame();
})();
</script>
<script>
// Victory — boxed VICTORY banner (stays until next interaction) + cheer + fireworks.
// Offline & self-contained; sound honors tg-sound, motion honors reduced-motion.
window.celebrate=function(){
  if(localStorage.getItem("tg-sound")!=="0"){try{var au=new Audio("./cheer.mp3");au.volume=0.85;au.play().catch(function(){});}catch(e){}}
  (function(){var L=localStorage.getItem("tg-lang")||"sr";var old=document.getElementById("tg-banner");if(old)old.remove();var b=document.createElement("div");b.id="tg-banner";b.textContent=L==="sr"?"ПОБЕДА":"VICTORY";var base="translate(-50%,-50%)";b.style.cssText="position:fixed;top:36%;left:50%;z-index:99998;pointer-events:none;white-space:nowrap;padding:.22em .6em;border-radius:20px;border:5px solid #ffd166;background:rgba(15,15,26,.86);box-shadow:0 14px 44px rgba(0,0,0,.55),0 0 0 3px rgba(0,0,0,.25) inset;-webkit-backdrop-filter:blur(3px);backdrop-filter:blur(3px);font:900 clamp(2rem,12vw,5.5rem)/1 system-ui,-apple-system,sans-serif;letter-spacing:.05em;color:#ffd166;text-shadow:0 3px 14px rgba(0,0,0,.6);opacity:0;transform:"+base+" scale(.6);transition:opacity .25s ease,transform .35s cubic-bezier(.2,1.4,.3,1)";document.body.appendChild(b);requestAnimationFrame(function(){b.style.opacity="1";b.style.transform=base+" scale(1)";});var armed=false;setTimeout(function(){armed=true;},400);function dismiss(){if(!armed)return;document.removeEventListener("pointerdown",dismiss,true);document.removeEventListener("keydown",dismiss,true);b.style.opacity="0";b.style.transform=base+" scale(1.12)";setTimeout(function(){b.remove();},220);}document.addEventListener("pointerdown",dismiss,true);document.addEventListener("keydown",dismiss,true);})();
  if(window.matchMedia&&window.matchMedia("(prefers-reduced-motion:reduce)").matches)return;
  var cv=document.createElement("canvas");
  cv.style.cssText="position:fixed;inset:0;width:100vw;height:100vh;pointer-events:none;z-index:99999";
  function size(){cv.width=window.innerWidth;cv.height=window.innerHeight;}
  size();window.addEventListener("resize",size);
  document.body.appendChild(cv);
  var cx=cv.getContext("2d");
  var COL=["#e94560","#ffd166","#06d6a0","#4dd0e1","#9b6bff","#ff7043","#ffffff"];
  var ps=[],frame=0,bursts=0,MAX=7,nextAt=0;
  function star(x,y,r,rot){cx.beginPath();for(var i=0;i<10;i++){var rr=i%2?r*0.45:r,a=rot+i*Math.PI/5;cx.lineTo(x+Math.cos(a)*rr,y+Math.sin(a)*rr);}cx.closePath();cx.fill();}
  function burst(x,y){var hue=COL[Math.random()*COL.length|0],n=40+(Math.random()*22|0);for(var i=0;i<n;i++){var a=Math.random()*Math.PI*2,sp=Math.random()*4.6+1.2;ps.push({x:x,y:y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-1.2,age:0,life:55+Math.random()*35,c:Math.random()<.4?"#fff":hue,sz:Math.random()*2.4+1.4,star:Math.random()<.5,rot:Math.random()*6});}}
  function loop(){
    frame++;
    if(bursts<MAX&&frame>=nextAt){burst(Math.random()*cv.width,cv.height*(0.12+Math.random()*0.45));bursts++;nextAt=frame+6+(Math.random()*16|0);}
    cx.clearRect(0,0,cv.width,cv.height);
    for(var i=ps.length-1;i>=0;i--){var p=ps[i];p.age++;p.vy+=0.07;p.vx*=0.99;p.vy*=0.99;p.x+=p.vx;p.y+=p.vy;p.rot+=0.12;var al=1-p.age/p.life;if(al<=0){ps.splice(i,1);continue;}cx.globalAlpha=al;cx.fillStyle=p.c;if(p.star)star(p.x,p.y,p.sz*2,p.rot);else{cx.beginPath();cx.arc(p.x,p.y,p.sz,0,6.283);cx.fill();}}
    cx.globalAlpha=1;
    if(ps.length||bursts<MAX)requestAnimationFrame(loop);
    else{window.removeEventListener("resize",size);cv.remove();}
  }
  requestAnimationFrame(loop);
};
</script>
