<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Парови — Тоалет Игрице</title>
<meta name="theme-color" content="#e94560">
<script>(function(){var t=localStorage.getItem('tg-theme')||(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');if(t==='light')document.documentElement.classList.add('light');})()</script>
<style>
:root{--bg:#0f0f1a;--surface:#1a1a2e;--surface2:#16213e;--accent:#e94560;--text:#e0e0e0;--dim:#888}
html.light{--bg:#f0f2f5;--surface:#fff;--surface2:#e2e5ea;--text:#1a1a2e;--dim:#666}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:18px}html.xl{font-size:22px}
body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;min-height:100dvh;-webkit-tap-highlight-color:transparent;touch-action:manipulation;transition:background .2s,color .2s}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--surface);gap:6px;border-bottom:1px solid var(--surface2)}
.topbar a{color:var(--accent);text-decoration:none;font-size:.95rem;font-weight:700;white-space:nowrap}
.topbar h2{font-size:.95rem;font-weight:700;flex:1;text-align:center}
.topbar-btns{display:flex;gap:4px;flex-shrink:0}
.icon-btn{background:none;border:1px solid var(--dim);color:var(--text);border-radius:6px;padding:5px 8px;font-size:.78rem;cursor:pointer;white-space:nowrap;line-height:1}
.wrap{padding:12px 10px 32px;max-width:420px;margin:0 auto;display:flex;flex-direction:column;align-items:center;gap:12px}
.hud{display:flex;align-items:center;justify-content:space-between;width:100%;gap:8px}
.moves{font-size:1rem;font-weight:700}
.new-btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:8px 18px;font-size:.9rem;font-weight:700;cursor:pointer}
.size-row{display:flex;gap:8px}
.size-btn{background:var(--surface);border:1px solid var(--dim);color:var(--text);border-radius:8px;padding:6px 12px;font-size:.82rem;cursor:pointer}
.size-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
#board{display:grid;gap:8px;justify-content:center}
.card{aspect-ratio:1;background:var(--surface);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:2.2rem;cursor:pointer;user-select:none;position:relative;overflow:hidden}
html.xl .card{font-size:2.8rem}
.card .back{position:absolute;inset:0;background:var(--surface);border-radius:inherit;display:flex;align-items:center;justify-content:center;font-size:1.4rem;color:var(--dim);transition:transform .25s;backface-visibility:hidden}
.card .front{position:absolute;inset:0;background:var(--surface2);border-radius:inherit;display:flex;align-items:center;justify-content:center;transform:rotateY(180deg);transition:transform .25s;backface-visibility:hidden}
.card.flipped .back{transform:rotateY(180deg)}.card.flipped .front{transform:rotateY(0deg)}
.card.matched{cursor:default}.card.matched .front{background:#1a3a1a}
html.light .card.matched .front{background:#d4edda}
.msg{font-size:1.05rem;font-weight:700;text-align:center;color:var(--accent);min-height:1.4em}
</style>
</head>
<body>
<div class="topbar">
  <a href="../" class="i18n" data-sr="← Назад" data-en="← Back">← Назад</a>
  <h2 class="i18n" data-sr="🧠 Парови" data-en="🧠 Pairs">🧠 Парови</h2>
  <div class="topbar-btns">
    <button class="icon-btn theme-btn" onclick="toggleTheme()">🌙</button>
    <button class="icon-btn lang-btn" onclick="toggleLang()">EN</button>
    <button class="icon-btn sound-btn" onclick="toggleSound()">🔊</button>
    <button class="icon-btn" onclick="toggleFont()">Аа</button>
  </div>
</div>
<div class="wrap">
  <div class="size-row">
    <button class="size-btn active" id="s4" onclick="setSize(4)">4×4</button>
    <button class="size-btn" id="s5" onclick="setSize(5)">4×5</button>
  </div>
  <div class="hud">
    <span class="moves"><span class="i18n" data-sr="Потези: " data-en="Moves: ">Потези: </span><span id="moves">0</span></span>
    <button class="new-btn i18n" data-sr="Нова" data-en="New" onclick="newGame()">Нова</button>
    <span class="moves"><span class="i18n" data-sr="Пари: " data-en="Pairs: ">Пари: </span><span id="pairs">0</span>/<span id="total">8</span></span>
  </div>
  <div id="board"></div>
  <div class="msg" id="msg"></div>
</div>
<script>
(function(){
  const _lang=()=>localStorage.getItem('tg-lang')||(/^(sr|hr|bs)/i.test(navigator.language)?'sr':'en');
  const _theme=()=>localStorage.getItem('tg-theme')||(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');
  function applyTheme(){const d=_theme()==='dark';document.documentElement.classList.toggle('light',!d);document.querySelectorAll('.theme-btn').forEach(b=>b.textContent=d?'☀️':'🌙');}
  function applyI18n(){const L=_lang();document.querySelectorAll('[data-'+L+']').forEach(el=>el.textContent=el.dataset[L]);document.querySelectorAll('.lang-btn').forEach(b=>b.textContent=L==='sr'?'EN':'СР');document.documentElement.lang=L;}
  window.toggleTheme=()=>{localStorage.setItem('tg-theme',_theme()==='dark'?'light':'dark');applyTheme();};
  window.toggleLang=()=>{localStorage.setItem('tg-lang',_lang()==='sr'?'en':'sr');location.reload();};
  window.toggleFont=()=>{const xl=document.documentElement.classList.toggle('xl');localStorage.setItem('tg-xl',xl?'1':'0');};
  window.toggleSound=()=>{const on=localStorage.getItem('tg-sound')!=='0';localStorage.setItem('tg-sound',on?'0':'1');document.querySelectorAll('.sound-btn').forEach(b=>b.textContent=on?'🔇':'🔊');};
  if(localStorage.getItem('tg-xl')==='1')document.documentElement.classList.add('xl');
  applyTheme();applyI18n();document.querySelectorAll('.sound-btn').forEach(b=>b.textContent=localStorage.getItem('tg-sound')==='0'?'🔇':'🔊');
  const L=_lang();
  const winMsg=n=>L==='sr'?'🎉 Победа за '+n+' потеза!':'🎉 Win in '+n+' moves!';

  function statRec(g,inc,hi,lo){const j=JSON.parse(localStorage.getItem('tg-stats')||'{}');const e=j[g]||{};for(const[k,v]of Object.entries(inc||{}))e[k]=(e[k]||0)+v;for(const[k,v]of Object.entries(hi||{}))if(v!=null&&(!e[k]||v>e[k]))e[k]=v;for(const[k,v]of Object.entries(lo||{}))if(v!=null&&(!e[k]||v<e[k]))e[k]=v;j[g]=e;localStorage.setItem('tg-stats',JSON.stringify(j));}
  const SFX=(()=>{let ac;const A=()=>(ac=ac||new(window.AudioContext||window.webkitAudioContext)());const t=(f,d,tp,v)=>{if(localStorage.getItem('tg-sound')==='0')return;try{const c=A(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type=tp||'sine';o.frequency.value=f;g.gain.setValueAtTime(v||.25,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);o.start();o.stop(c.currentTime+d);}catch(e){}};return{flip:()=>t(800,.05,'square',.08),match(){t(523,.1);setTimeout(()=>t(784,.15),100);},miss:()=>t(200,.15,'sine',.1),win(){t(523,.1);setTimeout(()=>t(659,.1),100);setTimeout(()=>t(784,.25),200);}};})();

  const EMOJIS=['🐶','🐱','🐭','🐹','🐰','🦊','🐻','🐼','🐨','🐯'];
  let cards,flipped,matched,moves,pairs,cols,rows,gridSize=4,locked;

  function setSize(n){gridSize=n;document.getElementById('s4').classList.toggle('active',n===4);document.getElementById('s5').classList.toggle('active',n===5);newGame();}

  function newGame(){
    cols=4;rows=gridSize;const total=cols*rows/2;const pool=EMOJIS.slice(0,total);
    cards=[...pool,...pool].sort(()=>Math.random()-.5);flipped=[];matched=new Set();moves=0;pairs=0;locked=false;
    document.getElementById('moves').textContent=0;document.getElementById('pairs').textContent=0;document.getElementById('total').textContent=total;document.getElementById('msg').textContent='';render();
  }

  function render(){
    const el=document.getElementById('board');el.style.gridTemplateColumns=`repeat(${cols},1fr)`;el.style.width=`min(360px,calc(100vw - 20px))`;el.innerHTML='';
    cards.forEach((emoji,i)=>{const c=document.createElement('div');c.className='card'+(flipped.includes(i)||matched.has(i)?' flipped':'')+(matched.has(i)?' matched':'');c.innerHTML=`<div class="back">🂠</div><div class="front">${emoji}</div>`;c.addEventListener('click',()=>flip(i));el.appendChild(c);});
  }

  function flip(i){if(locked||flipped.includes(i)||matched.has(i))return;SFX.flip();flipped.push(i);render();if(flipped.length===2){moves++;document.getElementById('moves').textContent=moves;locked=true;setTimeout(check,700);}}

  function check(){const[a,b]=flipped;if(cards[a]===cards[b]){SFX.match();matched.add(a);matched.add(b);pairs++;document.getElementById('pairs').textContent=pairs;if(pairs===cols*rows/2){SFX.win();document.getElementById('msg').textContent=winMsg(moves);statRec('memory',{played:1,wins:1},{},{bestMoves:moves});}}else{SFX.miss();}flipped=[];locked=false;render();}

  window.newGame=newGame;window.setSize=setSize;
  newGame();
})();
</script>
</body>
</html>
