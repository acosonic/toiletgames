<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Гурач — Тоалет Игрице</title>
<meta name="theme-color" content="#e94560">
<script>(function(){var t=localStorage.getItem('tg-theme')||(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');if(t==='light')document.documentElement.classList.add('light');})()</script>
<style>
:root{--bg:#0f0f1a;--surface:#1a1a2e;--surface2:#16213e;--accent:#e94560;--text:#e0e0e0;--dim:#888}
html.light{--bg:#f0f2f5;--surface:#fff;--surface2:#e2e5ea;--text:#1a1a2e;--dim:#666}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:18px}html.xl{font-size:22px}
body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;min-height:100dvh;-webkit-tap-highlight-color:transparent}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--surface);gap:6px;border-bottom:1px solid var(--surface2)}
.topbar a{color:var(--accent);text-decoration:none;font-size:.95rem;font-weight:700;white-space:nowrap}
.topbar h2{font-size:.95rem;font-weight:700;flex:1;text-align:center}
.topbar-btns{display:flex;gap:4px;flex-shrink:0}
.icon-btn{background:none;border:1px solid var(--dim);color:var(--text);border-radius:6px;padding:5px 8px;font-size:.78rem;cursor:pointer;white-space:nowrap;line-height:1}
.wrap{padding:8px 10px;max-width:540px;margin:0 auto;display:flex;flex-direction:column;align-items:center;gap:8px}
.hud{display:flex;align-items:center;justify-content:space-between;width:100%;font-size:.9rem;font-weight:700;flex-wrap:wrap;gap:6px}
.hud-btns{display:flex;gap:6px}
.ctrl-btn{background:var(--surface2);border:1px solid var(--dim);color:var(--text);border-radius:8px;padding:5px 12px;font-size:.82rem;cursor:pointer;touch-action:manipulation}
.level-info{font-size:.8rem;color:var(--dim);text-align:center;width:100%;min-height:1.2em}
canvas{display:block;max-width:100%;height:auto;border:1px solid var(--surface2)}
.canvas-wrap{position:relative;display:inline-block;max-width:100%}
.gameover{position:absolute;inset:0;background:rgba(0,0,0,0.78);display:none;align-items:center;justify-content:center;border-radius:4px}
.gameover.show{display:flex;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.go-card{background:var(--surface);border-radius:16px;padding:22px 28px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:14px;box-shadow:0 4px 24px rgba(0,0,0,.5)}
.go-icon{font-size:2.4rem}
.go-msg{font-size:1rem;font-weight:700;color:var(--accent)}
.go-btns{display:flex;gap:10px}
.go-btn{border:none;border-radius:10px;padding:11px 22px;font-size:.95rem;font-weight:700;cursor:pointer;touch-action:manipulation}
.go-btn.retry{background:var(--accent);color:#fff}
.go-btn.newlvl{background:var(--surface2);color:var(--text);border:1px solid var(--dim)}
.next-btn{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:10px 24px;font-size:1rem;font-weight:700;cursor:pointer;touch-action:manipulation;display:none}
.dpad{display:grid;grid-template-columns:repeat(3,60px);grid-template-rows:repeat(2,60px);gap:6px;margin-top:6px}
.dpad button{background:var(--surface);border:1px solid var(--surface2);border-radius:10px;color:var(--text);font-size:1.5rem;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.dpad button:active{background:var(--accent);color:#fff}
.dpad .up{grid-column:2;grid-row:1}
.dpad .left{grid-column:1;grid-row:2}
.dpad .down{grid-column:2;grid-row:2}
.dpad .right{grid-column:3;grid-row:2}

<body>
<div class="topbar">
  <a href="../" class="i18n" data-sr="← Назад" data-en="← Back">← Назад</a>
  <h2 class="i18n" data-sr="📦 Гурач" data-en="📦 Box Pusher">📦 Гурач</h2>
  <div class="topbar-btns">
    <button class="icon-btn theme-btn" onclick="toggleTheme()">🌙</button>
    <button class="icon-btn lang-btn" onclick="toggleLang()">EN</button>
    <button class="icon-btn sound-btn" onclick="toggleSound()">🔊</button>
    <button class="icon-btn" onclick="toggleFont()">Аа</button>
  </div>
</div>
<div class="wrap">
  <div class="hud">
    <span id="levelEl">🎯 1/6</span>
    <div class="hud-btns">
      <button class="ctrl-btn i18n" data-sr="↩ Поништи" data-en="↩ Undo" onclick="undo()">↩ Поништи</button>
      <button class="ctrl-btn i18n" data-sr="↺ Ресет" data-en="↺ Reset" onclick="resetLevel()">↺ Ресет</button>

      <button class="ctrl-btn" onclick="startRandom()" title="New random">🎲</button>
    </div>

  </div>
  <div class="level-info" id="levelInfo"></div>
  <div class="canvas-wrap">
    <canvas id="game"></canvas>

        <div class="go-icon">💀</div>

    <button class="up" onclick="doMove(0,-1)">▲</button>

    <button class="down" onclick="doMove(0,1)">▼</button>
    <button class="right" onclick="doMove(1,0)">►</button>
  </div>
</div>
<script>
(function(){
  const _lang=()=>localStorage.getItem('tg-lang')||(/^(sr|hr|bs)/i.test(navigator.language)?'sr':'en');
  const _theme=()=>localStorage.getItem('tg-theme')||(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');
  function applyTheme(){const d=_theme()==='dark';document.documentElement.classList.toggle('light',!d);document.querySelectorAll('.theme-btn').forEach(b=>b.textContent=d?'☀️':'🌙');}
  function applyI18n(){const L=_lang();document.querySelectorAll('[data-'+L+']').forEach(el=>el.textContent=el.dataset[L]);document.querySelectorAll('.lang-btn').forEach(b=>b.textContent=L==='sr'?'EN':'СР');document.documentElement.lang=L;}
  window.toggleTheme=()=>{localStorage.setItem('tg-theme',_theme()==='dark'?'light':'dark');applyTheme();};
  window.toggleLang=()=>{localStorage.setItem('tg-lang',_lang()==='sr'?'en':'sr');location.reload();};
  window.toggleFont=()=>{const xl=document.documentElement.classList.toggle('xl');localStorage.setItem('tg-xl',xl?'1':'0');};
  window.toggleSound=()=>{const on=localStorage.getItem('tg-sound')!=='0';localStorage.setItem('tg-sound',on?'0':'1');document.querySelectorAll('.sound-btn').forEach(b=>b.textContent=on?'🔇':'🔊');};
  if(localStorage.getItem('tg-xl')==='1')document.documentElement.classList.add('xl');
  applyTheme();applyI18n();document.querySelectorAll('.sound-btn').forEach(b=>b.textContent=localStorage.getItem('tg-sound')==='0'?'🔇':'🔊');
})();

// ── canvas setup ────────────────────────────────────────────
const canvas = document.getElementById('game');
const context = canvas.getContext('2d');
const grid = 56;

const wallCanvas = document.createElement('canvas');
const wallCtx = wallCanvas.getContext('2d');
wallCanvas.width = wallCanvas.height = grid;
function drawWallTile() {
  wallCtx.fillStyle = '#3d3520';
  wallCtx.fillRect(0, 0, grid, grid);
  wallCtx.fillStyle = '#6b5e35';
  wallCtx.fillRect(1, 1, grid - 2, 17);
  wallCtx.fillRect(0, 20, 17, 16);
  wallCtx.fillRect(19, 20, grid - 19, 16);
  wallCtx.fillRect(0, 38, grid - 18, 18);
  wallCtx.fillRect(grid - 16, 38, 16, 18);
}
drawWallTile();
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && cells) { drawWallTile(); draw(); }
});

const T = { wall:'#', player:'@', playerOnGoal:'+', block:'$', blockOnGoal:'*', goal:'.', empty:' ' };

function statRec(g,inc,hi,lo){const j=JSON.parse(localStorage.getItem('tg-stats')||'{}');const e=j[g]||{};for(const[k,v]of Object.entries(inc||{}))e[k]=(e[k]||0)+v;for(const[k,v]of Object.entries(hi||{}))if(v!=null&&(!e[k]||v>e[k]))e[k]=v;for(const[k,v]of Object.entries(lo||{}))if(v!=null&&(!e[k]||v<e[k]))e[k]=v;j[g]=e;localStorage.setItem('tg-stats',JSON.stringify(j));}
const SFX=(()=>{let ac;const A=()=>(ac=ac||new(window.AudioContext||window.webkitAudioContext)());const t=(f,d,tp,v)=>{if(localStorage.getItem('tg-sound')==='0')return;try{const c=A(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type=tp||'sine';o.frequency.value=f;g.gain.setValueAtTime(v||.25,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);o.start();o.stop(c.currentTime+d);}catch(e){}};return{step:()=>t(400,.04,'square',.08),push:()=>t(250,.06,'square',.12),win(){t(523,.1);setTimeout(()=>t(659,.1),100);setTimeout(()=>t(784,.25),200);},error(){t(180,.15,'sawtooth',.2);setTimeout(()=>t(140,.25,'sawtooth',.2),150);}};})();

// ── fallback level (used when generator fails) ────────────────
const FALLBACK =
`##########
##########
##.###  ##
## ##  $ #
## ##@   #
## .  #$##
##  $   ##
### $..###
###  #####
##########`;

// ── level generator ──────────────────────────────────────────
// Backward generation: start from solved state, apply reverse moves.
// A reverse move undoes a forward push:
//   forward: player at P pushes box from P+d to P+2d
//   reverse: box at B, player walks to B-d, then box returns to B-d, player to B-2d

function pathLength(st, from, to) {
  if (from.row === to.row && from.col === to.col) return 0;
  const ok = (r, c) => { const v = st[r]?.[c]; return v !== undefined && v !== '#' && v !== '$' && v !== '*'; };
  if (!ok(to.row, to.col)) return Infinity;
  const dist = new Map([[from.row * 200 + from.col, 0]]);
  const q = [[from.row, from.col]];
  for (let i = 0; i < q.length; i++) {
    const [r, c] = q[i], d = dist.get(r * 200 + c);
    for (const [dr, dc] of [[-1,0],[1,0],[0,-1],[0,1]]) {
      const nr = r + dr, nc = c + dc, key = nr * 200 + nc;
      if (nr === to.row && nc === to.col && ok(nr, nc)) return d + 1;
      if (!dist.has(key) && ok(nr, nc)) { dist.set(key, d + 1); q.push([nr, nc]); }
    }
  }
  return Infinity;
}

function tryGenerate(W, H, numBoxes, numMoves) {
  // Border walls + random interior walls
  const g = Array.from({length: H}, (_, r) =>
    Array.from({length: W}, (_, c) =>
      (r === 0 || r === H-1 || c === 0 || c === W-1) ? '#' : ' ')
  );
  const wallCount = Math.floor((W-2) * (H-2) * 0.16);
  for (let i = 0; i < wallCount; i++) {
    g[1 + Math.floor(Math.random()*(H-2))][1 + Math.floor(Math.random()*(W-2))] = '#';
  }

  // Connectivity check
  const open = [];
  for (let r = 1; r < H-1; r++)
    for (let c = 1; c < W-1; c++)
      if (g[r][c] === ' ') open.push([r, c]);
  if (open.length < numBoxes * 5 + 3) return null;

  const vis = new Set([open[0][0]*W + open[0][1]]);
  const bq = [open[0]];
  for (let i = 0; i < bq.length; i++) {
    const [r, c] = bq[i];
    for (const [dr, dc] of [[-1,0],[1,0],[0,-1],[0,1]]) {
      const key = (r+dr)*W + (c+dc);
      if (!vis.has(key) && g[r+dr]?.[c+dc] === ' ') { vis.add(key); bq.push([r+dr, c+dc]); }
    }
  }
  if (vis.size < open.length * 0.8) return null;

  const reachable = open.filter(([r, c]) => vis.has(r*W + c));
  if (reachable.length < numBoxes + 3) return null;

  // Solved state: boxes on goals, player placed
  const sh = [...reachable].sort(() => Math.random() - 0.5);
  const goals = sh.slice(0, numBoxes);
  const pStart = sh[numBoxes];

  const st = g.map(row => [...row]);
  goals.forEach(([r, c]) => { st[r][c] = '*'; });
  st[pStart[0]][pStart[1]] = '@';
  let pPos = {row: pStart[0], col: pStart[1]};

  // Apply reverse moves, tracking full solution length (walks + pushes)
  const DIRS = [[-1,0],[1,0],[0,-1],[0,1]];
  let applied = 0, solutionMoves = 0;

  for (let i = 0; i < numMoves; i++) {
    const valid = [];
    for (let r = 1; r < H-1; r++) {
      for (let c = 1; c < W-1; c++) {
        if (st[r][c] !== '$' && st[r][c] !== '*') continue;
        for (const [dr, dc] of DIRS) {
          const bR = r - dr, bC = c - dc;
          const pR = r - 2*dr, pC = c - 2*dc;
          if (bR < 1 || bR > H-2 || bC < 1 || bC > W-2) continue;
          if (pR < 1 || pR > H-2 || pC < 1 || pC > W-2) continue;
          if (st[bR][bC] !== ' ' && st[bR][bC] !== '.') continue;
          const pCell = st[pR][pC];
          if (pCell === '#' || pCell === '$' || pCell === '*') continue;
          const wl = pathLength(st, pPos, {row: bR, col: bC});
          if (wl !== Infinity) valid.push({r, c, bR, bC, pR, pC, wl});
        }
      }
    }
    if (!valid.length) break;
    const mv = valid[Math.floor(Math.random() * valid.length)];
    solutionMoves += mv.wl + 1; // walking steps to reach push position + 1 push

    st[mv.r][mv.c] = st[mv.r][mv.c] === '*' ? '.' : ' ';
    st[mv.bR][mv.bC] = st[mv.bR][mv.bC] === '.' ? '*' : '$';
    st[pPos.row][pPos.col] = st[pPos.row][pPos.col] === '+' ? '.' : ' ';
    st[mv.pR][mv.pC] = st[mv.pR][mv.pC] === '.' ? '+' : '@';
    pPos = {row: mv.pR, col: mv.pC};
    applied++;
  }

  if (applied < Math.floor(numMoves * 0.35)) return null;
  return {level: st.map(row => row.join('')).join('\n'), pushes: applied, solutionMoves};
}

function generateLevel(numBoxes, numMoves) {
  for (let i = 0; i < 40; i++) {
    const r = tryGenerate(10, 9, numBoxes, numMoves);
    if (r) return r;
  }
  return null;
}

// ── push-optimal BFS solver ───────────────────────────────────
// Returns minimum push count to solve, or null if not found within maxStates.
// Uses zone-normalised states: player position collapsed to "reachable zone"
// so identical configurations with different player positions are deduplicated.
function solveSokoban(levelStr, maxStates) {
  maxStates = maxStates || 100000;
  const rows = levelStr.split('\n').filter(r => r.trim() !== '');
  const H = rows.length, W = Math.max(...rows.map(r => r.length));
  let pr = -1, pc = -1;
  const boxes0 = [], goalKeys = [], walls = new Set();
  for (let r = 0; r < H; r++) for (let c = 0; c < W; c++) {
    const ch = ((rows[r] || '')[c]) || '#';
    if (ch === '#') { walls.add(r * 100 + c); continue; }
    if ('@+'.includes(ch)) { pr = r; pc = c; }
    if ('$*'.includes(ch)) boxes0.push(r * 100 + c);
    if ('.*+'.includes(ch)) goalKeys.push(r * 100 + c);
  }
  if (pr < 0) return null;
  const goalSet = new Set(goalKeys);
  const isFloor = (r, c) => r >= 0 && r < H && c >= 0 && c < W && !walls.has(r * 100 + c);
  const isOpen  = (r, c, bx) => isFloor(r, c) && !bx.has(r * 100 + c);
  // Simple corner deadlock: box ends up in corner not on goal → prune
  const deadlock = (r, c, bx) => {
    if (goalSet.has(r * 100 + c)) return false;
    const u = !isFloor(r-1,c), d = !isFloor(r+1,c), l = !isFloor(r,c-1), ri = !isFloor(r,c+1);
    return (u || d) && (l || ri);
  };
  const getZone = (pr, pc, bx) => {
    const s = new Set(), q = [pr * 100 + pc]; s.add(q[0]);
    for (let i = 0; i < q.length; i++) {
      const k = q[i], r = (k / 100) | 0, c = k % 100;
      for (const [dr, dc] of [[-1,0],[1,0],[0,-1],[0,1]]) {
        const nk = (r+dr)*100+(c+dc);
        if (!s.has(nk) && isOpen(r+dr, c+dc, bx)) { s.add(nk); q.push(nk); }
      }
    }
    return s;
  };
  const stateKey = (bx, z) => [...bx].sort((a,b)=>a-b).join(',') + ':' + Math.min(...z);
  const b0 = new Set(boxes0);
  if (goalKeys.every(g => b0.has(g))) return 0;
  const z0 = getZone(pr, pc, b0);
  const visited = new Set([stateKey(b0, z0)]);
  const q = [{b: b0, z: z0, p: 0}];
  for (let head = 0; head < q.length && head < maxStates; head++) {
    const {b, z, p} = q[head];
    for (const bk of b) {
      const br = (bk / 100) | 0, bc = bk % 100;
      for (const [dr, dc] of [[-1,0],[1,0],[0,-1],[0,1]]) {
        if (!z.has((br-dr)*100+(bc-dc))) continue;
        const tr = br+dr, tc = bc+dc, tk = tr*100+tc;
        if (!isOpen(tr, tc, b)) continue;
        if (deadlock(tr, tc, b)) continue;
        const nb = new Set(b); nb.delete(bk); nb.add(tk);
        if (goalKeys.every(g => nb.has(g))) return p + 1;
        const nz = getZone(br, bc, nb);
        const sk = stateKey(nb, nz);
        if (!visited.has(sk)) { visited.add(sk); q.push({b: nb, z: nz, p: p+1}); }
      }
    }
  }
  return null;
}

// ── game state ───────────────────────────────────────────────
let cells, playerPos, width, moves, won, failed, history;
let currentLevelStr = '';
let sharedLevel = false;
let sharedScore = 0;
let moveLimit = 0;

function L() { return localStorage.getItem('tg-lang') || 'sr'; }

function updateHUD() {
  const isSR = L() === 'sr';
  document.getElementById('levelEl').textContent = sharedLevel ? '🔗' : '🎲';
  let info = sharedLevel ? (isSR ? 'Дељени ниво' : 'Shared level') : (isSR ? 'Случајни ниво' : 'Random level');
  if (sharedLevel && sharedScore > 0) {
    info += isSR ? ' · рeшeно зa ' + sharedScore + ' пот.' : ' · solved in ' + sharedScore;
  } else if (!sharedLevel) {
    const b = +localStorage.getItem('tg-sokoban-random-best') || 0;
    if (b > 0) info += isSR ? ' · 🏆 рекорд: ' + b : ' · 🏆 best: ' + b;
  }
  document.getElementById('levelInfo').textContent = info;
  const rem = moveLimit > 0 ? moveLimit - moves : Infinity;
  const mEl = document.getElementById('movesEl');
  mEl.textContent = moveLimit > 0 ? '🚶 ' + moves + '/' + moveLimit : '🚶 ' + moves;
  mEl.style.color = rem <= 10 ? 'var(--accent)' : '';
}

function parseLevel() {
  cells = [];
  width = 0;
  currentLevelStr.split('\n').filter(r => r.trim() !== '').forEach((rowData, row) => {
    cells[row] = [];
    if (rowData.length > width) width = rowData.length;
    rowData.split('').forEach((colData, col) => {
      cells[row][col] = colData;
      if (colData === T.player || colData === T.playerOnGoal) playerPos = {row, col};
    });
  });
  canvas.width = width * grid;
  canvas.height = cells.length * grid;
}

function cloneCells() { return cells.map(row => [...row]); }

function moveCell(from, to) {
  const sc = cells[from.row][from.col];
  const ec = cells[to.row][to.col];
  const isPlayer = sc === T.player || sc === T.playerOnGoal;
  cells[from.row][from.col] = (sc === T.player || sc === T.block) ? T.empty : T.goal;
  cells[to.row][to.col] = (ec === T.goal)
    ? (isPlayer ? T.playerOnGoal : T.blockOnGoal)
    : (isPlayer ? T.player : T.block);
}

function doMove(dc, dr) {
  if (won || failed) return;
  const row = playerPos.row + dr, col = playerPos.col + dc;
  if (row < 0 || row >= cells.length || col < 0 || !cells[row] || col >= cells[row].length) return;
  const cell = cells[row][col];
  if (cell === T.wall || cell === undefined) return;

  if (cell === T.block || cell === T.blockOnGoal) {
    const nR = row + dr, nC = col + dc;
    if (nR < 0 || nR >= cells.length || nC < 0) return;
    const nCell = cells[nR]?.[nC];
    if (nCell !== T.empty && nCell !== T.goal) return;
    SFX.push();
    history.push({cells: cloneCells(), pos: {...playerPos}});
    moveCell({row, col}, {row: nR, col: nC});
    moveCell(playerPos, {row, col});
    playerPos = {row, col};
  } else if (cell === T.empty || cell === T.goal) {
    SFX.step();
    history.push({cells: cloneCells(), pos: {...playerPos}});
    moveCell(playerPos, {row, col});
    playerPos = {row, col};
  } else return;

  moves++;
  updateHUD();
  draw();
  if (moveLimit > 0 && moves >= moveLimit && !won) { outOfMoves(); return; }
  checkWin();
}

function outOfMoves() {
  failed = true;
  SFX.error();
  const isSR = L() === 'sr';
  document.querySelectorAll('#gameover [data-sr]').forEach(el => el.textContent = el.dataset[isSR?'sr':'en']);
  document.getElementById('gameover').classList.add('show');
}

function undo() {
  if (won || !history.length) return;
  if (failed) { failed = false; document.getElementById('nextBtn').style.display = 'none'; }
  const prev = history.pop();
  cells = prev.cells;
  playerPos = {...prev.pos};
  moves = Math.max(0, moves - 1);
  updateHUD();
  draw();
}

function checkWin() {
  for (let r = 0; r < cells.length; r++)
    for (let c = 0; c < (cells[r]||[]).length; c++)
      if (cells[r][c] === T.block) return;

  won = true;
  SFX.win();
  statRec('sokoban', {played:1, completedRandom:1});
  const b = +localStorage.getItem('tg-sokoban-random-best') || 0;
  if (b === 0 || moves < b) localStorage.setItem('tg-sokoban-random-best', moves);
  updateHUD();
  draw();

  context.fillStyle = 'rgba(0,0,0,0.72)';
  context.fillRect(0, canvas.height/2 - 34, canvas.width, 68);
  context.fillStyle = 'white';
  context.font = 'bold 24px monospace';
  context.textAlign = 'center';
  context.textBaseline = 'middle';
  const isSR = L() === 'sr';
  context.fillText(isSR ? '🎉 Решено!' : '🎉 Solved!', canvas.width/2, canvas.height/2);

  const btn = document.getElementById('nextBtn');
  btn.style.display = 'block';
  btn.textContent = isSR ? '🎲 Следећи' : '🎲 Next';
}

function draw() {
  context.fillStyle = '#c8b98a';
  context.fillRect(0, 0, canvas.width, canvas.height);
  context.strokeStyle = 'black';
  context.lineWidth = 2;

  for (let row = 0; row < cells.length; row++) {
    for (let col = 0; col < (cells[row]||[]).length; col++) {
      const cell = cells[row][col];
      if (cell === T.wall) {
        context.drawImage(wallCanvas, col*grid, row*grid, grid, grid);
      }
      if (cell === T.block || cell === T.blockOnGoal) {
        context.fillStyle = cell === T.block ? '#ffbb5b' : '#ba6a15';
        context.fillRect(col*grid, row*grid, grid, grid);
        context.strokeRect(col*grid, row*grid, grid, grid);
        context.strokeRect((col+0.1)*grid, (row+0.1)*grid, grid*0.8, grid*0.8);
        context.beginPath();
        context.moveTo((col+0.1)*grid,(row+0.1)*grid);
        context.lineTo((col+0.9)*grid,(row+0.9)*grid);
        context.moveTo((col+0.9)*grid,(row+0.1)*grid);
        context.lineTo((col+0.1)*grid,(row+0.9)*grid);
        context.stroke();
      }
      if (cell === T.goal || cell === T.playerOnGoal || cell === T.blockOnGoal) {
        context.fillStyle = '#914430';
        context.beginPath();
        context.arc((col+0.5)*grid, (row+0.5)*grid, 8, 0, Math.PI*2);
        context.fill();
      }
      if (cell === T.player || cell === T.playerOnGoal) {
        context.fillStyle = '#e94560';
        context.beginPath();
        context.arc((col+0.5)*grid, (row+0.28)*grid, 7, 0, Math.PI*2);
        context.fill();
        context.fillRect((col+0.47)*grid, (row+0.28)*grid, 3, grid*0.42);
        context.fillRect((col+0.28)*grid, (row+0.47)*grid, grid*0.44, 3);
        context.beginPath();
        context.moveTo((col+0.5)*grid,(row+0.68)*grid);
        context.lineTo((col+0.65)*grid,(row+0.9)*grid);
        context.moveTo((col+0.5)*grid,(row+0.68)*grid);
        context.lineTo((col+0.35)*grid,(row+0.9)*grid);
        context.stroke();
      }
    }
  }
}

function resetLevel() {
  parseLevel();
  history = [];
  moves = 0;
  won = false;
  failed = false;
  document.getElementById('gameover').classList.remove('show');
  document.getElementById('nextBtn').style.display = 'none';
  updateHUD();
  draw();
}

function onNext() { if (failed) { resetLevel(); } else { startRandom(); } }

function shareLevel() {
  try {
    const data = won
      ? currentLevelStr + '|' + moveLimit + '|' + moves
      : currentLevelStr + (moveLimit > 0 ? '|' + moveLimit : '');
    const encoded = btoa(unescape(encodeURIComponent(data)));
    const url = location.href.split('#')[0] + '#' + encoded;
    navigator.clipboard.writeText(url).then(() => {
      const btn = document.querySelector('[onclick="shareLevel()"]');
      const orig = btn.textContent;
      btn.textContent = '✓';
      setTimeout(() => { btn.textContent = orig; }, 1500);
    }).catch(() => { prompt('Copy link:', url); });
  } catch(e) {}
}

function startRandom() {
  const isSR = L() === 'sr';
  sharedLevel = false;
  document.getElementById('levelEl').textContent = '⏳';
  document.getElementById('levelInfo').textContent = isSR ? 'Генеришем...' : 'Generating...';
  document.getElementById('nextBtn').style.display = 'none';
  setTimeout(() => {
    const result = generateLevel(4, 130);
    if (result) {
      currentLevelStr = result.level;
      const opt = solveSokoban(currentLevelStr, 100000);
      moveLimit = opt !== null
        ? Math.ceil(opt * 3)                         // optimal pushes × 3 ≈ total moves + ~20% slack
        : Math.ceil(result.solutionMoves * 1.25);    // fallback: generator path
    } else { currentLevelStr = FALLBACK; moveLimit = 150; }
    try { history.replaceState(null, '', '#' + btoa(unescape(encodeURIComponent(currentLevelStr + '|' + moveLimit)))); } catch(e) {}
    resetLevel();
  }, 20);
}

// Console helper: playSolution('RurrddDL...')
// Lowercase = walk, Uppercase = push (standard Sokoban notation)
window.playSolution = function(sol, msPerMove) {
  msPerMove = msPerMove || 180;
  resetLevel();
  const dir = {r:[1,0],l:[-1,0],u:[0,-1],d:[0,1]};
  let i = 0;
  const tick = setInterval(() => {
    if (won || i >= sol.length) { clearInterval(tick); return; }
    const d = dir[sol[i++].toLowerCase()];
    if (d) doMove(d[0], d[1]);
  }, msPerMove);
  return 'Playing ' + sol.length + ' moves...';
};

document.addEventListener('keydown', e => {
  if (e.which === 37) { e.preventDefault(); doMove(-1, 0); }
  else if (e.which === 38) { e.preventDefault(); doMove(0, -1); }
  else if (e.which === 39) { e.preventDefault(); doMove(1, 0); }
  else if (e.which === 40) { e.preventDefault(); doMove(0, 1); }
  else if (e.which === 90 && (e.ctrlKey || e.metaKey)) { e.preventDefault(); undo(); }
});

// Load shared level from URL hash, or start random
const _hash = location.hash.slice(1);
if (_hash) {
  try {
    const decoded = decodeURIComponent(escape(atob(_hash)));
    const parts = decoded.split('|'), n = parts.length;
    if (n >= 3 && /^\d+$/.test(parts[n-1]) && /^\d+$/.test(parts[n-2])) {
      sharedScore = +parts[n-1]; moveLimit = +parts[n-2];
      currentLevelStr = parts.slice(0, n-2).join('|');
    } else if (n >= 2 && /^\d+$/.test(parts[n-1])) {
      moveLimit = +parts[n-1]; sharedScore = 0;
      currentLevelStr = parts.slice(0, n-1).join('|');
    } else {
      currentLevelStr = decoded; moveLimit = 0;
    }
    sharedLevel = true;
    resetLevel();
  } catch(e) { startRandom(); }
} else {
  startRandom();
}
</script>
