<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Кики Птица — Тоалет Игрице</title>
<meta name="theme-color" content="#e94560">
<script>(function(){var t=localStorage.getItem('tg-theme')||(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');if(t==='light')document.documentElement.classList.add('light');})()</script>
<style>
:root{--bg:#0f0f1a;--surface:#1a1a2e;--surface2:#16213e;--accent:#e94560;--text:#e0e0e0;--dim:#888}
html.light{--bg:#f0f2f5;--surface:#fff;--surface2:#e2e5ea;--text:#1a1a2e;--dim:#666}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:18px}html.xl{font-size:22px}
body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;min-height:100dvh;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--surface);gap:6px;border-bottom:1px solid var(--surface2)}
.topbar a{color:var(--accent);text-decoration:none;font-size:.95rem;font-weight:700;white-space:nowrap}
.topbar h2{font-size:.95rem;font-weight:700;flex:1;text-align:center}
.topbar-btns{display:flex;gap:4px;flex-shrink:0}
.icon-btn{background:none;border:1px solid var(--dim);color:var(--text);border-radius:6px;padding:5px 8px;font-size:.78rem;cursor:pointer;white-space:nowrap;line-height:1}
.wrap{padding:8px 4px 12px;display:flex;flex-direction:column;align-items:center;gap:6px}
.hud{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:431px;font-size:1rem;font-weight:700;padding:0 6px}
canvas{display:block;border:1px solid var(--surface2);border-radius:6px;background:#70c5ce;touch-action:none}
.hint{font-size:.8rem;color:var(--dim);text-align:center}
.speed-row{display:flex;align-items:center;gap:8px;width:100%;max-width:431px;padding:2px 6px;font-size:.82rem;color:var(--dim);font-weight:700}
.speed-row input[type=range]{flex:1;accent-color:var(--accent);height:24px}
#speedVal{min-width:2.6em;text-align:right}
</style>
</head>
<body>
<div class="topbar">
  <a href="../" class="i18n" data-sr="← Назад" data-en="← Back">← Назад</a>
  <h2 class="i18n" data-sr="🐦 Кики Птица" data-en="🐦 Kiky Bird">🐦 Кики Птица</h2>
  <div class="topbar-btns">
    <button class="icon-btn theme-btn" onclick="toggleTheme()">🌙</button>
    <button class="icon-btn lang-btn" onclick="toggleLang()">EN</button>
    <button class="icon-btn sound-btn" onclick="toggleSound()">🔊</button>
    <button class="icon-btn" onclick="toggleFont()">Аа</button>
  </div>
</div>
<div class="wrap">
  <div class="hud">
    <span id="scoreEl">0</span>
    <span id="bestEl">🏆 0</span>
  </div>
  <canvas id="canvas" width="431" height="768"></canvas>
  <div class="speed-row">
    <span class="i18n" data-sr="Брзина" data-en="Speed">Брзина</span>
    <input type="range" id="speedSlider" min="0.5" max="1.6" step="0.1" value="1" aria-label="Speed">
    <span id="speedVal">1.0×</span>
  </div>
  <p class="hint i18n" data-sr="Тапни / размак да летиш" data-en="Tap / space to flap">Тапни / размак да летиш</p>
</div>
<script>
(function(){
  const _lang=()=>localStorage.getItem('tg-lang')||(/^(sr|hr|bs)/i.test(navigator.language)?'sr':'en');
  const _theme=()=>localStorage.getItem('tg-theme')||(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');
  function applyTheme(){const d=_theme()==='dark';document.documentElement.classList.toggle('light',!d);document.querySelectorAll('.theme-btn').forEach(b=>b.textContent=d?'☀️':'🌙');}
  function applyI18n(){const L=_lang();document.querySelectorAll('[data-'+L+']').forEach(el=>el.textContent=el.dataset[L]);document.querySelectorAll('.lang-btn').forEach(b=>b.textContent=L==='sr'?'EN':'СР');document.documentElement.lang=L;}
  window.toggleTheme=()=>{localStorage.setItem('tg-theme',_theme()==='dark'?'light':'dark');applyTheme();};
  window.toggleLang=()=>{localStorage.setItem('tg-lang',_lang()==='sr'?'en':'sr');location.reload();};
  window.toggleFont=()=>{const xl=document.documentElement.classList.toggle('xl');localStorage.setItem('tg-xl',xl?'1':'0');};
  window.toggleSound=()=>{const on=localStorage.getItem('tg-sound')!=='0';localStorage.setItem('tg-sound',on?'0':'1');document.querySelectorAll('.sound-btn').forEach(b=>b.textContent=on?'🔇':'🔊');};
  if(localStorage.getItem('tg-xl')==='1')document.documentElement.classList.add('xl');
  applyTheme();applyI18n();document.querySelectorAll('.sound-btn').forEach(b=>b.textContent=localStorage.getItem('tg-sound')==='0'?'🔇':'🔊');
})();

function statRec(g,inc,hi){const j=JSON.parse(localStorage.getItem('tg-stats')||'{}');const e=j[g]||{};for(const[k,v]of Object.entries(inc||{}))e[k]=(e[k]||0)+v;for(const[k,v]of Object.entries(hi||{}))if(v!=null&&(!e[k]||v>e[k]))e[k]=v;j[g]=e;localStorage.setItem('tg-stats',JSON.stringify(j));}

const SFX=(()=>{let ac;const A=()=>(ac=ac||new(window.AudioContext||window.webkitAudioContext)());const t=(f,d,tp,v)=>{if(localStorage.getItem('tg-sound')==='0')return;try{const c=A(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type=tp||'sine';o.frequency.value=f;g.gain.setValueAtTime(v||.2,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);o.start();o.stop(c.currentTime+d);}catch(e){}};
return{
  // Wing-flap: a quick downward pitch "whoosh" + a short burst of filtered
  // air noise — synthesized so it works fully offline (no audio asset).
  flap(){
    if(localStorage.getItem('tg-sound')==='0')return;
    try{
      const c=A(),now=c.currentTime;
      // downward pitch sweep (the "flap")
      const o=c.createOscillator(),g=c.createGain();
      o.type='triangle';
      o.frequency.setValueAtTime(900,now);
      o.frequency.exponentialRampToValueAtTime(300,now+.09);
      g.gain.setValueAtTime(.0001,now);
      g.gain.exponentialRampToValueAtTime(.16,now+.012);
      g.gain.exponentialRampToValueAtTime(.0001,now+.13);
      o.connect(g);g.connect(c.destination);
      o.start(now);o.stop(now+.14);
      // air/wing noise burst through a bandpass
      const len=Math.floor(c.sampleRate*.08),buf=c.createBuffer(1,len,c.sampleRate),d=buf.getChannelData(0);
      for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*(1-i/len);
      const ns=c.createBufferSource();ns.buffer=buf;
      const bp=c.createBiquadFilter();bp.type='bandpass';bp.frequency.value=1300;bp.Q.value=.8;
      const ng=c.createGain();
      ng.gain.setValueAtTime(.0001,now);
      ng.gain.exponentialRampToValueAtTime(.11,now+.01);
      ng.gain.exponentialRampToValueAtTime(.0001,now+.08);
      ns.connect(bp);bp.connect(ng);ng.connect(c.destination);
      ns.start(now);ns.stop(now+.08);
    }catch(e){}
  },
  point:()=>{t(880,.07,'sine',.14);setTimeout(()=>t(1175,.1,'sine',.12),70);},
  hit:()=>{t(200,.12,'sawtooth',.22);setTimeout(()=>t(140,.25,'sawtooth',.2),110);}
};})();

// ── Flappy Bird — adapted from ju-az's "Floppy Bird" CodePen (eYJQwLx).
// Same physics & sprite-sheet rendering; wrapped in the hub conventions
// (topbar, theme/lang/sound/font, localStorage best) and vendored sprite
// so the game runs fully offline with no external assets.
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('scoreEl');
const bestEl  = document.getElementById('bestEl');
const img = new Image();
img.src = './flappy-bird-set.png';

const L = () => localStorage.getItem('tg-lang') || 'sr';

// general settings
let gamePlaying = false;
const gravity = .5;
const speed = 6.2;
const size = [51, 36];
const jump = -11.5;
const cTenth = (canvas.width / 10);

let index = 0, flight, flyHeight, currentScore, pipes, cooldownUntil = 0;
let best = +localStorage.getItem('tg-flappy-best') || 0;
let speedMult = +localStorage.getItem('tg-flappy-speed') || 1; // game-speed multiplier

// pipe settings
const pipeWidth = 78;
const pipeGap = 270;
const pipeLoc = () => (Math.random() * ((canvas.height - (pipeGap + pipeWidth)) - pipeWidth)) + pipeWidth;

function syncHUD() {
  scoreEl.textContent = currentScore;
  bestEl.textContent = '🏆 ' + best;
}

const setup = () => {
  currentScore = 0;
  flight = jump;
  flyHeight = (canvas.height / 2) - (size[1] / 2);
  pipes = Array(3).fill().map((a, i) => [canvas.width + (i * (pipeGap + pipeWidth)), pipeLoc()]);
  syncHUD();
};

function die() {
  gamePlaying = false;
  SFX.hit();
  tgFail();
  if (currentScore > best) { best = currentScore; localStorage.setItem('tg-flappy-best', best); }
  statRec('flappy', { played: 1 }, { bestScore: currentScore });
  cooldownUntil = performance.now() + 500; // ignore the death tap
  setup();
}

// One fixed simulation tick. Run at a constant 60 Hz (see frame()) so the
// game plays at the same speed on 60/120/144 Hz displays — otherwise rAF
// fires at the monitor's refresh rate and the bird/pipes move 2-2.4× too
// fast on high-refresh desktop monitors.
function step() {
  index++;
  if (!gamePlaying) { flyHeight = (canvas.height / 2) - (size[1] / 2); return; }
  pipes.forEach(pipe => {
    pipe[0] -= speed;
    // passed a pipe — score & recycle
    if (pipe[0] <= -pipeWidth) {
      currentScore++;
      SFX.point();
      if (currentScore > best) { best = currentScore; localStorage.setItem('tg-flappy-best', best); }
      syncHUD();
      pipes = [...pipes.slice(1), [pipes[pipes.length - 1][0] + pipeGap + pipeWidth, pipeLoc()]];
    }
    // collision (guard on gamePlaying so only the first hit this tick counts)
    if (gamePlaying && [
      pipe[0] <= cTenth + size[0],
      pipe[0] + pipeWidth >= cTenth,
      pipe[1] > flyHeight || pipe[1] + pipeGap < flyHeight + size[1]
    ].every(e => e)) {
      die();
    }
  });
  flight += gravity;
  flyHeight = Math.min(flyHeight + flight, canvas.height - size[1]);
}

function draw() {
  // scrolling background (two halves of the sprite's left region)
  ctx.drawImage(img, 0, 0, canvas.width, canvas.height, -((index * (speed / 2)) % canvas.width) + canvas.width, 0, canvas.width, canvas.height);
  ctx.drawImage(img, 0, 0, canvas.width, canvas.height, -(index * (speed / 2)) % canvas.width, 0, canvas.width, canvas.height);

  if (gamePlaying) {
    pipes.forEach(pipe => {
      ctx.drawImage(img, 432, 588 - pipe[1], pipeWidth, pipe[1], pipe[0], 0, pipeWidth, pipe[1]);
      ctx.drawImage(img, 432 + pipeWidth, 108, pipeWidth, canvas.height - pipe[1] + pipeGap, pipe[0], pipe[1] + pipeGap, pipeWidth, canvas.height - pipe[1] + pipeGap);
    });
    ctx.drawImage(img, 432, Math.floor((index % 9) / 3) * size[1], size[0], size[1], cTenth, flyHeight, size[0], size[1]);
  } else {
    ctx.drawImage(img, 432, Math.floor((index % 9) / 3) * size[1], size[0], size[1], (canvas.width / 2) - size[0] / 2, flyHeight, size[0], size[1]);
    ctx.fillStyle = '#fff';
    ctx.strokeStyle = 'rgba(0,0,0,0.55)';
    ctx.lineWidth = 4;
    ctx.textAlign = 'center';
    ctx.font = 'bold 30px monospace';
    const msg = L() === 'sr' ? 'Тапни да играш' : 'Tap to play';
    ctx.strokeText(msg, canvas.width / 2, 250);
    ctx.fillText(msg, canvas.width / 2, 250);
    ctx.font = 'bold 22px monospace';
    const bs = (L() === 'sr' ? 'Рекорд: ' : 'Best: ') + best;
    ctx.strokeText(bs, canvas.width / 2, 300);
    ctx.fillText(bs, canvas.width / 2, 300);
    ctx.textAlign = 'start';
  }
}

const BASE_STEP_MS = 1000 / 60;
let lastTime = 0, acc = 0;
function frame(now) {
  if (!lastTime) lastTime = now;
  acc += Math.min(now - lastTime, 100); // clamp so a backgrounded tab can't spiral
  lastTime = now;
  const stepMs = BASE_STEP_MS / speedMult; // slider scales the whole simulation
  while (acc >= stepMs) { step(); acc -= stepMs; }
  draw();
  window.requestAnimationFrame(frame);
}

function flap() {
  if (performance.now() < cooldownUntil) return;
  if (!gamePlaying) { gamePlaying = true; }
  flight = jump;
  SFX.flap();
}

// controls: pointer + keyboard
canvas.addEventListener('pointerdown', e => { e.preventDefault(); flap(); });
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return; // let the slider keep arrow keys
  if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); flap(); }
});

// speed slider
const speedSlider = document.getElementById('speedSlider');
const speedVal = document.getElementById('speedVal');
function applySpeed() { speedVal.textContent = speedMult.toFixed(1) + '×'; }
speedSlider.value = speedMult;
speedSlider.addEventListener('input', () => {
  speedMult = +speedSlider.value;
  localStorage.setItem('tg-flappy-speed', speedMult);
  applySpeed();
});
applySpeed();

// fit the fixed 431×768 canvas into the viewport without distortion
function fit() {
  const availH = window.innerHeight - 132;
  const availW = Math.min(window.innerWidth - 8, 431);
  let h = availH, w = h * 431 / 768;
  if (w > availW) { w = availW; h = w * 768 / 431; }
  canvas.style.width = Math.round(w) + 'px';
  canvas.style.height = Math.round(h) + 'px';
}
window.addEventListener('resize', fit);
fit();

setup();
if (img.complete) requestAnimationFrame(frame); else img.onload = () => requestAnimationFrame(frame);
</script>
<script>
// Loss — boxed FAILED banner (stays until next interaction) + "whah-whah" trombone.
// Offline; honors the tg-sound toggle.
window.tgFail=function(){
  if(localStorage.getItem("tg-sound")!=="0"){try{var au=new Audio("./whah.wav");au.volume=0.8;au.play().catch(function(){});}catch(e){}}
  (function(){var L=localStorage.getItem("tg-lang")||"sr";var old=document.getElementById("tg-banner");if(old)old.remove();var b=document.createElement("div");b.id="tg-banner";b.textContent=L==="sr"?"ПОРАЗ":"FAILED";var base="translate(-50%,-50%)";b.style.cssText="position:fixed;top:36%;left:50%;z-index:99998;pointer-events:none;white-space:nowrap;padding:.22em .6em;border-radius:20px;border:5px solid #e94560;background:rgba(15,15,26,.86);box-shadow:0 14px 44px rgba(0,0,0,.55),0 0 0 3px rgba(0,0,0,.25) inset;-webkit-backdrop-filter:blur(3px);backdrop-filter:blur(3px);font:900 clamp(2rem,12vw,5.5rem)/1 system-ui,-apple-system,sans-serif;letter-spacing:.05em;color:#e94560;text-shadow:0 3px 14px rgba(0,0,0,.6);opacity:0;transform:"+base+" scale(.6);transition:opacity .25s ease,transform .35s cubic-bezier(.2,1.4,.3,1)";document.body.appendChild(b);requestAnimationFrame(function(){b.style.opacity="1";b.style.transform=base+" scale(1)";});var armed=false;setTimeout(function(){armed=true;},400);function dismiss(){if(!armed)return;document.removeEventListener("pointerdown",dismiss,true);document.removeEventListener("keydown",dismiss,true);b.style.opacity="0";b.style.transform=base+" scale(1.12)";setTimeout(function(){b.remove();},220);}document.addEventListener("pointerdown",dismiss,true);document.addEventListener("keydown",dismiss,true);})();
};
</script>
</body>
</html>
