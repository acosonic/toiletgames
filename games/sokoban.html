<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Сокобан — Тоалет Игрице</title>
<meta name="theme-color" content="#e94560">
<script>(function(){var t=localStorage.getItem('tg-theme')||(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');if(t==='light')document.documentElement.classList.add('light');})()</script>
<style>
:root{--bg:#0f0f1a;--surface:#1a1a2e;--surface2:#16213e;--accent:#e94560;--text:#e0e0e0;--dim:#888}
html.light{--bg:#f0f2f5;--surface:#fff;--surface2:#e2e5ea;--text:#1a1a2e;--dim:#666}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:18px}html.xl{font-size:22px}
body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;min-height:100dvh;-webkit-tap-highlight-color:transparent}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--surface);gap:6px;border-bottom:1px solid var(--surface2)}
.topbar a{color:var(--accent);text-decoration:none;font-size:.95rem;font-weight:700;white-space:nowrap}
.topbar h2{font-size:.95rem;font-weight:700;flex:1;text-align:center}
.topbar-btns{display:flex;gap:4px;flex-shrink:0}
.icon-btn{background:none;border:1px solid var(--dim);color:var(--text);border-radius:6px;padding:5px 8px;font-size:.78rem;cursor:pointer;white-space:nowrap;line-height:1}
.wrap{padding:8px 10px;max-width:540px;margin:0 auto;display:flex;flex-direction:column;align-items:center;gap:8px}
.hud{display:flex;align-items:center;justify-content:space-between;width:100%;font-size:.9rem;font-weight:700;flex-wrap:wrap;gap:6px}
.hud-btns{display:flex;gap:6px}
.ctrl-btn{background:var(--surface2);border:1px solid var(--dim);color:var(--text);border-radius:8px;padding:5px 12px;font-size:.82rem;cursor:pointer;touch-action:manipulation}
.level-info{font-size:.8rem;color:var(--dim);text-align:center;width:100%}
canvas{display:block;max-width:100%;height:auto;border:1px solid var(--surface2)}
.next-btn{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:10px 24px;font-size:1rem;font-weight:700;cursor:pointer;touch-action:manipulation;display:none}
.dpad{display:grid;grid-template-columns:repeat(3,60px);grid-template-rows:repeat(2,60px);gap:6px;margin-top:6px}
.dpad button{background:var(--surface);border:1px solid var(--surface2);border-radius:10px;color:var(--text);font-size:1.5rem;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.dpad button:active{background:var(--accent);color:#fff}
.dpad .up{grid-column:2;grid-row:1}
.dpad .left{grid-column:1;grid-row:2}
.dpad .down{grid-column:2;grid-row:2}
.dpad .right{grid-column:3;grid-row:2}
</style>
</head>
<body>
<div class="topbar">
  <a href="../" class="i18n" data-sr="← Назад" data-en="← Back">← Назад</a>
  <h2 class="i18n" data-sr="📦 Сокобан" data-en="📦 Sokoban">📦 Сокобан</h2>
  <div class="topbar-btns">
    <button class="icon-btn theme-btn" onclick="toggleTheme()">🌙</button>
    <button class="icon-btn lang-btn" onclick="toggleLang()">EN</button>
    <button class="icon-btn" onclick="toggleFont()">Аа</button>
  </div>
</div>
<div class="wrap">
  <div class="hud">
    <span id="levelEl">🎯 1/6</span>
    <div class="hud-btns">
      <button class="ctrl-btn i18n" data-sr="↩ Поништи" data-en="↩ Undo" onclick="undo()">↩ Поништи</button>
      <button class="ctrl-btn i18n" data-sr="↺ Ресет" data-en="↺ Reset" onclick="resetLevel()">↺ Ресет</button>
    </div>
    <span id="movesEl">🚶 0</span>
  </div>
  <div class="level-info" id="bestEl"></div>
  <canvas id="game"></canvas>
  <button class="next-btn i18n" id="nextBtn" data-sr="Следећи ниво →" data-en="Next level →" onclick="nextLevel()">Следећи ниво →</button>
  <div class="dpad">
    <button class="up" onclick="doMove(0,-1)">▲</button>
    <button class="left" onclick="doMove(-1,0)">◄</button>
    <button class="down" onclick="doMove(0,1)">▼</button>
    <button class="right" onclick="doMove(1,0)">►</button>
  </div>
</div>
<script>
(function(){
  const _lang=()=>localStorage.getItem('tg-lang')||(/^(sr|hr|bs)/i.test(navigator.language)?'sr':'en');
  const _theme=()=>localStorage.getItem('tg-theme')||(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');
  function applyTheme(){const d=_theme()==='dark';document.documentElement.classList.toggle('light',!d);document.querySelectorAll('.theme-btn').forEach(b=>b.textContent=d?'☀️':'🌙');}
  function applyI18n(){const L=_lang();document.querySelectorAll('[data-'+L+']').forEach(el=>el.textContent=el.dataset[L]);document.querySelectorAll('.lang-btn').forEach(b=>b.textContent=L==='sr'?'EN':'СР');document.documentElement.lang=L;}
  window.toggleTheme=()=>{localStorage.setItem('tg-theme',_theme()==='dark'?'light':'dark');applyTheme();};
  window.toggleLang=()=>{localStorage.setItem('tg-lang',_lang()==='sr'?'en':'sr');location.reload();};
  window.toggleFont=()=>{const xl=document.documentElement.classList.toggle('xl');localStorage.setItem('tg-xl',xl?'1':'0');};
  if(localStorage.getItem('tg-xl')==='1')document.documentElement.classList.add('xl');
  applyTheme();applyI18n();
})();

const canvas = document.getElementById('game');
const context = canvas.getContext('2d');
const grid = 56;

const wallCanvas = document.createElement('canvas');
const wallCtx = wallCanvas.getContext('2d');
wallCanvas.width = wallCanvas.height = grid;
wallCtx.fillStyle = '#3d3520';
wallCtx.fillRect(0, 0, grid, grid);
wallCtx.fillStyle = '#6b5e35';
wallCtx.fillRect(1, 1, grid - 2, 17);
wallCtx.fillRect(0, 20, 17, 16);
wallCtx.fillRect(19, 20, grid - 19, 16);
wallCtx.fillRect(0, 38, grid - 18, 18);
wallCtx.fillRect(grid - 16, 38, 16, 18);

const types = { wall:'#', player:'@', playerOnGoal:'+', block:'$', blockOnGoal:'*', goal:'.', empty:' ' };

// 6 levels of increasing difficulty
const levels = [
`#####
#   #
#.$ #
# @ #
#####`,

`######
#    #
# $  #
# @. #
######`,

`#######
#     #
###$  #
# .   #
# @   #
#######`,

`#######
#     #
# . . #
# $ $ #
#  @  #
#######`,

`########
#  .   #
#  $   #
# @    #
#    $ #
#    . #
########`,

`  #####
###   #
#.@$  #
### $.#
#.##$ #
# # . ##
#$ *$$.#
#   .  #
########`
];

let cells, playerPos, width, moves, won, history;
let currentLevel = +localStorage.getItem('tg-sokoban-level') || 0;
if (currentLevel >= levels.length) currentLevel = 0;

function bestKey(n) { return 'tg-sokoban-best-' + n; }

function updateHUD() {
  const L = localStorage.getItem('tg-lang') || 'sr';
  document.getElementById('levelEl').textContent = '🎯 ' + (currentLevel + 1) + '/' + levels.length;
  document.getElementById('movesEl').textContent = '🚶 ' + moves;
  const b = +localStorage.getItem(bestKey(currentLevel)) || 0;
  const lbl = L === 'sr' ? 'Ниво ' : 'Level ';
  const bestTxt = b > 0 ? (L === 'sr' ? ' · 🏆 рекорд: ' : ' · 🏆 best: ') + b + (L === 'sr' ? ' потеза' : ' moves') : '';
  document.getElementById('bestEl').textContent = lbl + (currentLevel + 1) + bestTxt;
}

function parseLevel() {
  cells = [];
  width = 0;
  levels[currentLevel].split('\n').filter(r => r.trim() !== '').forEach((rowData, row) => {
    cells[row] = [];
    if (rowData.length > width) width = rowData.length;
    rowData.split('').forEach((colData, col) => {
      cells[row][col] = colData;
      if (colData === types.player || colData === types.playerOnGoal) playerPos = { row, col };
    });
  });
  canvas.width = width * grid;
  canvas.height = cells.length * grid;
}

function cloneCells() {
  return cells.map(row => [...row]);
}

function moveCell(startPos, endPos) {
  const startCell = cells[startPos.row][startPos.col];
  const endCell = cells[endPos.row][endPos.col];
  const isPlayer = startCell === types.player || startCell === types.playerOnGoal;
  switch(startCell) {
    case types.player: case types.block: cells[startPos.row][startPos.col] = types.empty; break;
    case types.playerOnGoal: case types.blockOnGoal: cells[startPos.row][startPos.col] = types.goal; break;
  }
  switch(endCell) {
    case types.empty: cells[endPos.row][endPos.col] = isPlayer ? types.player : types.block; break;
    case types.goal: cells[endPos.row][endPos.col] = isPlayer ? types.playerOnGoal : types.blockOnGoal; break;
  }
}

function doMove(dc, dr) {
  if (won) return;
  const row = playerPos.row + dr;
  const col = playerPos.col + dc;
  if (row < 0 || row >= cells.length || col < 0 || !cells[row] || col >= cells[row].length) return;
  const cell = cells[row][col];
  if (cell === types.wall || cell === undefined) return;

  if (cell === types.block || cell === types.blockOnGoal) {
    const nextRow = row + dr;
    const nextCol = col + dc;
    if (nextRow < 0 || nextRow >= cells.length || nextCol < 0) return;
    const nextCell = cells[nextRow] && cells[nextRow][nextCol];
    if (nextCell !== types.empty && nextCell !== types.goal) return;
    history.push({ cells: cloneCells(), pos: { ...playerPos } });
    moveCell({ row, col }, { row: nextRow, col: nextCol });
    moveCell(playerPos, { row, col });
    playerPos = { row, col };
  } else if (cell === types.empty || cell === types.goal) {
    history.push({ cells: cloneCells(), pos: { ...playerPos } });
    moveCell(playerPos, { row, col });
    playerPos = { row, col };
  } else {
    return;
  }

  moves++;
  updateHUD();
  draw();
  checkWin();
}

function undo() {
  if (won || history.length === 0) return;
  const prev = history.pop();
  cells = prev.cells;
  playerPos = { ...prev.pos };
  moves = Math.max(0, moves - 1);
  updateHUD();
  draw();
}

function checkWin() {
  for (let r = 0; r < cells.length; r++) {
    for (let c = 0; c < (cells[r] || []).length; c++) {
      if (cells[r][c] === types.block) return;
    }
  }
  won = true;
  const b = +localStorage.getItem(bestKey(currentLevel)) || 0;
  if (b === 0 || moves < b) {
    localStorage.setItem(bestKey(currentLevel), moves);
  }
  updateHUD();
  draw();

  // win overlay on canvas
  context.fillStyle = 'rgba(0,0,0,0.72)';
  context.fillRect(0, canvas.height / 2 - 34, canvas.width, 68);
  context.fillStyle = 'white';
  context.font = 'bold 26px monospace';
  context.textAlign = 'center';
  context.textBaseline = 'middle';
  const L = localStorage.getItem('tg-lang') || 'sr';
  const isLast = currentLevel >= levels.length - 1;
  context.fillText(
    isLast
      ? (L === 'sr' ? '🏆 Сви нивои решени!' : '🏆 All levels done!')
      : (L === 'sr' ? '🎉 Ниво ' + (currentLevel+1) + ' решен!' : '🎉 Level ' + (currentLevel+1) + ' done!'),
    canvas.width / 2, canvas.height / 2
  );

  // show next button
  const nextBtn = document.getElementById('nextBtn');
  if (isLast) {
    nextBtn.textContent = L === 'sr' ? '↺ Поново од почетка' : '↺ Play again';
  } else {
    nextBtn.textContent = L === 'sr' ? 'Следећи ниво →' : 'Next level →';
  }
  nextBtn.style.display = 'block';
}

function draw() {
  context.fillStyle = '#c8b98a';
  context.fillRect(0, 0, canvas.width, canvas.height);
  context.strokeStyle = 'black';
  context.lineWidth = 2;

  for (let row = 0; row < cells.length; row++) {
    for (let col = 0; col < (cells[row] || []).length; col++) {
      const cell = cells[row][col];
      if (cell === types.wall) {
        context.drawImage(wallCanvas, col * grid, row * grid, grid, grid);
      }
      if (cell === types.block || cell === types.blockOnGoal) {
        context.fillStyle = cell === types.block ? '#ffbb5b' : '#ba6a15';
        context.fillRect(col * grid, row * grid, grid, grid);
        context.strokeRect(col * grid, row * grid, grid, grid);
        context.strokeRect((col + 0.1) * grid, (row + 0.1) * grid, grid * 0.8, grid * 0.8);
        context.beginPath();
        context.moveTo((col + 0.1) * grid, (row + 0.1) * grid);
        context.lineTo((col + 0.9) * grid, (row + 0.9) * grid);
        context.moveTo((col + 0.9) * grid, (row + 0.1) * grid);
        context.lineTo((col + 0.1) * grid, (row + 0.9) * grid);
        context.stroke();
      }
      if (cell === types.goal || cell === types.playerOnGoal || cell === types.blockOnGoal) {
        context.fillStyle = '#914430';
        context.beginPath();
        context.arc((col + 0.5) * grid, (row + 0.5) * grid, 8, 0, Math.PI * 2);
        context.fill();
      }
      if (cell === types.player || cell === types.playerOnGoal) {
        context.fillStyle = '#e94560';
        context.beginPath();
        context.arc((col + 0.5) * grid, (row + 0.28) * grid, 7, 0, Math.PI * 2);
        context.fill();
        context.fillRect((col + 0.47) * grid, (row + 0.28) * grid, 3, grid * 0.42);
        context.fillRect((col + 0.28) * grid, (row + 0.47) * grid, grid * 0.44, 3);
        context.beginPath();
        context.moveTo((col + 0.5) * grid, (row + 0.68) * grid);
        context.lineTo((col + 0.65) * grid, (row + 0.9) * grid);
        context.moveTo((col + 0.5) * grid, (row + 0.68) * grid);
        context.lineTo((col + 0.35) * grid, (row + 0.9) * grid);
        context.stroke();
      }
    }
  }
}

function resetLevel() {
  parseLevel();
  history = [];
  moves = 0;
  won = false;
  document.getElementById('nextBtn').style.display = 'none';
  updateHUD();
  draw();
}

function nextLevel() {
  currentLevel = (currentLevel + 1) % levels.length;
  localStorage.setItem('tg-sokoban-level', currentLevel);
  resetLevel();
}

document.addEventListener('keydown', e => {
  if (e.which === 37) { e.preventDefault(); doMove(-1, 0); }
  else if (e.which === 38) { e.preventDefault(); doMove(0, -1); }
  else if (e.which === 39) { e.preventDefault(); doMove(1, 0); }
  else if (e.which === 40) { e.preventDefault(); doMove(0, 1); }
  else if (e.which === 90 && (e.ctrlKey || e.metaKey)) { e.preventDefault(); undo(); }
});

resetLevel();
</script>
</body>
</html>
