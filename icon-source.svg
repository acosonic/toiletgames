<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Тоалет Игрице">
  <defs>
    <clipPath id="rounded"><rect width="512" height="512" rx="108"/></clipPath>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </linearGradient>
  </defs>

  <g clip-path="url(#rounded)">
    <rect width="512" height="512" fill="url(#bg)"/>
  </g>

  <!-- White rounded panel -->
  <rect x="72" y="100" width="368" height="312" rx="48"
        fill="#ffffff" stroke="#e94560" stroke-width="18" stroke-linejoin="round" paint-order="stroke fill"/>

  <!-- Game controller body (oval) -->
  <ellipse cx="256" cy="268" rx="130" ry="88" fill="#1a1a2e"/>

  <!-- Left bumper -->
  <rect x="100" y="188" width="68" height="28" rx="14" fill="#1a1a2e"/>
  <!-- Right bumper -->
  <rect x="344" y="188" width="68" height="28" rx="14" fill="#1a1a2e"/>

  <!-- D-pad left -->
  <rect x="148" y="248" width="52" height="18" rx="6" fill="#e94560"/>
  <rect x="165" y="231" width="18" height="52" rx="6" fill="#e94560"/>

  <!-- ABXY buttons right -->
  <circle cx="330" cy="248" r="11" fill="#e94560"/>
  <circle cx="356" cy="268" r="11" fill="#533483"/>
  <circle cx="330" cy="288" r="11" fill="#0c4076"/>
  <circle cx="304" cy="268" r="11" fill="#2d7a3a"/>

  <!-- Start/select center bars -->
  <rect x="232" y="263" width="22" height="8" rx="4" fill="#555"/>
  <rect x="258" y="263" width="22" height="8" rx="4" fill="#555"/>

  <!-- Toilet paper roll top (small, above controller) -->
  <ellipse cx="256" cy="148" rx="38" ry="22" fill="#fff" stroke="#e94560" stroke-width="6"/>
  <rect x="218" y="148" width="76" height="20" rx="0" fill="#fff"/>
  <ellipse cx="256" cy="168" rx="38" ry="22" fill="#f0f0f0" stroke="#ccc" stroke-width="3"/>
  <ellipse cx="256" cy="148" rx="20" ry="12" fill="#e0e0e0"/>
</svg>
